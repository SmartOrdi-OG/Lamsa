<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; font-family:sans-serif; }
#modal { display:flex; flex-direction:column; height:100vh; }
#header { background:#111; padding:10px 14px; display:flex; justify-content:space-between; align-items:center; }
#header span { color:#c9a84c; font-weight:700; }
#canvas3d { display:block; width:100%; flex-shrink:0; }
#toolbar { background:#111; border-top:1px solid #222; padding:10px; flex:1; overflow-y:auto; }
#catalog { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:10px; }
.chip { background:#1a1a1a; border:1px solid #333; color:#fff; padding:8px 12px; border-radius:20px; font-size:13px; cursor:pointer; }
#btns { display:flex; gap:8px; }
#btns button { flex:1; padding:9px; border-radius:8px; border:1px solid #333; font-size:13px; cursor:pointer; }
#clearBtn { background:#1a1a1a; color:#888; }
#rotateBtn { background:#1a1a1a; color:#c9a84c; }
#roomSel { margin:10px; padding:8px; background:#111; color:#fff; border:1px solid #333; border-radius:8px; width:calc(100% - 20px); font-size:14px; }
</style>
</head>
<body>

<select id="roomSel" onchange="rebuildCatalog()">
  <option value="bedroom">Bedroom</option>
  <option value="living">Living Room</option>
  <option value="kitchen">Kitchen</option>
  <option value="bathroom">Bathroom</option>
  <option value="office">Home Office</option>
  <option value="dining">Dining Room</option>
  <option value="garden">Garden</option>
</select>

<div id="modal">
  <div id="header">
    <span>🧊 3D Furniture Planner</span>
  </div>
  <canvas id="canvas3d"></canvas>
  <div id="toolbar">
    <div style="color:#888;font-size:11px;margin-bottom:8px;">Tap to add · Drag to move · Rotate button to turn</div>
    <div id="catalog"></div>
    <div id="btns">
      <button id="clearBtn" onclick="clearAll()">🗑 Clear All</button>
      <button id="rotateBtn" onclick="rotateSel()">↻ Rotate</button>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
var CATALOG = {
  bedroom:  [{t:'bed',e:'🛏️',l:'Bed',w:2,d:1.6,h:0.5,c:0x5a3a2a},{t:'wardrobe',e:'🗄️',l:'Wardrobe',w:1.2,d:0.6,h:2,c:0x3a2a5a},{t:'nightstand',e:'🪵',l:'Nightstand',w:0.5,d:0.4,h:0.55,c:0x4a3a2a},{t:'chair',e:'🪑',l:'Chair',w:0.6,d:0.6,h:0.9,c:0x5a3a1a},{t:'desk',e:'💻',l:'Desk',w:1.2,d:0.6,h:0.75,c:0x4a3a1a},{t:'plant',e:'🌿',l:'Plant',w:0.5,d:0.5,h:1.2,c:0x1a4a2a},{t:'tv',e:'📺',l:'TV Unit',w:1.5,d:0.4,h:0.5,c:0x1a3a4a}],
  living:   [{t:'sofa',e:'🛋️',l:'Sofa',w:2.1,d:0.9,h:0.85,c:0x2d5a7a},{t:'coffee',e:'☕',l:'Coffee Table',w:1.2,d:0.6,h:0.45,c:0x3a3a2a},{t:'tv',e:'📺',l:'TV Unit',w:1.5,d:0.4,h:0.5,c:0x1a3a4a},{t:'armchair',e:'🪑',l:'Armchair',w:0.8,d:0.8,h:0.9,c:0x4a3a2a},{t:'bookshelf',e:'📚',l:'Bookshelf',w:0.9,d:0.3,h:1.8,c:0x3a2a1a},{t:'plant',e:'🌿',l:'Plant',w:0.5,d:0.5,h:1.2,c:0x1a4a2a}],
  kitchen:  [{t:'island',e:'🍳',l:'Island',w:1.5,d:0.8,h:0.9,c:0x3a3a4a},{t:'counter',e:'🔲',l:'Counter',w:2,d:0.6,h:0.9,c:0x2a2a3a},{t:'fridge',e:'🧊',l:'Fridge',w:0.7,d:0.7,h:1.8,c:0x2a3a4a},{t:'stove',e:'🔥',l:'Stove',w:0.6,d:0.6,h:0.9,c:0x3a2a2a},{t:'sink',e:'🪣',l:'Sink',w:0.8,d:0.6,h:0.9,c:0x2a4a4a},{t:'barstool',e:'🪑',l:'Bar Stool',w:0.4,d:0.4,h:0.9,c:0x4a3a1a},{t:'cabinet',e:'🗄️',l:'Cabinet',w:1,d:0.4,h:2,c:0x2a2a3a},{t:'shelf',e:'🗂️',l:'Wall Shelf',w:1,d:0.25,h:0.3,c:0x3a2a1a},{t:'microwave',e:'📦',l:'Microwave',w:0.5,d:0.4,h:0.3,c:0x2a2a2a},{t:'dishwasher',e:'🫧',l:'Dishwasher',w:0.6,d:0.6,h:0.85,c:0x2a3a3a},{t:'table',e:'🍽️',l:'Dining Table',w:1.2,d:0.8,h:0.75,c:0x3a2a1a},{t:'chair',e:'🪑',l:'Chair',w:0.5,d:0.5,h:0.9,c:0x4a3a1a}],
  bathroom: [{t:'bathtub',e:'🛁',l:'Bathtub',w:1.7,d:0.8,h:0.6,c:0x1a4a5a},{t:'shower',e:'🚿',l:'Shower',w:0.9,d:0.9,h:2,c:0x2a4a5a},{t:'toilet',e:'🚽',l:'Toilet',w:0.7,d:0.4,h:0.8,c:0x3a3a3a},{t:'sink',e:'🪥',l:'Sink',w:0.6,d:0.5,h:0.85,c:0x2a4a4a},{t:'vanity',e:'🪞',l:'Vanity',w:1.2,d:0.5,h:0.9,c:0x3a3a4a},{t:'towelrack',e:'🧺',l:'Towel Rack',w:0.6,d:0.2,h:1.2,c:0x2a2a2a}],
  office:   [{t:'desk',e:'💻',l:'Desk',w:1.4,d:0.7,h:0.75,c:0x4a3a1a},{t:'chair',e:'🪑',l:'Chair',w:0.6,d:0.6,h:1.1,c:0x2a2a3a},{t:'bookshelf',e:'📚',l:'Bookshelf',w:0.9,d:0.3,h:1.8,c:0x3a2a1a},{t:'sofa',e:'🛋️',l:'Sofa',w:1.8,d:0.8,h:0.8,c:0x2d5a7a},{t:'plant',e:'🌿',l:'Plant',w:0.5,d:0.5,h:1.2,c:0x1a4a2a}],
  dining:   [{t:'table',e:'🍽️',l:'Dining Table',w:1.8,d:0.9,h:0.75,c:0x3a2a1a},{t:'chair',e:'🪑',l:'Chair',w:0.5,d:0.5,h:0.9,c:0x4a3a1a},{t:'sideboard',e:'🗄️',l:'Sideboard',w:1.5,d:0.4,h:0.9,c:0x2a2a3a},{t:'plant',e:'🌿',l:'Plant',w:0.4,d:0.4,h:1,c:0x1a4a2a}],
  garden:   [{t:'sofa',e:'🛋️',l:'Outdoor Sofa',w:2,d:0.9,h:0.8,c:0x2a4a3a},{t:'table',e:'☕',l:'Garden Table',w:1,d:1,h:0.75,c:0x3a3a2a},{t:'chair',e:'🪑',l:'Chair',w:0.6,d:0.6,h:0.9,c:0x3a4a2a},{t:'umbrella',e:'⛱️',l:'Umbrella',w:0.3,d:0.3,h:2.5,c:0x1a3a2a},{t:'bbq',e:'🍖',l:'BBQ Grill',w:0.8,d:0.5,h:1,c:0x3a2a1a},{t:'plant',e:'🌿',l:'Plant',w:0.6,d:0.6,h:1.5,c:0x1a5a2a}]
};

var furniture = [], selected = null;
var scene, renderer, camera, raycaster, mouse, dragPlane;
var theta = Math.PI * 1.25, phi = 0.7, dist = 12;
var dragging = false, dragFurn = false, lastX = 0, lastY = 0, pinchDist = 0;
var W = 5, L = 4, H = 2.7;

function init() {
  var canvas = document.getElementById('canvas3d');
  var w = window.innerWidth;
  var h = Math.round(window.innerHeight * 0.52);
  canvas.width = w; canvas.height = h; canvas.style.height = h+'px';

  renderer = new THREE.WebGLRenderer({canvas:canvas, antialias:true});
  renderer.setSize(w, h, false);
  renderer.shadowMap.enabled = true;

  camera = new THREE.PerspectiveCamera(50, w/h, 0.1, 100);
  raycaster = new THREE.Raycaster();
  mouse = new THREE.Vector2();
  dragPlane = new THREE.Plane(new THREE.Vector3(0,1,0), 0);

  buildScene();
  rebuildCatalog();
  loop();
  attachControls(canvas);
}

function buildScene() {
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x111111);
  scene.add(new THREE.AmbientLight(0xffffff, 2.0));
  var sun = new THREE.DirectionalLight(0xffffff, 0.8);
  sun.position.set(W/2, H*2, L/2); sun.castShadow = true; scene.add(sun);
  var fill = new THREE.DirectionalLight(0xffffff, 0.6);
  fill.position.set(-W/2, H, -L/2); scene.add(fill);

  // Floor - lighter color
  var floor = new THREE.Mesh(new THREE.PlaneGeometry(W,L), new THREE.MeshStandardMaterial({color:0x3a3530, roughness:0.9}));
  floor.rotation.x = -Math.PI/2; floor.position.y = 0.005; floor.receiveShadow = true; scene.add(floor);

  // Walls - DoubleSide so visible from any angle
  var wm = new THREE.MeshStandardMaterial({color:0x555555, side:THREE.DoubleSide, roughness:0.95});
  var bw = new THREE.Mesh(new THREE.PlaneGeometry(W,H), wm); bw.position.set(0,H/2,-L/2); scene.add(bw);
  var fw = new THREE.Mesh(new THREE.PlaneGeometry(W,H), wm); fw.position.set(0,H/2,L/2); fw.rotation.y=Math.PI; scene.add(fw);
  var lw = new THREE.Mesh(new THREE.PlaneGeometry(L,H), wm); lw.position.set(-W/2,H/2,0); lw.rotation.y=Math.PI/2; scene.add(lw);
  var rw = new THREE.Mesh(new THREE.PlaneGeometry(L,H), wm); rw.position.set(W/2,H/2,0); rw.rotation.y=-Math.PI/2; scene.add(rw);

  // Rebuild furniture meshes
  furniture.forEach(function(item){
    if(item.mesh) scene.add(item.mesh);
  });

  dist = Math.max(W,L)*2+2;
}

function rebuildCatalog() {
  var rt = document.getElementById('roomSel').value;
  var items = CATALOG[rt] || CATALOG['bedroom'];
  var cat = document.getElementById('catalog');
  cat.innerHTML = items.map(function(it){
    return '<button class="chip" onclick="addItem(\''+it.t+'\',\''+it.e+'\',\''+it.l+'\','+it.w+','+it.d+','+it.h+','+it.c+')">'+it.e+' '+it.l+'</button>';
  }).join('');
}

function addItem(t,e,l,w,d,h,c) {
  var mat = new THREE.MeshStandardMaterial({color:c, roughness:0.7});
  var mesh = new THREE.Mesh(new THREE.BoxGeometry(w,h,d), mat);
  mesh.position.set((Math.random()-0.5)*W*0.5, h/2, (Math.random()-0.5)*L*0.5);
  mesh.castShadow = true;

  // Label
  var lc = document.createElement('canvas'); lc.width=256; lc.height=64;
  var lx = lc.getContext('2d');
  lx.fillStyle='rgba(0,0,0,0.7)'; lx.fillRect(0,0,256,64);
  lx.fillStyle='#fff'; lx.font='bold 24px sans-serif'; lx.textAlign='center';
  lx.fillText(e+' '+l,128,40);
  var sp = new THREE.Sprite(new THREE.SpriteMaterial({map:new THREE.CanvasTexture(lc),transparent:true}));
  sp.scale.set(1.4,0.35,1); sp.position.set(0,h/2+0.4,0);
  mesh.add(sp);

  var id = Date.now();
  mesh.userData.id = id;
  scene.add(mesh);
  var item = {id:id,t:t,l:l,w:w,d:d,h:h,mesh:mesh,rotY:0};
  furniture.push(item);
  selected = item; highlight();
}

function highlight() {
  furniture.forEach(function(it){
    it.mesh.material.emissive = new THREE.Color(it===selected?0xc9a84c:0x000000);
    it.mesh.material.emissiveIntensity = it===selected?0.5:0;
  });
}

function clearAll() {
  furniture.forEach(function(it){ scene.remove(it.mesh); });
  furniture=[]; selected=null;
}

function rotateSel() {
  if(!selected) return;
  selected.rotY += Math.PI/2; selected.mesh.rotation.y = selected.rotY;
  var tmp=selected.w; selected.w=selected.d; selected.d=tmp;
  selected.mesh.geometry.dispose();
  selected.mesh.geometry = new THREE.BoxGeometry(selected.w,selected.h,selected.d);
}

function loop() {
  camera.position.set(dist*Math.sin(phi)*Math.cos(theta), dist*Math.cos(phi), dist*Math.sin(phi)*Math.sin(theta));
  camera.lookAt(0, H*0.4, 0);
  renderer.render(scene, camera);
  requestAnimationFrame(loop);
}

function getHit(cx,cy) {
  var canvas=document.getElementById('canvas3d');
  var rect=canvas.getBoundingClientRect();
  mouse.x=((cx-rect.left)/rect.width)*2-1;
  mouse.y=-((cy-rect.top)/rect.height)*2+1;
  raycaster.setFromCamera(mouse,camera);
  var meshes=furniture.map(function(i){return i.mesh;});
  var hits=raycaster.intersectObjects(meshes,false);
  if(hits.length){ var id=hits[0].object.userData.id; return furniture.find(function(i){return i.id===id;}); }
  return null;
}

function getFloor(cx,cy) {
  var canvas=document.getElementById('canvas3d');
  var rect=canvas.getBoundingClientRect();
  mouse.x=((cx-rect.left)/rect.width)*2-1;
  mouse.y=-((cy-rect.top)/rect.height)*2+1;
  raycaster.setFromCamera(mouse,camera);
  var t=new THREE.Vector3();
  raycaster.ray.intersectPlane(dragPlane,t);
  return t;
}

function attachControls(canvas) {
  canvas.addEventListener('mousedown',function(e){
    var hit=getHit(e.clientX,e.clientY);
    if(hit){selected=hit;highlight();dragFurn=true;dragging=false;}
    else{dragFurn=false;dragging=true;}
    lastX=e.clientX;lastY=e.clientY;
  });
  window.addEventListener('mousemove',function(e){
    if(dragFurn&&selected){
      var pt=getFloor(e.clientX,e.clientY);
      if(pt){selected.mesh.position.x=Math.max(-W/2+0.3,Math.min(W/2-0.3,pt.x));selected.mesh.position.z=Math.max(-L/2+0.3,Math.min(L/2-0.3,pt.z));}
    } else if(dragging){
      theta+=(e.clientX-lastX)*0.008;
      phi=Math.min(1.2,Math.max(0.3,phi-(e.clientY-lastY)*0.006));
      lastX=e.clientX;lastY=e.clientY;
    }
  });
  window.addEventListener('mouseup',function(){dragging=false;dragFurn=false;});
  canvas.addEventListener('wheel',function(e){e.preventDefault();dist=Math.min(30,Math.max(3,dist+e.deltaY*0.01));},{passive:false});

  canvas.addEventListener('touchstart',function(e){
    e.preventDefault();
    if(e.touches.length===1){
      var t=e.touches[0];
      var hit=getHit(t.clientX,t.clientY);
      if(hit){selected=hit;highlight();dragFurn=true;dragging=false;}
      else{dragFurn=false;dragging=true;}
      lastX=t.clientX;lastY=t.clientY;
    } else if(e.touches.length===2){
      dragging=false;dragFurn=false;
      pinchDist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    }
  },{passive:false});
  canvas.addEventListener('touchmove',function(e){
    e.preventDefault();
    if(e.touches.length===1){
      var t=e.touches[0];
      if(dragFurn&&selected){
        var pt=getFloor(t.clientX,t.clientY);
        if(pt){selected.mesh.position.x=Math.max(-W/2+0.3,Math.min(W/2-0.3,pt.x));selected.mesh.position.z=Math.max(-L/2+0.3,Math.min(L/2-0.3,pt.z));}
      } else if(dragging){
        theta+=(t.clientX-lastX)*0.01;
        phi=Math.min(1.2,Math.max(0.3,phi-(t.clientY-lastY)*0.008));
        lastX=t.clientX;lastY=t.clientY;
      }
    } else if(e.touches.length===2){
      var d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
      dist=Math.min(30,Math.max(3,dist*(pinchDist/d)));pinchDist=d;
    }
  },{passive:false});
  canvas.addEventListener('touchend',function(){dragging=false;dragFurn=false;});
}

init();
</script>
</body>
</html>
