<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Lamsa 3D Planner</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--gold:#c9a84c;--gold-dim:rgba(201,168,76,0.15);--dark:#0a0a0a;--card:#111;--border:#222;--text:#fff;--sub:#777;}
html,body{width:100%;height:100%;overflow:hidden;background:var(--dark);color:var(--text);font-family:'Segoe UI',sans-serif;}

/* LAYOUT */
#app{display:flex;flex-direction:column;height:100vh;}
#header{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:#0d0d0d;border-bottom:1px solid var(--border);flex-shrink:0;gap:8px;z-index:10;}
#main{display:flex;flex:1;min-height:0;}
#sidebar{width:210px;background:#0d0d0d;border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden;}
#canvas-wrap{flex:1;position:relative;overflow:hidden;background:#0d0d0d;}
#toolbar{background:#0d0d0d;border-top:1px solid var(--border);padding:8px 14px;flex-shrink:0;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}

/* HEADER BUTTONS */
.logo{color:var(--gold);font-weight:800;font-size:15px;letter-spacing:1px;white-space:nowrap;}
.hbtn{background:var(--card);border:1px solid var(--border);color:var(--text);padding:7px 13px;border-radius:8px;font-size:12px;cursor:pointer;font-weight:600;white-space:nowrap;transition:border-color 0.2s,background 0.2s;}
.hbtn:hover{border-color:var(--gold);}
.hbtn.gold{background:var(--gold);color:#000;border-color:var(--gold);font-weight:700;}
.hbtn.on{background:var(--gold-dim);border-color:var(--gold);color:var(--gold);}

/* SIDEBAR */
#stabs{display:flex;border-bottom:1px solid var(--border);}
.stab{flex:1;padding:10px 4px;text-align:center;font-size:11px;color:var(--sub);cursor:pointer;border-bottom:2px solid transparent;transition:all 0.2s;}
.stab.active{color:var(--gold);border-bottom-color:var(--gold);}
#scontent{flex:1;overflow-y:auto;padding:8px;}
#scontent::-webkit-scrollbar{width:3px;}
#scontent::-webkit-scrollbar-thumb{background:var(--gold);border-radius:2px;}

.s-label{font-size:10px;color:var(--sub);margin-bottom:5px;text-transform:uppercase;letter-spacing:1px;}
.s-select{width:100%;background:#1a1a1a;border:1px solid var(--border);color:var(--text);padding:8px;border-radius:8px;font-size:12px;margin-bottom:10px;outline:none;}
.s-select:focus{border-color:var(--gold);}
.cat-title{font-size:10px;color:var(--sub);margin:8px 0 5px;text-transform:uppercase;letter-spacing:1px;}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:6px;}
.fitem{background:#1a1a1a;border:1px solid var(--border);border-radius:8px;padding:8px 4px;text-align:center;cursor:pointer;transition:all 0.2s;user-select:none;}
.fitem:hover,.fitem.active{border-color:var(--gold);background:var(--gold-dim);}
.fitem .fi{font-size:20px;display:block;margin-bottom:3px;}
.fitem .fn{font-size:9px;color:var(--sub);line-height:1.2;}

/* ROOM SETTINGS */
.s-row{margin-bottom:10px;}
.s-inp{width:100%;background:#1a1a1a;border:1px solid var(--border);color:var(--text);padding:8px;border-radius:6px;font-size:12px;outline:none;}
.s-inp:focus{border-color:var(--gold);}
.s-btn{width:100%;background:var(--gold);color:#000;border:none;padding:9px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;margin-top:4px;}

/* TOOLBAR */
.tbtn{background:var(--card);border:1px solid var(--border);color:var(--text);padding:7px 12px;border-radius:8px;font-size:12px;cursor:pointer;font-weight:600;display:flex;align-items:center;gap:4px;transition:all 0.2s;white-space:nowrap;}
.tbtn:hover{border-color:var(--gold);}
.tbtn.danger{color:#e55;}
.tbtn.danger:hover{border-color:#e55;background:rgba(238,85,85,0.08);}
#tb-info{font-size:11px;color:var(--sub);margin-left:auto;white-space:nowrap;}

/* OVERLAYS */
#hint{position:absolute;top:12px;left:50%;transform:translateX(-50%);background:rgba(201,168,76,0.92);color:#000;padding:8px 18px;border-radius:20px;font-size:12px;font-weight:700;pointer-events:none;display:none;z-index:5;white-space:nowrap;}
#hint.show{display:block;}
#sel-panel{display:none;position:absolute;top:12px;right:12px;background:#111;border:1px solid var(--border);border-radius:12px;padding:14px;min-width:148px;z-index:10;}
#sel-panel.show{display:block;}
#sel-name{color:var(--gold);font-weight:700;font-size:13px;margin-bottom:10px;}
.sp-btn{width:100%;background:#1a1a1a;border:1px solid var(--border);color:var(--text);padding:8px;border-radius:6px;font-size:11px;cursor:pointer;margin-bottom:5px;font-weight:600;transition:all 0.2s;text-align:left;}
.sp-btn:hover{border-color:var(--gold);}
.sp-btn.del{color:#e55;border-color:#311;}
.sp-btn.del:hover{border-color:#e55;}
#view-badge{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);background:rgba(17,17,17,0.85);border:1px solid var(--border);color:var(--sub);padding:5px 12px;border-radius:20px;font-size:10px;pointer-events:none;white-space:nowrap;}

@media(max-width:640px){
  #sidebar{position:fixed;left:-220px;top:0;bottom:0;z-index:100;transition:left 0.25s;width:220px;}
  #sidebar.open{left:0;}
  #sb-tog{display:block!important;}
  #overlay{display:none;position:fixed;inset:0;z-index:99;background:rgba(0,0,0,0.5);}
  #overlay.show{display:block;}
}
</style>
</head>
<body>
<div id="app">

<!-- HEADER -->
<div id="header">
  <div class="logo">✦ LAMSA 3D</div>
  <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;">
    <button class="hbtn" id="sb-tog" style="display:none" onclick="toggleSidebar()">☰</button>
    <button class="hbtn on" id="btn3d" onclick="setView('3d')">🧊 3D</button>
    <button class="hbtn" id="btnTop" onclick="setView('top')">📐 Top</button>
    <button class="hbtn" onclick="doResetCam()">⊙ Reset</button>
    <button class="hbtn" onclick="doClearAll()">🗑 Clear</button>
    <button class="hbtn gold" onclick="doSave()">✓ Done</button>
  </div>
</div>

<!-- MAIN -->
<div id="main">
  <div id="sidebar">
    <div id="stabs">
      <div class="stab active" id="tab-items" onclick="switchTab('items')">🛋 Items</div>
      <div class="stab" id="tab-room" onclick="switchTab('room')">⚙️ Room</div>
    </div>
    <div id="scontent"></div>
  </div>
  <div id="canvas-wrap">
    <div id="overlay" onclick="toggleSidebar()"></div>
    <canvas id="c"></canvas>
    <div id="hint">Click on the floor to place</div>
    <div id="sel-panel">
      <div id="sel-name">Selected</div>
      <button class="sp-btn" onclick="doRotate()">↻ Rotate 90°</button>
      <button class="sp-btn" onclick="doDuplicate()">⧉ Duplicate</button>
      <button class="sp-btn del" onclick="doDelete()">✕ Delete</button>
    </div>
    <div id="view-badge">3D View — drag to orbit · scroll to zoom</div>
  </div>
</div>

<!-- TOOLBAR -->
<div id="toolbar">
  <button class="tbtn" onclick="doRotate()">↻ Rotate</button>
  <button class="tbtn" onclick="doDuplicate()">⧉ Copy</button>
  <button class="tbtn danger" onclick="doDelete()">✕ Remove</button>
  <div id="tb-info">Click a furniture item to start placing</div>
</div>

</div>

}

const ROOM_LABELS = {bedroom:'🛏 Bedroom',living:'🛋 Living Room',kitchen:'🍳 Kitchen',bathroom:'🛁 Bathroom',office:'💻 Office',dining:'🍽 Dining Room',kids:'🧸 Kids Room'};

// ═══════════════════════════════════════════════════════
// THREE.JS SCENE
// ═══════════════════════════════════════════════════════
const canvas = document.getElementById('c');
const wrap   = document.getElementById('canvas-wrap');

const renderer = new THREE.WebGLRenderer({canvas, antialias:true, alpha:false});
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0d0d0d);
scene.fog = new THREE.Fog(0x0d0d0d, 12, 30);

// Perspective camera (3D view)
const camera = new THREE.PerspectiveCamera(52, 1, 0.1, 100);

// Orthographic camera (top view)
const topCam = new THREE.OrthographicCamera(-8,8,8,-8,0.1,100);
topCam.position.set(0,18,0);
topCam.lookAt(0,0,0);

// Orbit controls
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.07;
controls.minDistance = 1.5;
controls.maxDistance = 22;
controls.maxPolarAngle = Math.PI / 2 - 0.02;

// ── Lighting ──
scene.add(new THREE.AmbientLight(0xffffff, 0.45));

const sun = new THREE.DirectionalLight(0xffffff, 1.4);
sun.position.set(6, 12, 6);
sun.castShadow = true;
sun.shadow.mapSize.set(2048,2048);
sun.shadow.camera.near = 0.1;
sun.shadow.camera.far = 50;
sun.shadow.camera.left = sun.shadow.camera.bottom = -12;
sun.shadow.camera.right = sun.shadow.camera.top = 12;
scene.add(sun);

const fill = new THREE.DirectionalLight(0xC9A84C, 0.25);
fill.position.set(-6, 4, -4);
scene.add(fill);

const back = new THREE.DirectionalLight(0x4488aa, 0.15);
back.position.set(0, 3, 8);
scene.add(back);

// ── Groups ──
const roomGroup = new THREE.Group();
const furnGroup = new THREE.Group();
scene.add(roomGroup, furnGroup);

// ═══════════════════════════════════════════════════════
// ROOM BUILDER
// ═══════════════════════════════════════════════════════
let RW = 5, RD = 4, RH = 2.7;
let gridMesh = null;

const MAT = {
  floor: new THREE.MeshStandardMaterial({color:0x1C1C1C, roughness:0.7, metalness:0.05}),
  wall:  new THREE.MeshStandardMaterial({color:0x2A2A2A, roughness:0.85, metalness:0.0, side:THREE.FrontSide}),
  ceil:  new THREE.MeshStandardMaterial({color:0x111111, roughness:0.9}),
  gold:  new THREE.MeshStandardMaterial({color:0xC9A84C, roughness:0.3, metalness:0.8}),
};

function buildRoom() {
  while(roomGroup.children.length) roomGroup.remove(roomGroup.children[0]);

  const T = 0.12;

  // Floor
  const floor = new THREE.Mesh(new THREE.BoxGeometry(RW,0.08,RD), MAT.floor);
  floor.position.y = -0.04;
  floor.receiveShadow = true;
  floor.userData.isFloor = true;
  roomGroup.add(floor);

  // Ceiling
  const ceil = new THREE.Mesh(new THREE.BoxGeometry(RW,0.08,RD), MAT.ceil);
  ceil.position.y = RH + 0.04;
  roomGroup.add(ceil);

  // Walls
  [
    {p:[0,RH/2,-RD/2-T/2], s:[RW,RH,T]},          // North
    {p:[0,RH/2, RD/2+T/2], s:[RW+T*2,RH,T]},       // South
    {p:[-RW/2-T/2,RH/2,0], s:[T,RH,RD]},           // West
    {p:[ RW/2+T/2,RH/2,0], s:[T,RH,RD]},           // East
  ].forEach(w => {
    const m = new THREE.Mesh(new THREE.BoxGeometry(...w.s), MAT.wall);
    m.position.set(...w.p);
    m.receiveShadow = true;
    roomGroup.add(m);
  });

  // Gold skirting board
  [
    {p:[0,0.025,-RD/2],   s:[RW,0.05,0.04]},
    {p:[0,0.025, RD/2],   s:[RW,0.05,0.04]},
    {p:[-RW/2,0.025,0],   s:[0.04,0.05,RD]},
    {p:[ RW/2,0.025,0],   s:[0.04,0.05,RD]},
  ].forEach(t => {
    const m = new THREE.Mesh(new THREE.BoxGeometry(...t.s), MAT.gold);
    m.position.set(...t.p);
    roomGroup.add(m);
  });

  // Floor grid
  if(gridMesh) scene.remove(gridMesh);
  gridMesh = new THREE.GridHelper(Math.max(RW,RD)*3, Math.max(RW,RD)*6, 0x2A2A2A, 0x1A1A1A);
  gridMesh.position.y = 0.002;
  scene.add(gridMesh);

  resetCam();
}

function resetCam() {
  const d = Math.sqrt(RW*RW+RD*RD);
  camera.position.set(RW*0.55, d*0.65, RD*1.05);
  camera.lookAt(0, RH/3, 0);
  controls.target.set(0, RH/3, 0);
  controls.update();

  const asp = wrap.clientWidth / wrap.clientHeight;
  const vs  = Math.max(RW, RD) * 0.65;
  topCam.left   = -vs*asp; topCam.right  =  vs*asp;
  topCam.top    =  vs;     topCam.bottom = -vs;
  topCam.updateProjectionMatrix();
}

// ═══════════════════════════════════════════════════════
// FURNITURE MESH FACTORY
// ═══════════════════════════════════════════════════════
function makeMesh(def, ghost=false) {
  const opts = {roughness:0.58,metalness:0.08,transparent:ghost,opacity:ghost?0.42:1.0};
  const body = new THREE.MeshStandardMaterial({color:def.c, ...opts});
  const top  = new THREE.MeshStandardMaterial({color:def.tc,...opts, roughness:0.35, metalness:0.18});

  const g = new THREE.Group();
  g.userData.def = def;

  // Body
  const bh = def.h * 0.88;
  const bm = new THREE.Mesh(new THREE.BoxGeometry(def.w, bh, def.d), body);
  bm.position.y = bh/2;
  bm.castShadow = !ghost;
  bm.receiveShadow = !ghost;
  g.add(bm);

  // Top accent strip
  const th = def.h * 0.06;
  const tm = new THREE.Mesh(new THREE.BoxGeometry(def.w*0.98, th, def.d*0.98), top);
  tm.position.y = bh + th/2;
  g.add(tm);

  // Small legs for tall furniture
  if(def.h > 0.6 && def.h < 1.0) {
    const legMat = new THREE.MeshStandardMaterial({color:def.c, roughness:0.8, transparent:ghost, opacity:ghost?0.4:1});
    [[0.4,0.4],[0.4,-0.4],[-0.4,0.4],[-0.4,-0.4]].forEach(([lx,lz])=>{
      const lm = new THREE.Mesh(new THREE.CylinderGeometry(0.025,0.025,0.08,8), legMat);
      lm.position.set(lx*(def.w/2-0.05), 0.04, lz*(def.d/2-0.05));
      // Clamp legs inside furniture bounds
      if(Math.abs(lm.position.x) < def.w/2 && Math.abs(lm.position.z) < def.d/2) g.add(lm);
    });
  }

  return g;
}

// ═══════════════════════════════════════════════════════
// PLACEMENT SYSTEM
// ═══════════════════════════════════════════════════════
const placed = [];
let placing = null;
let ghost   = null;
const floorPlane = new THREE.Plane(new THREE.Vector3(0,1,0), 0);
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

function startPlace(def) {
  placing = def;
  if(ghost) scene.remove(ghost);
  ghost = makeMesh(def, true);
  scene.add(ghost);
  controls.enabled = false;
  showHint('Click on the floor to place — ESC to cancel');
  deselect();
}

function cancelPlace() {
  placing = null;
  if(ghost){ scene.remove(ghost); ghost=null; }
  controls.enabled = !isTop;
  document.getElementById('hint').classList.remove('show');
  document.querySelectorAll('.fitem').forEach(e=>e.classList.remove('active'));
}

function doPlace(x,z) {
  const m = makeMesh(placing);
  m.position.set(snap(x),0,snap(z));
  furnGroup.add(m);
  placed.push({mesh:m, def:placing});
  save();
  cancelPlace();
}

function snap(v){ return Math.round(v*10)/10; }

function showHint(t){ const h=document.getElementById('hint'); h.textContent=t; h.classList.add('show'); }

// ═══════════════════════════════════════════════════════
// SELECTION & DRAG
// ═══════════════════════════════════════════════════════
let sel = null, dragging=false, dragOff=new THREE.Vector3();

function select(item) {
  deselect();
  sel = item;
  item.mesh.traverse(c=>{ if(c.isMesh) c.material.emissive=new THREE.Color(0x3A2000); });
  document.getElementById('sel-panel').classList.add('show');
  document.getElementById('sel-name').textContent = item.def.name;
  document.getElementById('tb-info').textContent = '✦ '+item.def.name+' selected — drag to move · R to rotate';
}

function deselect() {
  if(sel) sel.mesh.traverse(c=>{ if(c.isMesh) c.material.emissive=new THREE.Color(0x000000); });
  sel=null;
  document.getElementById('sel-panel').classList.remove('show');
  document.getElementById('tb-info').textContent = 'Click a furniture item to start placing';
}

window.doRotate = function(){ if(!sel) return; sel.mesh.rotation.y+=Math.PI/2; save(); };
window.doDuplicate = function(){
  if(!sel) return;
  const m=makeMesh(sel.def);
  m.position.copy(sel.mesh.position); m.position.x+=0.6;
  m.rotation.copy(sel.mesh.rotation);
  furnGroup.add(m); placed.push({mesh:m,def:sel.def}); save();
};
window.doDelete = function(){ if(!sel) return; furnGroup.remove(sel.mesh); placed.splice(placed.indexOf(sel),1); deselect(); save(); };
window.doClearAll = function(){
  if(!placed.length) return;
  if(!confirm('Remove all furniture from the room?')) return;
  while(furnGroup.children.length) furnGroup.remove(furnGroup.children[0]);
  placed.length=0; deselect(); save();
};
window.doResetCam = resetCam;

// ═══════════════════════════════════════════════════════
// MOUSE / TOUCH
// ═══════════════════════════════════════════════════════
function getND(e){
  const r=canvas.getBoundingClientRect();
  const cx=e.touches?e.touches[0].clientX:e.clientX;
  const cy=e.touches?e.touches[0].clientY:e.clientY;
  mouse.x=((cx-r.left)/r.width)*2-1;
  mouse.y=-((cy-r.top)/r.height)*2+1;
}

function floorPt(){
  const cam=isTop?topCam:camera;
  raycaster.setFromCamera(mouse,cam);
  const pt=new THREE.Vector3();
  return raycaster.ray.intersectPlane(floorPlane,pt)?pt:null;
}

function pickFurn(){
  const cam=isTop?topCam:camera;
  raycaster.setFromCamera(mouse,cam);
  const ms=[];
  furnGroup.traverse(o=>{ if(o.isMesh) ms.push(o); });
  const h=raycaster.intersectObjects(ms);
  if(!h.length) return null;
  let o=h[0].object;
  while(o.parent&&!placed.find(i=>i.mesh===o)) o=o.parent;
  return placed.find(i=>i.mesh===o)||null;
}

canvas.addEventListener('mousemove',e=>{
  getND(e);
  if(placing&&ghost){ const p=floorPt(); if(p) ghost.position.set(snap(p.x),0,snap(p.z)); return; }
  if(dragging&&sel){ const p=floorPt(); if(p){ sel.mesh.position.x=snap(p.x-dragOff.x); sel.mesh.position.z=snap(p.z-dragOff.z); } }
});

canvas.addEventListener('mousedown',e=>{
  if(e.button!==0) return;
  getND(e);
  if(placing){ const p=floorPt(); if(p) doPlace(p.x,p.z); return; }
  const item=pickFurn();
  if(item){
    select(item); dragging=true;
    const p=floorPt(); if(p){ dragOff.x=p.x-item.mesh.position.x; dragOff.z=p.z-item.mesh.position.z; }
    controls.enabled=false; e.stopPropagation();
  } else { deselect(); }
});

canvas.addEventListener('mouseup',()=>{ if(dragging){ dragging=false; controls.enabled=!isTop; save(); } });

// Touch support
canvas.addEventListener('touchmove',e=>{ e.preventDefault(); getND(e);
  if(placing&&ghost){ const p=floorPt(); if(p) ghost.position.set(snap(p.x),0,snap(p.z)); }
},{passive:false});
canvas.addEventListener('touchstart',e=>{ getND(e);
  if(placing){ const p=floorPt(); if(p){ doPlace(p.x,p.z); } }
},{passive:true});

document.addEventListener('keydown',e=>{
  if(e.key==='Escape') cancelPlace();
  if(e.key==='Delete'||e.key==='Backspace') window.doDelete();
  if(e.key==='r'||e.key==='R') window.doRotate();
});

// ═══════════════════════════════════════════════════════
// VIEW TOGGLE
// ═══════════════════════════════════════════════════════
let isTop=false;

window.setView=function(mode){
  isTop=(mode==='top');
  document.getElementById('btn3d').classList.toggle('on',!isTop);
  document.getElementById('btnTop').classList.toggle('on', isTop);
  document.getElementById('view-badge').textContent = isTop
    ? 'Top View — click item then click floor · drag to move'
    : '3D View — drag to orbit · scroll to zoom';
  controls.enabled = !isTop && !placing;
};

// ═══════════════════════════════════════════════════════
// SIDEBAR UI
// ═══════════════════════════════════════════════════════
let curRoom='bedroom';

function buildItems(rt){
  curRoom=rt;
  const items=CAT[rt]||CAT.bedroom;
  document.getElementById('scontent').innerHTML=`
    <div class="s-label">Room Type</div>
    <select class="s-select" onchange="changeRoom(this.value)">
      ${Object.keys(CAT).map(k=>`<option value="${k}"${k===rt?' selected':''}>${ROOM_LABELS[k]||k}</option>`).join('')}
    </select>
    <div class="cat-title">📦 Furniture — click to place</div>
    <div class="fgrid">
      ${items.map(d=>`
        <div class="fitem" onclick="pickItem('${d.id}',this)" data-id="${d.id}">
          <span class="fi">${d.icon}</span>
          <span class="fn">${d.name}</span>
        </div>`).join('')}
    </div>
    <div style="font-size:9px;color:#333;margin-top:6px;text-align:center;">
      ↻ R key = rotate · Del = delete selected
    </div>`;
}

function buildRoomSettings(){
  document.getElementById('scontent').innerHTML=`
    <div class="s-row"><div class="s-label">Room Width (m)</div><input type="number" class="s-inp" id="inp-w" value="${RW}" min="2" max="15" step="0.5"></div>
    <div class="s-row"><div class="s-label">Room Length (m)</div><input type="number" class="s-inp" id="inp-d" value="${RD}" min="2" max="15" step="0.5"></div>
    <div class="s-row"><div class="s-label">Ceiling Height (m)</div><input type="number" class="s-inp" id="inp-h" value="${RH}" min="2.0" max="5.0" step="0.1"></div>
    <button class="s-btn" onclick="applyDims()">✓ Apply</button>`;
}

window.switchTab=function(t){
  document.getElementById('tab-items').classList.toggle('active',t==='items');
  document.getElementById('tab-room').classList.toggle('active',t==='room');
  t==='items'?buildItems(curRoom):buildRoomSettings();
};

window.changeRoom=function(val){ buildItems(val); try{window.parent.postMessage({type:'lamsa_room_change',roomType:val},'*');}catch(e){} };
window.pickItem=function(id,el){
  const def=allDefs.find(d=>d.id===id); if(!def) return;
  document.querySelectorAll('.fitem').forEach(e=>e.classList.remove('active'));
  el.classList.add('active');
  startPlace(def);
};
window.applyDims=function(){
  RW=Math.max(2,Math.min(15,parseFloat(document.getElementById('inp-w').value)||5));
  RD=Math.max(2,Math.min(15,parseFloat(document.getElementById('inp-d').value)||4));
  RH=Math.max(2,Math.min(5, parseFloat(document.getElementById('inp-h').value)||2.7));
  buildRoom();
};
window.toggleSidebar=function(){
  const s=document.getElementById('sidebar');
  const o=document.getElementById('overlay');
  s.classList.toggle('open');
  o.classList.toggle('show');
};

// ═══════════════════════════════════════════════════════
// SAVE / LOAD / DESCRIPTION
// ═══════════════════════════════════════════════════════
function save(){
  try{
    localStorage.setItem('lamsa_planner',JSON.stringify({
      RW,RD,RH,roomType:curRoom,
      items:placed.map(i=>({id:i.def.id,x:i.mesh.position.x,z:i.mesh.position.z,ry:i.mesh.rotation.y}))
    }));
  }catch(e){}
}

function load(){
  try{
    const d=JSON.parse(localStorage.getItem('lamsa_planner')||'null');
    if(!d) return;
    if(d.RW) RW=d.RW; if(d.RD) RD=d.RD; if(d.RH) RH=d.RH;
    buildRoom();
    if(d.roomType) buildItems(d.roomType);
    (d.items||[]).forEach(s=>{
      const def=allDefs.find(x=>x.id===s.id); if(!def) return;
      const m=makeMesh(def);
      m.position.set(s.x,0,s.z); m.rotation.y=s.ry||0;
      furnGroup.add(m); placed.push({mesh:m,def});
    });
  }catch(e){}
}

function describe(){
  if(!placed.length) return '';
  return placed.map(i=>{
    const x=i.mesh.position.x, z=i.mesh.position.z;
    let pos='center';
    if(Math.abs(z+RD/2)<0.9)     pos='North wall';
    else if(Math.abs(z-RD/2)<0.9) pos='South wall';
    else if(Math.abs(x+RW/2)<0.9) pos='West wall';
    else if(Math.abs(x-RW/2)<0.9) pos='East wall';
    return i.def.name+' ('+pos+')';
  }).join(', ');
}

window.getFpDescription=describe;

window.doSave=function(){
  save();
  try{ window.parent.postMessage({type:'lamsa_planner_done',description:describe()},'*'); }catch(e){}
  if(window.parent===window) window.history.back();
};

// ═══════════════════════════════════════════════════════
// RESIZE & RENDER LOOP
// ═══════════════════════════════════════════════════════
function resize(){
  const w=wrap.clientWidth, h=wrap.clientHeight;
  renderer.setSize(w,h);
  camera.aspect=w/h; camera.updateProjectionMatrix();
  const asp=w/h, vs=Math.max(RW,RD)*0.65;
  topCam.left=-vs*asp; topCam.right=vs*asp; topCam.top=vs; topCam.bottom=-vs;
  topCam.updateProjectionMatrix();
}
window.addEventListener('resize',resize);

function animate(){
  requestAnimationFrame(animate);
  if(!isTop) controls.update();
  renderer.render(scene, isTop?topCam:camera);
}

// ═══════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════
const params=new URLSearchParams(location.search);
if(params.get('embedded')) document.getElementById('header').style.display='none';

const initRoom=params.get('room')||'bedroom';
buildRoom();
buildItems(initRoom);
load();
resize();
animate();

window.addEventListener('message',e=>{
  if(e.data&&e.data.type==='lamsa_set_room') buildItems(e.data.roomType);
});
</script>
