<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Lamsa 3D Planner</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--gold:#c9a84c;--gold2:rgba(201,168,76,0.18);--dark:#0a0a0f;--card:#141418;--border:#252530;--text:#f0f0f5;--sub:#666;}
html,body{width:100%;height:100%;overflow:hidden;background:var(--dark);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;}
#app{display:flex;flex-direction:column;height:100vh;}

/* HEADER */
#hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:#0d0d12;border-bottom:1px solid var(--border);flex-shrink:0;gap:8px;z-index:10;}
.logo{color:var(--gold);font-weight:900;font-size:15px;letter-spacing:2px;}
.hbtn{background:var(--card);border:1px solid var(--border);color:var(--text);padding:7px 14px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;transition:all 0.18s;}
.hbtn:hover{border-color:var(--gold);}
.hbtn.on{background:var(--gold2);border-color:var(--gold);color:var(--gold);}
.hbtn.gold{background:var(--gold);color:#000;border-color:var(--gold);font-weight:800;}
.hbtn.red{color:#f55;}
.hbtn.red:hover{border-color:#f55;background:rgba(255,80,80,0.08);}

/* MAIN */
#main{display:flex;flex:1;min-height:0;}

/* SIDEBAR */
#sb{width:200px;background:#0d0d12;border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;}
#sb-tabs{display:flex;border-bottom:1px solid var(--border);}
.sbtab{flex:1;padding:10px 4px;text-align:center;font-size:11px;color:var(--sub);cursor:pointer;border-bottom:2px solid transparent;transition:all 0.18s;}
.sbtab.on{color:var(--gold);border-bottom-color:var(--gold);}
#sb-body{flex:1;overflow-y:auto;padding:8px;}
#sb-body::-webkit-scrollbar{width:3px;}
#sb-body::-webkit-scrollbar-thumb{background:var(--gold);}
.slabel{font-size:9px;color:var(--sub);text-transform:uppercase;letter-spacing:1px;margin:8px 0 5px;}
.sselect{width:100%;background:#1a1a22;border:1px solid var(--border);color:var(--text);padding:8px;border-radius:8px;font-size:12px;margin-bottom:8px;outline:none;}
.sselect:focus{border-color:var(--gold);}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-bottom:4px;}
.fi{background:#1a1a22;border:1px solid var(--border);border-radius:8px;padding:7px 3px;text-align:center;cursor:pointer;transition:all 0.15s;user-select:none;}
.fi:hover{border-color:var(--gold);background:var(--gold2);}
.fi.pick{border-color:var(--gold);background:var(--gold2);box-shadow:0 0 10px rgba(201,168,76,0.2);}
.fi .ico{font-size:19px;display:block;margin-bottom:2px;}
.fi .nm{font-size:9px;color:var(--sub);line-height:1.2;}
.sinp{width:100%;background:#1a1a22;border:1px solid var(--border);color:var(--text);padding:8px;border-radius:6px;font-size:12px;outline:none;margin-bottom:8px;}
.sinp:focus{border-color:var(--gold);}
.sbtn{width:100%;background:var(--gold);color:#000;border:none;padding:9px;border-radius:8px;font-size:12px;font-weight:800;cursor:pointer;}

/* CANVAS */
#cw{flex:1;position:relative;overflow:hidden;}
canvas{display:block;width:100%;height:100%;}

/* OVERLAYS */
#hint{position:absolute;top:12px;left:50%;transform:translateX(-50%);background:rgba(201,168,76,0.95);color:#000;padding:8px 20px;border-radius:24px;font-size:12px;font-weight:700;pointer-events:none;opacity:0;transition:opacity 0.2s;white-space:nowrap;}
#hint.show{opacity:1;}
#sel-box{display:none;position:absolute;top:12px;right:12px;background:#111118;border:1px solid var(--border);border-radius:12px;padding:14px;min-width:150px;}
#sel-box.show{display:block;}
#sel-nm{color:var(--gold);font-weight:700;font-size:13px;margin-bottom:10px;}
.spbtn{width:100%;background:#1a1a22;border:1px solid var(--border);color:var(--text);padding:8px;border-radius:6px;font-size:11px;cursor:pointer;margin-bottom:5px;font-weight:600;text-align:left;transition:all 0.15s;}
.spbtn:hover{border-color:var(--gold);}
.spbtn.del{color:#f55;}
.spbtn.del:hover{border-color:#f55;}
#badge{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);background:rgba(10,10,20,0.8);border:1px solid var(--border);color:var(--sub);padding:5px 14px;border-radius:20px;font-size:10px;pointer-events:none;white-space:nowrap;}

@media(max-width:600px){
  #sb{position:fixed;left:-205px;top:0;bottom:0;z-index:100;transition:left 0.22s;width:205px;}
  #sb.open{left:0;}
  #mob-tog{display:block!important;}
  #mob-ov{display:none;position:fixed;inset:0;z-index:99;background:rgba(0,0,0,0.55);}
  #mob-ov.show{display:block;}
}
</style>
</head>

<div id="app">
<div id="hdr">
  <div class="logo">✦ LAMSA 3D</div>
  <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;">
    <button class="hbtn" id="mob-tog" style="display:none" onclick="toggleSb()">☰</button>
    <button class="hbtn on" id="btn3d"  onclick="setView('3d')">🧊 3D</button>
    <button class="hbtn"    id="btnTop" onclick="setView('top')">📐 Top</button>
    <button class="hbtn"    onclick="resetCam()">⊙ Reset</button>
    <button class="hbtn red" onclick="clearAll()">🗑 Clear</button>
    <button class="hbtn gold" onclick="done()">✓ Done</button>
  </div>
</div>
<div id="main">
  <div id="sb">
    <div id="sb-tabs">
      <div class="sbtab on" id="t-items" onclick="showTab('items')">🛋 Items</div>
      <div class="sbtab"    id="t-room"  onclick="showTab('room')">⚙ Room</div>
    </div>
    <div id="sb-body"></div>
  </div>
  <div id="cw">
    <div id="mob-ov" onclick="toggleSb()"></div>
    <canvas id="c"></canvas>
    <div id="hint">Click on the floor to place</div>
    <div id="sel-box">
      <div id="sel-nm">—</div>
      <button class="spbtn" onclick="rotSel()">↻ Rotate 90°</button>
      <button class="spbtn" onclick="dupSel()">⧉ Duplicate</button>
      <button class="spbtn del" onclick="delSel()">✕ Delete</button>
    </div>
    <div id="badge">Drag to orbit · Scroll to zoom · Click furniture to move</div>
  </div>
</div>
</div>

<script src="js/three.min.js"></script>
<script src="js/OrbitControls.js"></script>

// ═══════════════════════════════════════
// FURNITURE BUILDERS — multi-part meshes
// ═══════════════════════════════════════
function mat(hex, r=0.6, m=0.06, tr=false, op=1){
  return new THREE.MeshStandardMaterial({color:hex,roughness:r,metalness:m,transparent:tr,opacity:op,side:THREE.FrontSide});
}
function box(w,h,d){ return new THREE.BoxGeometry(w,h,d); }
function cyl(r,h,s=16){ return new THREE.CylinderGeometry(r,r,h,s); }
function sph(r,s=12){ return new THREE.SphereGeometry(r,s,s); }

function mesh(geo,mat,x=0,y=0,z=0,rx=0,ry=0){
  const m=new THREE.Mesh(geo,mat); m.position.set(x,y,z); m.rotation.set(rx,ry,0);
  m.castShadow=true; m.receiveShadow=true; return m;
}

function grp(...children){ const g=new THREE.Group(); children.forEach(c=>g.add(c)); return g; }

// ─── BED ───
function mkBed(d){
  const c=mat(d.c,0.7,0.04), p=mat(d.p||0xEEDDCC,0.8,0.0), ac=mat(d.ac,0.3,0.5);
  const H=0.12, mh=0.22, bh=d.h-H-mh;
  const base = mesh(box(d.w,H,d.d),       c, 0, H/2, 0);
  const matt = mesh(box(d.w*0.96,mh,d.d*0.9), p, 0, H+mh/2, -d.d*0.03);
  const head = mesh(box(d.w, bh+0.05, 0.1),   ac, 0, H+bh/2, -d.d/2+0.05);
  const foot = mesh(box(d.w, bh*0.55, 0.07),  c,  0, H+bh*0.28, d.d/2-0.04);
  const p1   = mesh(sph(0.13), p, -d.w*0.28, H+mh+0.07,  -d.d*0.3);
  const p2   = mesh(sph(0.13), p,  d.w*0.28, H+mh+0.07,  -d.d*0.3);
  return grp(base,matt,head,foot,p1,p2);
}

// ─── SOFA ───
function mkSofa(d){
  const c=mat(d.c,0.72,0.03), ac=mat(d.ac,0.5,0.1);
  const sh=0.42, sw=d.w, sd=d.d;
  const seat  = mesh(box(sw,    sh*0.45, sd*0.55), c, 0, sh*0.45/2, sd*0.12);
  const back  = mesh(box(sw,    sh*0.7,  sd*0.22), c, 0, sh*0.45+sh*0.35, -sd*0.38);
  const armL  = mesh(box(sd*0.16, sh*0.62, sd),    c, -sw/2+sd*0.08, sh*0.31, 0);
  const armR  = mesh(box(sd*0.16, sh*0.62, sd),    c,  sw/2-sd*0.08, sh*0.31, 0);
  const cush  = mesh(box(sw*0.88, sh*0.18, sd*0.48),ac,0,sh*0.45+sh*0.09, sd*0.06);
  const legM  = mat(0x888888,0.5,0.5);
  const l1=mesh(cyl(0.03,0.12), legM, -sw/2+0.08, 0.06, -sd/2+0.08);
  const l2=mesh(cyl(0.03,0.12), legM,  sw/2-0.08, 0.06, -sd/2+0.08);
  const l3=mesh(cyl(0.03,0.12), legM, -sw/2+0.08, 0.06,  sd/2-0.08);
  const l4=mesh(cyl(0.03,0.12), legM,  sw/2-0.08, 0.06,  sd/2-0.08);
  return grp(seat,back,armL,armR,cush,l1,l2,l3,l4);
}

// ─── ARMCHAIR ───
function mkArmchair(d){
  const c=mat(d.c,0.72,0.03), ac=mat(d.ac,0.5,0.1);
  const seat  = mesh(box(d.w,      0.18, d.d*0.55), c, 0, 0.38, d.d*0.1);
  const back  = mesh(box(d.w,      0.32, d.d*0.2),  c, 0, 0.56, -d.d*0.38);
  const armL  = mesh(box(d.d*0.16, 0.28, d.d),      c, -d.w/2+d.d*0.08, 0.28, 0);
  const armR  = mesh(box(d.d*0.16, 0.28, d.d),      c,  d.w/2-d.d*0.08, 0.28, 0);
  const cush  = mesh(box(d.w*0.82, 0.08, d.d*0.46), ac, 0, 0.46, d.d*0.06);
  const legM  = mat(0x888888,0.5,0.5);
  const l1=mesh(cyl(0.025,0.1),legM,-d.w/2+0.07,0.05,-d.d/2+0.07);
  const l2=mesh(cyl(0.025,0.1),legM, d.w/2-0.07,0.05,-d.d/2+0.07);
  const l3=mesh(cyl(0.025,0.1),legM,-d.w/2+0.07,0.05, d.d/2-0.07);
  const l4=mesh(cyl(0.025,0.1),legM, d.w/2-0.07,0.05, d.d/2-0.07);
  return grp(seat,back,armL,armR,cush,l1,l2,l3,l4);
}

// ─── WARDROBE ───
function mkWard(d){
  const c=mat(d.c,0.6,0.05), ac=mat(d.ac,0.25,0.6), hm=mat(0x888888,0.4,0.7);
  const body  = mesh(box(d.w, d.h, d.d), c, 0, d.h/2, 0);
  const divL  = mesh(box(0.02, d.h*0.98, d.d*0.9), ac, -d.w/4, d.h/2, 0);

  const body = mesh(box(d.w,d.h,d.d), c, 0, d.h/2, 0);

  for(let i=0;i<n;i++){

    body.add(mesh(box(d.w*0.9,0.015,d.d*0.02),ac,0,y-d.h/2,d.d/2+0.001));
    body.add(mesh(sph(0.018),hm,0,y-d.h/2,d.d/2+0.018));
  }
  return grp(body);
}

const canvas = document.getElementById('c');

// ═══════════════════════════════════════
// ROOM
// ═══════════════════════════════════════
let RW=5, RD=4, RH=2.8;

const MATS = {
  floor: new THREE.MeshStandardMaterial({color:0x5C4830,roughness:0.7,metalness:0.04}),
  wall:  new THREE.MeshStandardMaterial({color:0x787880,roughness:0.78,metalness:0.0,side:THREE.DoubleSide}),
  gold:  new THREE.MeshStandardMaterial({color:0xC9A84C,roughness:0.28,metalness:0.82}),
};

function buildRoom(){
  while(roomGrp.children.length) roomGrp.remove(roomGrp.children[0]);
  const T=0.13;

  // Floor with subtle parquet lines
  const fl=new THREE.Mesh(new THREE.BoxGeometry(RW,0.1,RD),MATS.floor);
  fl.position.y=-0.05; fl.receiveShadow=true; fl.userData.isFloor=true;
  roomGrp.add(fl);

  // 4 walls, no ceiling
  [[0,RH/2,-RD/2-T/2,RW+T*2,RH,T],
   [0,RH/2, RD/2+T/2,RW+T*2,RH,T],
   [-RW/2-T/2,RH/2,0,T,RH,RD],
   [ RW/2+T/2,RH/2,0,T,RH,RD]
  ].forEach(([x,y,z,w,h,d])=>{
    const m=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),MATS.wall);
    m.position.set(x,y,z); m.receiveShadow=true; m.castShadow=true;
    roomGrp.add(m);
  });

  // Gold skirting
  [[0,0.035,-RD/2,RW,0.07,0.05],[0,0.035,RD/2,RW,0.07,0.05],
   [-RW/2,0.035,0,0.05,0.07,RD],[RW/2,0.035,0,0.05,0.07,RD]
  ].forEach(([x,y,z,w,h,d])=>{
    const m=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),MATS.gold);
    m.position.set(x,y,z); roomGrp.add(m);
  });

  // Grid
  scene.getObjectByName('grid')&&scene.remove(scene.getObjectByName('grid'));
  const gr=new THREE.GridHelper(Math.max(RW,RD)*2,Math.max(RW,RD)*4,0x3A2E18,0x241A08);
  gr.name='grid'; gr.position.y=0.002; scene.add(gr);

  // Update point light
  pt.position.set(0,RH*0.88,0);
  resetCam();
}

function resetCam(){
  const d=Math.max(RW,RD);
  camera.position.set(d*0.72, d*1.3, d*0.88);
  camera.lookAt(0,0.2,0);
  controls.target.set(0,0.2,0);
  controls.update();
  const asp=wrap.clientWidth/(wrap.clientHeight||1);
  const vs=d*0.72;
  topCam.left=-vs*asp; topCam.right=vs*asp; topCam.top=vs; topCam.bottom=-vs;
  topCam.updateProjectionMatrix();
}

const ray=new THREE.Raycaster();
const mouse=new THREE.Vector2();

// Selection ring
function makeRing(w,d){
  const geo=new THREE.RingGeometry(Math.max(w,d)*0.55,Math.max(w,d)*0.62,32);
  const m=new THREE.Mesh(geo,new THREE.MeshBasicMaterial({color:0xC9A84C,side:THREE.DoubleSide,transparent:true,opacity:0.85}));
  m.rotation.x=-Math.PI/2; m.position.y=0.008; return m;
}

function buildGhost(def){
  const g=def.mk(def);
  g.traverse(c=>{if(c.isMesh){c.material=c.material.clone();c.material.transparent=true;c.material.opacity=0.45;}});
  return g;
}

function startPlace(def){
  placing=def;
  if(ghost) scene.remove(ghost);
  ghost=buildGhost(def);
  scene.add(ghost);
  controls.enabled=false;
  showHint('Click on the floor to place — ESC to cancel');
  deselect();
}

function cancelPlace(){
  placing=null;
  if(ghost){scene.remove(ghost);ghost=null;}
  controls.enabled=!isTop;
  hideHint();
  document.querySelectorAll('.fi').forEach(e=>e.classList.remove('pick'));
}

function doPlace(x,z){
  const m=placing.mk(placing);
  m.position.set(snap(x),0,snap(z));
  furnGrp.add(m);
  const ring=makeRing(placing.w,placing.d);
  m.add(ring); ring.visible=false;
  placed.push({mesh:m,def:placing,ring});
  save(); cancelPlace();
}

function snap(v){return Math.round(v/0.1)*0.1;}

function getNDC(e){
  const r=canvas.getBoundingClientRect();
  const cx=e.touches?e.touches[0].clientX:e.clientX;
  const cy=e.touches?e.touches[0].clientY:e.clientY;
  mouse.x=((cx-r.left)/r.width)*2-1;
  mouse.y=-((cy-r.top)/r.height)*2+1;
}

function getFloorPt(){
  const cam=isTop?topCam:camera;
  ray.setFromCamera(mouse,cam);
  const pt=new THREE.Vector3();
  return ray.ray.intersectPlane(floorPlane,pt)?pt:null;
}

function pickPlaced(){
  const cam=isTop?topCam:camera;
  ray.setFromCamera(mouse,cam);
  const ms=[]; furnGrp.traverse(o=>{if(o.isMesh&&o.geometry.type!=='RingGeometry') ms.push(o);});
  const hits=ray.intersectObjects(ms);
  if(!hits.length) return null;
  let o=hits[0].object;
  while(o.parent&&o.parent!==furnGrp) o=o.parent;
  return placed.find(i=>i.mesh===o)||null;
}

function select(item){
  deselect();
  sel=item;
  item.ring.visible=true;
  document.getElementById('sel-box').classList.add('show');
  document.getElementById('sel-nm').textContent=item.def.n;
}

function deselect(){
  if(sel){sel.ring.visible=false;}
  sel=null;
  document.getElementById('sel-box').classList.remove('show');
}

// ── Mouse ──
canvas.addEventListener('mousemove',e=>{
  getNDC(e);
  if(placing&&ghost){const p=getFloorPt();if(p) ghost.position.set(snap(p.x),0,snap(p.z));}
  if(dragging&&sel){const p=getFloorPt();if(p){sel.mesh.position.x=snap(p.x-dragOff.x);sel.mesh.position.z=snap(p.z-dragOff.z);}}
});

canvas.addEventListener('mousedown',e=>{
  if(e.button!==0) return;
  getNDC(e);
  if(placing){const p=getFloorPt();if(p) doPlace(p.x,p.z);return;}
  const item=pickPlaced();
  if(item){
    if(sel===item){dragging=true;const p=getFloorPt();if(p){dragOff.x=p.x-item.mesh.position.x;dragOff.z=p.z-item.mesh.position.z;}controls.enabled=false;e.stopPropagation();}
    else select(item);
  } else deselect();
});

canvas.addEventListener('mouseup',()=>{if(dragging){dragging=false;controls.enabled=!isTop;save();}});
canvas.addEventListener('mouseleave',()=>{if(dragging){dragging=false;controls.enabled=!isTop;save();}});

// ── Touch ──
canvas.addEventListener('touchstart',e=>{getNDC(e);if(placing){const p=getFloorPt();if(p) doPlace(p.x,p.z);}},{passive:true});
canvas.addEventListener('touchmove',e=>{e.preventDefault();getNDC(e);
  if(placing&&ghost){const p=getFloorPt();if(p) ghost.position.set(snap(p.x),0,snap(p.z));}
  if(dragging&&sel){const p=getFloorPt();if(p){sel.mesh.position.x=snap(p.x-dragOff.x);sel.mesh.position.z=snap(p.z-dragOff.z);}}
},{passive:false});
canvas.addEventListener('touchend',()=>{if(dragging){dragging=false;save();}});

document.addEventListener('keydown',e=>{
  if(e.key==='Escape') cancelPlace();
  if((e.key==='Delete'||e.key==='Backspace')&&sel&&!placing) delSel();
  if((e.key==='r'||e.key==='R')&&sel) rotSel();
});

// ── Actions ──
window.rotSel=function(){if(!sel) return;sel.mesh.rotation.y+=Math.PI/2;save();};
window.dupSel=function(){
  if(!sel) return;
  const m=sel.def.mk(sel.def);
  m.position.copy(sel.mesh.position); m.position.x+=0.6;
  m.rotation.copy(sel.mesh.rotation);
  furnGrp.add(m);
  const ring=makeRing(sel.def.w,sel.def.d); m.add(ring); ring.visible=false;
  placed.push({mesh:m,def:sel.def,ring}); save();
};
window.delSel=function(){
  if(!sel) return;
  furnGrp.remove(sel.mesh);
  placed.splice(placed.indexOf(sel),1);
  deselect(); save();
};
window.clearAll=function(){
  if(!placed.length) return;
  if(!confirm('Remove all furniture?')) return;
  while(furnGrp.children.length) furnGrp.remove(furnGrp.children[0]);
  placed.length=0; deselect(); save();
};

function showHint(t){const h=document.getElementById('hint');h.textContent=t;h.classList.add('show');}
function hideHint(){document.getElementById('hint').classList.remove('show');}

// ═══════════════════════════════════════
// VIEW TOGGLE
// ═══════════════════════════════════════
window.setView=function(m){
  isTop=(m==='top');
  document.getElementById('btn3d').classList.toggle('on',!isTop);
  document.getElementById('btnTop').classList.toggle('on',isTop);
  document.getElementById('badge').textContent=isTop
    ?'Top View — click to place · click again to drag'
    :'3D View — drag to orbit · scroll to zoom · click furniture to move';
  controls.enabled=!isTop&&!placing;
};
window.resetCam=resetCam;

// ═══════════════════════════════════════
// SIDEBAR
// ═══════════════════════════════════════
let curRoom='bedroom';

function buildItems(rt){
  curRoom=rt;
  const items=CAT[rt]||CAT.bedroom;
  document.getElementById('sb-body').innerHTML=`
    <div class="slabel">Room Type</div>
    <select class="sselect" onchange="chRoom(this.value)">
      ${Object.keys(CAT).map(k=>`<option value="${k}"${k===rt?' selected':''}>${RLABELS[k]||k}</option>`).join('')}
    </select>
    <div class="slabel">Furniture — click to place</div>
    <div class="fgrid">
      ${items.map(d=>`
        <div class="fi" id="fi_${d.id}" onclick="pickItem('${d.id}',this)">
          <span class="ico">${d.e}</span>
          <span class="nm">${d.n}</span>
        </div>`).join('')}
    </div>
    <div style="font-size:9px;color:#333;text-align:center;margin-top:8px">
      R = rotate · Del = delete
    </div>`;
}

function buildRoomTab(){
  document.getElementById('sb-body').innerHTML=`
    <div class="slabel">Width (m)</div>
    <input type="number" class="sinp" id="in-w" value="${RW}" min="2" max="15" step="0.5">
    <div class="slabel">Length (m)</div>
    <input type="number" class="sinp" id="in-d" value="${RD}" min="2" max="15" step="0.5">
    <div class="slabel">Ceiling Height (m)</div>
    <input type="number" class="sinp" id="in-h" value="${RH}" min="2" max="5" step="0.1">
    <button class="sbtn" onclick="applyRoom()">✓ Apply</button>`;
}

window.showTab=function(t){
  document.getElementById('t-items').classList.toggle('on',t==='items');
  document.getElementById('t-room').classList.toggle('on',t==='room');
  t==='items'?buildItems(curRoom):buildRoomTab();
};

window.chRoom=function(v){
  buildItems(v);
  try{parent.postMessage({type:'lamsa_room_change',roomType:v},'*');}catch(e){}
};

window.pickItem=function(id,el){
  const def=allDefs.find(d=>d.id===id); if(!def) return;
  document.querySelectorAll('.fi').forEach(e=>e.classList.remove('pick'));
  el.classList.add('pick');
  startPlace(def);
};

window.applyRoom=function(){
  RW=Math.max(2,Math.min(15,parseFloat(document.getElementById('in-w').value)||5));
  RD=Math.max(2,Math.min(15,parseFloat(document.getElementById('in-d').value)||4));
  RH=Math.max(2,Math.min(5, parseFloat(document.getElementById('in-h').value)||2.8));
  buildRoom();
};

window.toggleSb=function(){
  document.getElementById('sb').classList.toggle('open');
  document.getElementById('mob-ov').classList.toggle('show');
};

// ═══════════════════════════════════════
// SAVE / LOAD
// ═══════════════════════════════════════
function save(){
  try{
    localStorage.setItem('lamsa_planner',JSON.stringify({
      RW,RD,RH,rt:curRoom,
      items:placed.map(i=>({id:i.def.id,x:i.mesh.position.x,z:i.mesh.position.z,ry:i.mesh.rotation.y}))
    }));
  }catch(e){}
}

function load(){
  try{
    const d=JSON.parse(localStorage.getItem('lamsa_planner')||'null'); if(!d) return;
    if(d.RW) RW=d.RW; if(d.RD) RD=d.RD; if(d.RH) RH=d.RH;
    buildRoom();
    if(d.rt) buildItems(d.rt);
    (d.items||[]).forEach(s=>{
      const def=allDefs.find(x=>x.id===s.id); if(!def) return;
      const m=def.mk(def); m.position.set(s.x,0,s.z); m.rotation.y=s.ry||0;
      furnGrp.add(m);
      const ring=makeRing(def.w,def.d); m.add(ring); ring.visible=false;
      placed.push({mesh:m,def,ring});
    });
  }catch(e){}
}

function describe(){
  if(!placed.length) return '';
  return placed.map(i=>{
    let pos='center';
    const x=i.mesh.position.x, z=i.mesh.position.z;
    if(z<-RD/2*0.65) pos='north wall';
    else if(z>RD/2*0.65) pos='south wall';
    else if(x<-RW/2*0.65) pos='west wall';
    else if(x>RW/2*0.65) pos='east wall';
    return i.def.n+' at '+pos;
  }).join(', ');
}

window.getFpDescription=describe;
window.done=function(){
  save();
  try{parent.postMessage({type:'lamsa_planner_done',description:describe()},'*');}catch(e){}
  if(parent===window) history.back();
};

// ═══════════════════════════════════════
// RENDER LOOP
// ═══════════════════════════════════════
function resize(){
  const W=wrap.clientWidth, H=wrap.clientHeight||1;
  renderer.setSize(W,H);
  camera.aspect=W/H; camera.updateProjectionMatrix();
  const asp=W/H, vs=Math.max(RW,RD)*0.72;
  topCam.left=-vs*asp; topCam.right=vs*asp; topCam.top=vs; topCam.bottom=-vs;
  topCam.updateProjectionMatrix();
}
window.addEventListener('resize',resize);

function animate(){
  requestAnimationFrame(animate);
  if(!isTop) controls.update();
  renderer.render(scene,isTop?topCam:camera);
}

// ── INIT ──
const params=new URLSearchParams(location.search);
if(params.get('embedded')) document.getElementById('hdr').style.display='none';
const initRoom=params.get('room')||'bedroom';

buildRoom();
buildItems(initRoom);
load();
resize();
animate();

window.addEventListener('message',e=>{
  if(e.data && e.data.type==='lamsa_set_room') buildItems(e.data.roomType);
});
</script>
</body>
