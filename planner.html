<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Lamsa 3D Planner</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--gold:#c9a84c;--dark:#0d0d12;--card:#141418;--bd:#252530;--txt:#f0f0f5;--sub:#666}
html,body{width:100%;height:100%;overflow:hidden;background:var(--dark);color:var(--txt);font-family:'Segoe UI',sans-serif;touch-action:none}
#app{display:flex;flex-direction:column;height:100vh}
#hdr{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;background:#0a0a0f;border-bottom:1px solid var(--bd);flex-shrink:0;gap:6px;flex-wrap:wrap}
.logo{color:var(--gold);font-weight:900;font-size:14px;letter-spacing:2px}
.hbtn{background:var(--card);border:1px solid var(--bd);color:var(--txt);padding:6px 12px;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;transition:border-color .15s}
.hbtn:hover{border-color:var(--gold)}
.hbtn.gold{background:var(--gold);color:#000;border-color:var(--gold);font-weight:800}
.hbtn.red{color:#f66}
.hbtn.red:hover{border-color:#f66}
#main{display:flex;flex:1;min-height:0}
#sb{width:190px;background:#0a0a0f;border-right:1px solid var(--bd);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden}
#sbtabs{display:flex;border-bottom:1px solid var(--bd)}
.stab{flex:1;padding:9px 2px;text-align:center;font-size:11px;color:var(--sub);cursor:pointer;border-bottom:2px solid transparent}
.stab.on{color:var(--gold);border-color:var(--gold)}
#sbody{flex:1;overflow-y:auto;padding:8px}
#sbody::-webkit-scrollbar{width:3px}
#sbody::-webkit-scrollbar-thumb{background:var(--gold)}
.slbl{font-size:9px;color:var(--sub);text-transform:uppercase;letter-spacing:1px;margin:8px 0 4px}
.ssel{width:100%;background:#1a1a22;border:1px solid var(--bd);color:var(--txt);padding:7px;border-radius:7px;font-size:12px;margin-bottom:8px;outline:none}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-bottom:6px}
.fcard{background:#1a1a22;border:1px solid var(--bd);border-radius:7px;padding:7px 3px;text-align:center;cursor:pointer;transition:all .15s;user-select:none}
.fcard:hover,.fcard.on{border-color:var(--gold);background:rgba(201,168,76,.12)}
.fcard .ico{font-size:18px;display:block;margin-bottom:2px}
.fcard .nm{font-size:9px;color:var(--sub);line-height:1.2}
.sinp{width:100%;background:#1a1a22;border:1px solid var(--bd);color:var(--txt);padding:7px;border-radius:6px;font-size:12px;outline:none;margin-bottom:7px}
.sbtn{width:100%;background:var(--gold);color:#000;border:none;padding:8px;border-radius:7px;font-size:12px;font-weight:800;cursor:pointer;margin-top:2px}
#cw{flex:1;position:relative;background:#1a1a22;overflow:hidden}
canvas{display:block;cursor:crosshair}
#selbar{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);background:#111118;border:1px solid var(--bd);border-radius:10px;padding:8px 12px;display:none;gap:6px;align-items:center;flex-wrap:wrap}
#selbar.show{display:flex}
#selnm{color:var(--gold);font-weight:700;font-size:12px;margin-right:4px}
.sbarbtn{background:var(--card);border:1px solid var(--bd);color:var(--txt);padding:5px 10px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap}
.sbarbtn:hover{border-color:var(--gold)}
.sbarbtn.del{color:#f66}.sbarbtn.del:hover{border-color:#f66}
#hint{position:absolute;top:10px;left:50%;transform:translateX(-50%);background:rgba(201,168,76,.95);color:#000;padding:6px 16px;border-radius:20px;font-size:12px;font-weight:700;pointer-events:none;display:none;white-space:nowrap}
#hint.show{display:block}
</style>
</head>
<body>
<div id="app">
<div id="hdr">
  <div class="logo">✦ LAMSA PLANNER</div>
  <div style="display:flex;gap:5px;flex-wrap:wrap">
    <button class="hbtn" onclick="zoomIn()">＋</button>
    <button class="hbtn" onclick="zoomOut()">－</button>
    <button class="hbtn" onclick="resetView()">⊙ Reset</button>
    <button class="hbtn red" onclick="clearAll()">🗑 Clear</button>
    <button class="hbtn gold" onclick="donePlan()">✓ Done</button>
  </div>
</div>
<div id="main">
<div id="sb">
  <div id="sbtabs">
    <div class="stab on" id="t1" onclick="showTab('items')">🛋 Items</div>
    <div class="stab"    id="t2" onclick="showTab('room')">⚙ Room</div>
  </div>
  <div id="sbody"></div>
</div>
<div id="cw">
  <canvas id="c"></canvas>
  <div id="hint"></div>
  <div id="selbar">
    <span id="selnm">—</span>
    <button class="sbarbtn" onclick="rotSel()">↻ Rotate</button>
    <button class="sbarbtn" onclick="dupSel()">⧉ Copy</button>
    <button class="sbarbtn del" onclick="delSel()">✕ Delete</button>
  </div>
</div>
</div>
</div>

    {id:'kward', n:'Kids Wardrobe', e:'🗄️',w:120,d:58, c:'#3060A8',t:'#5090D8'},
    {id:'kdesk', n:'Kids Desk',     e:'🖥️',w:100,d:52, c:'#A07800',t:'#C8A000'},
    {id:'kchr',  n:'Kids Chair',    e:'🪑',w:42, d:42, c:'#3060A8',t:'#5090D8'},
    {id:'ktoys', n:'Toy Box',       e:'📦',w:82, d:52, c:'#C85878',t:'#E888A0'},
    {id:'kshelf',n:'Kids Shelf',    e:'📚',w:65, d:22, c:'#3060A8',t:'#5090D8'},
  ],
};
var allDefs=[];Object.keys(CAT).forEach(function(k){CAT[k].forEach(function(d){allDefs.push(d);});});
var RLBL={bedroom:'🛏 Bedroom',living:'🛋 Living Room',kitchen:'🍳 Kitchen',bathroom:'🛁 Bathroom',office:'💻 Office',dining:'🍽 Dining',kids:'🧸 Kids'};

// ── STATE ──────────────────────────────────────────────────────
var RW=500,RD=400; // room cm
var SCALE=1.0;     // pixels per cm
var OX=0,OY=0;     // pan offset
var placed=[];     // {def,x,y,rot}  x,y in room-cm, rot 0/90/180/270
var sel=null;
var placing=null;
var dragging=false;
var dragItem=null;
var dragOX=0,dragOY=0;
var curRoom='bedroom';

// ── CANVAS ────────────────────────────────────────────────────
var canvas=document.getElementById('c');
var ctx=canvas.getContext('2d');
var cw_el=document.getElementById('cw');

function resize(){
  canvas.width=cw_el.clientWidth||window.innerWidth-190;
  canvas.height=cw_el.clientHeight||window.innerHeight-50;
  OX=(canvas.width -RW*SCALE)/2;
  OY=(canvas.height-RD*SCALE)/2;
  draw();
}

// ── DRAW ──────────────────────────────────────────────────────
function draw(){
  var W=canvas.width, H=canvas.height;
  ctx.clearRect(0,0,W,H);

  // background
  ctx.fillStyle='#13131A';
  ctx.fillRect(0,0,W,H);

  // grid (outside room)
  ctx.strokeStyle='#1E1E28';
  ctx.lineWidth=1;
  var gs=50*SCALE;
  for(var gx=OX%gs;gx<W;gx+=gs){ctx.beginPath();ctx.moveTo(gx,0);ctx.lineTo(gx,H);ctx.stroke();}
  for(var gy=OY%gs;gy<H;gy+=gs){ctx.beginPath();ctx.moveTo(0,gy);ctx.lineTo(W,gy);ctx.stroke();}

  // room shadow
  ctx.shadowColor='rgba(201,168,76,0.15)';
  ctx.shadowBlur=30;
  ctx.fillStyle='#1E1C16';
  ctx.fillRect(OX,OY,RW*SCALE,RD*SCALE);
  ctx.shadowBlur=0;

  // room floor
  ctx.fillStyle='#2A2218';
  ctx.fillRect(OX,OY,RW*SCALE,RD*SCALE);

  // floor grid inside room
  ctx.strokeStyle='rgba(201,168,76,0.08)';
  ctx.lineWidth=1;
  var g2=100*SCALE;
  for(var fx=0;fx<RW;fx+=100){
    ctx.beginPath();ctx.moveTo(OX+fx*SCALE,OY);ctx.lineTo(OX+fx*SCALE,OY+RD*SCALE);ctx.stroke();
  }
  for(var fy=0;fy<RD;fy+=100){
    ctx.beginPath();ctx.moveTo(OX,OY+fy*SCALE);ctx.lineTo(OX+RW*SCALE,OY+fy*SCALE);ctx.stroke();
  }

  // walls
  ctx.strokeStyle='#787880';
  ctx.lineWidth=Math.max(2,10*SCALE);
  ctx.strokeRect(OX,OY,RW*SCALE,RD*SCALE);

  // gold skirting
  ctx.strokeStyle='#C9A84C';
  ctx.lineWidth=Math.max(1,3*SCALE);
  var sk=8*SCALE;
  ctx.strokeRect(OX+sk,OY+sk,RW*SCALE-sk*2,RD*SCALE-sk*2);

  // dimension labels
  ctx.fillStyle='#666';
  ctx.font='11px Segoe UI';
  ctx.textAlign='center';
  ctx.fillText((RW/100).toFixed(1)+' m',OX+RW*SCALE/2,OY-8);
  ctx.textAlign='right';
  ctx.save();ctx.translate(OX-8,OY+RD*SCALE/2);ctx.rotate(-Math.PI/2);
  ctx.fillText((RD/100).toFixed(1)+' m',0,0);ctx.restore();

  // furniture
  placed.forEach(function(item){drawItem(item,item===sel);});

  // placing ghost
  if(placing && ghostX!==null){
    ctx.globalAlpha=0.45;
    drawItemAt(placing,ghostX,ghostY,0,true);
    ctx.globalAlpha=1;
  }

  // compass
  drawCompass();
}

function itemDims(item){
  var d=item.def, r=item.rot||0;
  var w=d.w*SCALE, h=d.d*SCALE;
  if(r===90||r===270){var tmp=w;w=h;h=tmp;}
  return {w:w,h:h};
}

function drawItem(item,selected){
  drawItemAt(item.def,item.x,item.y,item.rot||0,false,selected);
}

function drawItemAt(def,rx,ry,rot,ghost,selected){
  var px=OX+rx*SCALE, py=OY+ry*SCALE;
  var w=def.w*SCALE, h=def.d*SCALE;

  ctx.save();
  ctx.translate(px+w/2,py+h/2);
  if(rot) ctx.rotate(rot*Math.PI/180);
  ctx.translate(-w/2,-h/2);

  // shadow
  if(!ghost){
    ctx.shadowColor='rgba(0,0,0,0.5)';
    ctx.shadowBlur=8;
    ctx.shadowOffsetX=3;ctx.shadowOffsetY=3;
  }

  // body
  ctx.fillStyle=def.c;
  roundRect(ctx,0,0,w,h,6*SCALE);
  ctx.fill();
  ctx.shadowBlur=0;ctx.shadowOffsetX=0;ctx.shadowOffsetY=0;

  // top accent strip
  ctx.fillStyle=def.t;
  roundRect(ctx,w*0.04,h*0.04,w*0.92,h*0.14,3*SCALE);
  ctx.fill();

  // selection highlight
  if(selected){
    ctx.strokeStyle='#C9A84C';
    ctx.lineWidth=3;
    roundRect(ctx,0,0,w,h,6*SCALE);
    ctx.stroke();
    // glow
    ctx.shadowColor='rgba(201,168,76,0.5)';
    ctx.shadowBlur=12;
    ctx.strokeStyle='rgba(201,168,76,0.4)';
    ctx.lineWidth=6;
    roundRect(ctx,-2,-2,w+4,h+4,7*SCALE);
    ctx.stroke();
    ctx.shadowBlur=0;
  } else {
    ctx.strokeStyle='rgba(255,255,255,0.1)';
    ctx.lineWidth=1;
    roundRect(ctx,0,0,w,h,6*SCALE);
    ctx.stroke();
  }

  // emoji icon
  var fsize=Math.max(10,Math.min(w,h)*0.38);
  ctx.font=fsize+'px serif';
  ctx.textAlign='center';
  ctx.textBaseline='middle';
  ctx.fillText(def.e,w/2,h*0.56);

  // name label
  if(Math.min(w,h)>30){
    ctx.fillStyle='rgba(255,255,255,0.75)';
    var fs=Math.max(8,Math.min(11,w/def.n.length*1.4));
    ctx.font='bold '+fs+'px Segoe UI';
    ctx.textAlign='center';
    ctx.textBaseline='alphabetic';
    ctx.fillText(def.n,w/2,h-6);
  }

  ctx.restore();
}

function drawCompass(){
  var cx=canvas.width-36,cy=36;
  ctx.fillStyle='rgba(10,10,20,0.7)';
  ctx.beginPath();ctx.arc(cx,cy,22,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='#C9A84C';ctx.lineWidth=1;
  ctx.beginPath();ctx.arc(cx,cy,22,0,Math.PI*2);ctx.stroke();
  ctx.fillStyle='#C9A84C';ctx.font='bold 10px Segoe UI';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('N',cx,cy-12);
  ctx.fillStyle='#666';
  ctx.fillText('S',cx,cy+12);ctx.fillText('W',cx-12,cy);ctx.fillText('E',cx+12,cy);
}

function roundRect(ctx,x,y,w,h,r){
  r=Math.min(r,w/2,h/2);
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

// ── HIT TEST ──────────────────────────────────────────────────
function hitTest(mx,my){
  // iterate in reverse so top items are picked first
  for(var i=placed.length-1;i>=0;i--){
    var item=placed[i];
    var d=item.def;
    var px=OX+item.x*SCALE, py=OY+item.y*SCALE;
    var w=d.w*SCALE,h=d.d*SCALE;
    var r=item.rot||0;
    if(r===90||r===270){var tmp=w;w=h;h=tmp;}
    // transform mouse into item local space
    var cx2=px+w/2,cy2=py+h/2;
    var dx=mx-cx2,dy=my-cy2;
    var rad=-r*Math.PI/180;
    var lx=dx*Math.cos(rad)-dy*Math.sin(rad)+w/2;
    var ly=dx*Math.sin(rad)+dy*Math.cos(rad)+h/2;
    if(lx>=0&&lx<=w&&ly>=0&&ly<=h) return item;
  }
  return null;
}

// ── GHOST PLACEMENT ───────────────────────────────────────────
var ghostX=null,ghostY=null;

function toRoom(mx,my){
  return {rx:(mx-OX)/SCALE, ry:(my-OY)/SCALE};
}

function snapR(v){return Math.round(v/10)*10;}

// ── EVENTS ────────────────────────────────────────────────────
function getXY(e){
  var r=canvas.getBoundingClientRect();
  var src=e.touches?e.touches[0]:e;
  return {mx:src.clientX-r.left, my:src.clientY-r.top};
}

canvas.addEventListener('mousedown',function(e){
  var p=getXY(e);
  if(placing){
    var rm=toRoom(p.mx,p.my);
    placeDef(placing,snapR(rm.rx),snapR(rm.ry),0);
    return;
  }
  var item=hitTest(p.mx,p.my);
  if(item){
    selectItem(item);
    dragging=true;
    dragItem=item;
    var rm=toRoom(p.mx,p.my);
    dragOX=rm.rx-item.x;
    dragOY=rm.ry-item.y;
    canvas.style.cursor='grabbing';
    e.preventDefault();
  } else {
    deselectItem();
  }
  draw();
});

canvas.addEventListener('mousemove',function(e){
  var p=getXY(e);
  if(placing){
    var rm=toRoom(p.mx,p.my);
    ghostX=snapR(rm.rx);ghostY=snapR(rm.ry);
    draw();return;
  }
  if(dragging&&dragItem){
    var rm=toRoom(p.mx,p.my);
    dragItem.x=snapR(rm.rx-dragOX);
    dragItem.y=snapR(rm.ry-dragOY);
    draw();
  }
});

canvas.addEventListener('mouseup',function(){
  if(dragging){dragging=false;dragItem=null;canvas.style.cursor='crosshair';save();}
});

canvas.addEventListener('mouseleave',function(){
  if(placing){ghostX=null;ghostY=null;draw();}
  if(dragging){dragging=false;dragItem=null;canvas.style.cursor='crosshair';save();}
});

// Touch
canvas.addEventListener('touchstart',function(e){
  e.preventDefault();
  var p=getXY(e);
  if(placing){
    var rm=toRoom(p.mx,p.my);
    placeDef(placing,snapR(rm.rx),snapR(rm.ry),0);
    return;
  }
  var item=hitTest(p.mx,p.my);
  if(item){
    selectItem(item);
    dragging=true;dragItem=item;
    var rm=toRoom(p.mx,p.my);
    dragOX=rm.rx-item.x;dragOY=rm.ry-item.y;
  } else { deselectItem(); }
  draw();
},{passive:false});

canvas.addEventListener('touchmove',function(e){
  e.preventDefault();
  var p=getXY(e);
  if(placing){
    var rm=toRoom(p.mx,p.my);ghostX=snapR(rm.rx);ghostY=snapR(rm.ry);draw();return;
  }
  if(dragging&&dragItem){
    var rm=toRoom(p.mx,p.my);
    dragItem.x=snapR(rm.rx-dragOX);dragItem.y=snapR(rm.ry-dragOY);draw();
  }
},{passive:false});

canvas.addEventListener('touchend',function(){
  if(dragging){dragging=false;dragItem=null;save();}
},{passive:true});

document.addEventListener('keydown',function(e){
  if(e.key==='Escape'){ cancelPlace(); draw(); }
  if((e.key==='Delete'||e.key==='Backspace')&&sel&&!placing){delSel();}
  if((e.key==='r'||e.key==='R')&&sel){rotSel();}
});

// ── ACTIONS ───────────────────────────────────────────────────
function placeDef(def,rx,ry,rot){
  var item={def:def,x:rx,y:ry,rot:rot||0};
  placed.push(item);
  selectItem(item);
  cancelPlace();
  save();draw();
}

function cancelPlace(){
  placing=null;ghostX=null;ghostY=null;
  document.querySelectorAll('.fcard').forEach(function(e){e.classList.remove('on');});
  document.getElementById('hint').classList.remove('show');
}

function selectItem(item){
  sel=item;
  document.getElementById('selbar').classList.add('show');
  document.getElementById('selnm').textContent=item.def.n;
}

function deselectItem(){
  sel=null;
  document.getElementById('selbar').classList.remove('show');
}

function rotSel(){
  if(!sel)return;sel.rot=((sel.rot||0)+90)%360;save();draw();
}
function dupSel(){
  if(!sel)return;
  var it={def:sel.def,x:sel.x+30,y:sel.y+30,rot:sel.rot||0};
  placed.push(it);selectItem(it);save();draw();
}
function delSel(){
  if(!sel)return;
  placed.splice(placed.indexOf(sel),1);deselectItem();save();draw();
}
function clearAll(){
  if(!placed.length)return;
  if(!confirm('Remove all furniture?'))return;
  placed.length=0;deselectItem();save();draw();
}
window.rotSel=rotSel;window.dupSel=dupSel;window.delSel=delSel;window.clearAll=clearAll;

// ── ZOOM & PAN ────────────────────────────────────────────────
function zoomIn(){ SCALE=Math.min(3,SCALE*1.25); OX=(canvas.width-RW*SCALE)/2; OY=(canvas.height-RD*SCALE)/2; draw(); }
function zoomOut(){ SCALE=Math.max(0.2,SCALE/1.25); OX=(canvas.width-RW*SCALE)/2; OY=(canvas.height-RD*SCALE)/2; draw(); }
function resetView(){ SCALE=Math.min((canvas.width-40)/(RW),(canvas.height-60)/(RD)); OX=(canvas.width-RW*SCALE)/2; OY=(canvas.height-RD*SCALE)/2; draw(); }
canvas.addEventListener('wheel',function(e){
  e.preventDefault();
  if(e.deltaY<0)zoomIn();else zoomOut();
},{passive:false});
window.zoomIn=zoomIn;window.zoomOut=zoomOut;window.resetView=resetView;

// ── SIDEBAR ───────────────────────────────────────────────────
function buildItems(rt){
  curRoom=rt;
  var items=CAT[rt]||CAT.bedroom;
  var h='<div class="slbl">Room Type</div><select class="ssel" onchange="chRoom(this.value)">';
  Object.keys(CAT).forEach(function(k){h+='<option value="'+k+'"'+(k===rt?' selected':'')+'>'+( RLBL[k]||k)+'</option>';});
  h+='</select><div class="slbl">Click item → click room to place</div><div class="fgrid">';
  items.forEach(function(d){
    h+='<div class="fcard" id="fc_'+d.id+'" onclick="pickItem(\''+d.id+'\',this)"><span class="ico">'+d.e+'</span><span class="nm">'+d.n+'</span></div>';
  });
  h+='</div><div style="font-size:9px;color:#2a2a2a;text-align:center;margin-top:6px">R=rotate · Del=delete</div>';
  document.getElementById('sbody').innerHTML=h;
}

function buildRoomTab(){
  document.getElementById('sbody').innerHTML=
    '<div class="slbl">Width (m)</div><input type="number" class="sinp" id="in-w" value="'+(RW/100).toFixed(1)+'" min="2" max="15" step="0.5">'
   +'<div class="slbl">Length (m)</div><input type="number" class="sinp" id="in-d" value="'+(RD/100).toFixed(1)+'" min="2" max="15" step="0.5">'
   +'<button class="sbtn" onclick="applyRoom()">✓ Apply</button>';
}

function showTab(t){
  document.getElementById('t1').classList.toggle('on',t==='items');
  document.getElementById('t2').classList.toggle('on',t==='room');
  if(t==='items')buildItems(curRoom);else buildRoomTab();
}
window.showTab=showTab;

function chRoom(v){
  buildItems(v);
  try{parent.postMessage({type:'lamsa_room_change',roomType:v},'*');}catch(ex){}
}
window.chRoom=chRoom;

function pickItem(id,el){
  var def=allDefs.find(function(d){return d.id===id;});
  if(!def)return;
  document.querySelectorAll('.fcard').forEach(function(e){e.classList.remove('on');});
  el.classList.add('on');
  placing=def;
  ghostX=RW/2;ghostY=RD/2;
  var h=document.getElementById('hint');
  h.textContent='Click in the room to place '+def.n+' — ESC to cancel';
  h.classList.add('show');
  canvas.style.cursor='copy';
  draw();
}
window.pickItem=pickItem;

function applyRoom(){
  var w=parseFloat(document.getElementById('in-w').value)||5;
  var d=parseFloat(document.getElementById('in-d').value)||4;
  RW=Math.max(2,Math.min(15,w))*100;
  RD=Math.max(2,Math.min(15,d))*100;
  resetView();
}
window.applyRoom=applyRoom;

// ── SAVE / LOAD ───────────────────────────────────────────────
function save(){
  try{
    localStorage.setItem('lamsa_planner',JSON.stringify({
      RW:RW,RD:RD,rt:curRoom,
      items:placed.map(function(i){return{id:i.def.id,x:i.x,y:i.y,rot:i.rot||0};})
    }));
  }catch(ex){}
}

function load(){
  try{
    var data=JSON.parse(localStorage.getItem('lamsa_planner')||'null');
    if(!data)return;
    if(data.RW)RW=data.RW;if(data.RD)RD=data.RD;
    if(data.rt)buildItems(data.rt);
    (data.items||[]).forEach(function(s){
      var def=allDefs.find(function(d){return d.id===s.id;});
      if(!def)return;
      placed.push({def:def,x:s.x,y:s.y,rot:s.rot||0});
    });
  }catch(ex){}
}

function describe(){
  if(!placed.length)return'';
  return placed.map(function(i){
    var pos='center',x=i.x,y=i.y;
    if(y<RD*0.2)pos='north wall';
    else if(y>RD*0.8)pos='south wall';
    else if(x<RW*0.2)pos='west wall';
    else if(x>RW*0.8)pos='east wall';
    return i.def.n+' at '+pos;
  }).join(', ');
}
window.getFpDescription=describe;

window.donePlan=function(){
  save();
  try{parent.postMessage({type:'lamsa_planner_done',description:describe()},'*');}catch(ex){}
  if(parent===window)history.back();
};

// ── INIT ──────────────────────────────────────────────────────
window.addEventListener('resize',resize);
buildItems('bedroom');
load();
resize();
resetView();
</script>
</body>
</html>
