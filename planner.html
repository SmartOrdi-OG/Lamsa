<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Lamsa 3D Planner</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--gold:#C9A84C;--dark:#0B0B10;--panel:#111118;--bd:#252535;--txt:#F0F0F5;--sub:#66668A}
html,body{width:100%;height:100%;overflow:hidden;background:var(--dark);color:var(--txt);font-family:'Segoe UI',system-ui,sans-serif}
#overlay{position:fixed;inset:0;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--dark);gap:14px;transition:opacity .4s}
#overlay.gone{opacity:0;pointer-events:none}
.spin{width:44px;height:44px;border:3px solid var(--bd);border-top-color:var(--gold);border-radius:50%;animation:sp .8s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.ovtitle{color:var(--gold);font-size:18px;font-weight:900;letter-spacing:3px}
.ovsub{color:var(--sub);font-size:12px}
.overr{color:#E06060;font-size:12px;text-align:center;max-width:300px}
.retry{background:var(--gold);color:#000;border:none;padding:9px 22px;border-radius:8px;font-size:13px;font-weight:800;cursor:pointer;margin-top:4px}
#app{width:100%;height:100vh;display:flex;flex-direction:column;opacity:0;transition:opacity .4s}
#app.show{opacity:1}
#hdr{display:flex;align-items:center;justify-content:space-between;padding:7px 12px;background:#07070F;border-bottom:1px solid var(--bd);flex-shrink:0;gap:6px;flex-wrap:wrap}
.logo{color:var(--gold);font-weight:900;font-size:12px;letter-spacing:3px}
.hbtns{display:flex;gap:5px;flex-wrap:wrap}
.hbtn{background:var(--panel);border:1px solid var(--bd);color:var(--txt);padding:5px 11px;border-radius:7px;font-size:11px;font-weight:600;cursor:pointer;transition:all .15s;white-space:nowrap}
.hbtn:hover{border-color:var(--gold);background:rgba(201,168,76,.12)}
.hbtn.gold{background:var(--gold);color:#000;border-color:var(--gold);font-weight:800}
.hbtn.gold:hover{background:#D4B85A}
.hbtn.dng:hover{border-color:#E06060;color:#E06060}
#body{display:flex;flex:1;min-height:0}
#sb{width:192px;background:#07070F;border-right:1px solid var(--bd);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden}
.sbtabs{display:flex;border-bottom:1px solid var(--bd);flex-shrink:0}
.sbtab{flex:1;padding:9px 2px;text-align:center;font-size:10px;color:var(--sub);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s}
.sbtab.on{color:var(--gold);border-color:var(--gold)}
.sbinner{flex:1;overflow-y:auto;padding:8px 7px}
.sbinner::-webkit-scrollbar{width:2px}
.sbinner::-webkit-scrollbar-thumb{background:var(--gold)}
.slbl{font-size:9px;color:var(--sub);text-transform:uppercase;letter-spacing:1.5px;margin:8px 0 4px 2px}
.rsel{width:100%;background:#12121A;border:1px solid var(--bd);color:var(--txt);padding:7px;border-radius:7px;font-size:11px;margin-bottom:6px;outline:none;cursor:pointer}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:4px}
.fcard{background:#12121A;border:1px solid var(--bd);border-radius:8px;padding:7px 3px;text-align:center;cursor:pointer;transition:all .15s;user-select:none}
.fcard:hover{border-color:var(--gold);transform:translateY(-1px);background:rgba(201,168,76,.1)}
.fcard.on{border-color:var(--gold);background:rgba(201,168,76,.2)}
.fcard .ico{font-size:20px;display:block;margin-bottom:2px}
.fcard .nm{font-size:9px;color:var(--sub);line-height:1.3}
.rinprow{display:flex;align-items:center;gap:6px;margin-bottom:6px}
.rinplbl{font-size:10px;color:var(--sub);width:52px;flex-shrink:0}
.rinp{flex:1;background:#12121A;border:1px solid var(--bd);color:var(--txt);padding:6px;border-radius:6px;font-size:11px;outline:none}
.abtn{width:100%;background:var(--gold);color:#000;border:none;padding:8px;border-radius:7px;font-size:12px;font-weight:800;cursor:pointer;margin-top:4px}
.abtn:hover{background:#D4B85A}
.color-row{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px}
.cswatch{width:22px;height:22px;border-radius:5px;border:2px solid transparent;cursor:pointer;transition:border-color .15s}
.cswatch:hover,.cswatch.on{border-color:var(--gold)}
#cw{flex:1;position:relative;background:#0D0D14;overflow:hidden}
canvas{display:block;width:100%;height:100%}
#selbar{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);background:rgba(7,7,15,.96);border:1px solid var(--bd);border-radius:11px;padding:8px 13px;display:none;gap:7px;align-items:center;backdrop-filter:blur(10px);flex-wrap:wrap;max-width:90vw}
#selbar.show{display:flex}
#selnm{color:var(--gold);font-weight:700;font-size:12px}
.sbbtn{background:#181828;border:1px solid var(--bd);color:var(--txt);padding:5px 10px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;transition:all .15s;white-space:nowrap}
.sbbtn:hover{border-color:var(--gold)}
.sbbtn.del{color:#E06060}.sbbtn.del:hover{border-color:#E06060}
#hint{position:absolute;top:12px;left:50%;transform:translateX(-50%);background:rgba(201,168,76,.97);color:#000;padding:6px 18px;border-radius:20px;font-size:12px;font-weight:700;pointer-events:none;opacity:0;transition:opacity .2s;white-space:nowrap;box-shadow:0 4px 16px rgba(201,168,76,.4)}
#hint.show{opacity:1}
#vctrls{position:absolute;top:12px;right:12px;display:flex;flex-direction:column;gap:5px}
.vbtn{background:rgba(7,7,15,.88);border:1px solid var(--bd);color:var(--txt);width:34px;height:34px;border-radius:8px;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;backdrop-filter:blur(4px)}
.vbtn:hover{border-color:var(--gold);color:var(--gold)}
#wallpanel{position:absolute;top:12px;left:12px;background:rgba(7,7,15,.9);border:1px solid var(--bd);border-radius:10px;padding:10px;width:160px;display:none;backdrop-filter:blur(8px)}
#wallpanel.show{display:block}
#wallpanel h4{color:var(--gold);font-size:11px;font-weight:700;margin-bottom:8px;letter-spacing:1px}
#wallpanel label{font-size:10px;color:var(--sub);display:block;margin-bottom:3px}
#wallpanel input[type=color]{width:100%;height:26px;border:1px solid var(--bd);border-radius:5px;cursor:pointer;background:transparent}
#wallpanel input[type=range]{width:100%;margin-bottom:6px}
</style>
</head>
<body>

<div id="overlay">
  <div class="spin"></div>
  <div class="ovtitle">✦ LAMSA</div>
  <div class="ovsub">Loading 3D environment…</div>
</div>

<div id="app">
  <div id="hdr">
    <div class="logo">✦ LAMSA 3D PLANNER</div>
    <div class="hbtns">
      <button class="hbtn" onclick="viewPersp()">◈ 3D View</button>
      <button class="hbtn" onclick="viewTop()">⊙ Top View</button>
      <button class="hbtn dng" onclick="clearAll()">🗑 Clear</button>
      <button class="hbtn gold" onclick="donePlan()">✓ Done</button>
    </div>
  </div>
  <div id="body">
    <div id="sb">
      <div class="sbtabs">
        <div class="sbtab on" id="t1" onclick="showTab('items')">🛋 Items</div>
        <div class="sbtab" id="t2" onclick="showTab('room')">⚙ Room</div>
        <div class="sbtab" id="t3" onclick="showTab('design')">🎨 Design</div>
      </div>
      <div class="sbinner" id="sbinner"></div>
    </div>
    <div id="cw">
      <canvas id="c"></canvas>
      <div id="hint"></div>
      <div id="selbar">
        <span id="selnm">—</span>
        <button class="sbbtn" onclick="rotSel(90)">↻ 90°</button>
        <button class="sbbtn" onclick="rotSel(45)">↻ 45°</button>
        <button class="sbbtn" onclick="dupSel()">⧉ Copy</button>
        <button class="sbbtn" onclick="nudge('x',-0.1)">← </button>
        <button class="sbbtn" onclick="nudge('x',0.1)"> →</button>
        <button class="sbbtn" onclick="nudge('z',-0.1)">↑ </button>
        <button class="sbbtn" onclick="nudge('z',0.1)"> ↓</button>
        <button class="sbbtn del" onclick="delSel()">✕ Delete</button>
      </div>
      <div id="vctrls">
        <button class="vbtn" onclick="zoomFit()" title="Fit room">⊞</button>
        <button class="vbtn" onclick="viewPersp()" title="3D view">◈</button>
        <button class="vbtn" onclick="viewTop()" title="Top view">⊙</button>
      </div>
      <!-- Wall editor panel (appears when wall is clicked) -->
      <div id="wallpanel">
        <h4>🧱 WALL EDITOR</h4>
        <label>Wall Color</label>
        <input type="color" id="wc-color" value="#F5F2EC" oninput="applyWallColor(this.value)">
        <label style="margin-top:6px">Texture</label>
        <select class="rsel" style="font-size:10px;padding:5px" onchange="applyWallTex(this.value)">
          <option value="plain">Plain Paint</option>
          <option value="brick">Brick</option>
          <option value="tile">Tile</option>
          <option value="wood">Wood Panel</option>
          <option value="marble">Marble</option>
        </select>
        <button class="abtn" style="margin-top:6px;font-size:10px;padding:6px" onclick="document.getElementById('wallpanel').classList.remove('show')">✓ Done</button>
      </div>
    </div>
  </div>
</div>

<script>
(function(){
  var srcs=[
    'js/three.min.js',
    'https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js',
    'https://unpkg.com/three@0.128.0/build/three.min.js'
  ];
  var ocs=[
    'js/OrbitControls.js',
    'https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js',
    'https://unpkg.com/three@0.128.0/examples/js/controls/OrbitControls.js'
  ];
  function load(url,ok,err){var s=document.createElement('script');s.src=url;s.onload=ok;s.onerror=err;document.head.appendChild(s);}
  function tryThree(i){
    if(i>=srcs.length){showErr('Cannot load Three.js. Check your connection.');return;}
    load(srcs[i],function(){tryOC(0);},function(){tryThree(i+1);});
  }
  function tryOC(i){
    if(i>=ocs.length){showErr('Cannot load OrbitControls.');return;}
    load(ocs[i],function(){document.dispatchEvent(new Event('three_ready'));},function(){tryOC(i+1);});
  }
  function showErr(msg){
    document.getElementById('overlay').innerHTML='<div class="ovtitle" style="color:#E06060">⚠ Error</div><div class="overr">'+msg+'</div><button class="retry" onclick="location.reload()">↺ Retry</button>';
  }
  tryThree(0);
})();
</script>

function makeWoodTex(){
  var c=document.createElement('canvas');c.width=512;c.height=512;
  var ctx=c.getContext('2d');
  // Rich honey-oak base with plank variation
  var plankColors=['#C8955A','#D4A060','#C09050','#BE8E48','#D09858','#C69050'];
  var pw=1024/8; // 8 planks across
  for(var p=0;p<8;p++){
    var col=plankColors[p%plankColors.length];
    var pg=ctx.createLinearGradient(p*pw,0,(p+1)*pw,0);
    pg.addColorStop(0,col);pg.addColorStop(.5,shiftColor(col,15));pg.addColorStop(1,col);
    ctx.fillStyle=pg;ctx.fillRect(p*pw,0,pw,1024);
  }
  // Plank dividers
  ctx.strokeStyle='rgba(0,0,0,0.28)';ctx.lineWidth=2.5;
  for(var x=0;x<=8;x++){ctx.beginPath();ctx.moveTo(x*pw,0);ctx.lineTo(x*pw,1024);ctx.stroke();}
  // Horizontal joints (staggered)
  ctx.strokeStyle='rgba(0,0,0,0.18)';ctx.lineWidth=1.5;
  var jl=[0,256,512,768,1024];
  for(var j=0;j<jl.length;j++){ctx.beginPath();ctx.moveTo(0,jl[j]);ctx.lineTo(1024,jl[j]);ctx.stroke();}
  // Fine grain lines per plank
  ctx.lineWidth=0.8;
  for(var gi=0;gi<600;gi++){
    var gp=Math.floor(Math.random()*8);
    var gx2=gp*pw+Math.random()*pw, gy2=Math.random()*1024, gl=20+Math.random()*80;
    var gy2e=Math.min(1024,gy2+gl);
    // Keep within plank boundaries
    ctx.strokeStyle='rgba(0,0,0,'+(0.04+Math.random()*.06)+')';
    ctx.beginPath();ctx.moveTo(gx2,gy2);
    ctx.bezierCurveTo(gx2+2,gy2+gl*.3,gx2-2,gy2+gl*.7,gx2+Math.random()*4-2,gy2e);ctx.stroke();
  }
  // Knots
  for(var k=0;k<10;k++){
    var kp=Math.floor(Math.random()*8);
    var kx=kp*pw+pw*.2+Math.random()*pw*.6, ky=Math.random()*1024;
    var kr=8+Math.random()*12;
    var rg=ctx.createRadialGradient(kx,ky,0,kx,ky,kr);
    rg.addColorStop(0,'rgba(50,25,5,0.5)');rg.addColorStop(.5,'rgba(50,25,5,0.2)');rg.addColorStop(1,'rgba(50,25,5,0)');
    ctx.fillStyle=rg;ctx.fillRect(kx-kr,ky-kr,kr*2,kr*2);
  }
  // Subtle varnish highlight
  ctx.fillStyle='rgba(255,220,120,0.04)';ctx.fillRect(0,0,1024,1024);
  var tex=new THREE.CanvasTexture(c);tex.wrapS=tex.wrapT=THREE.RepeatWrapping;tex.repeat.set(4,3);return tex;
}
function shiftColor(hex,amt){
  var r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  r=Math.min(255,r+amt);g=Math.min(255,g+amt);b=Math.min(255,b+amt);
  return'#'+r.toString(16).padStart(2,'0')+g.toString(16).padStart(2,'0')+b.toString(16).padStart(2,'0');
}
// Properly free GPU resources to avoid context loss from memory exhaustion
function disposeObj(obj){
  obj.traverse(function(o){
    if(o.geometry)o.geometry.dispose();
    if(o.material){
      var mats=Array.isArray(o.material)?o.material:[o.material];
      mats.forEach(function(m){
        Object.keys(m).forEach(function(k){if(m[k]&&m[k].isTexture)m[k].dispose();});
        m.dispose();
      });
    }
  });
}
function makeWallTexCanvas(type,color){
  var c=document.createElement('canvas');c.width=512;c.height=512;
  var ctx=c.getContext('2d');
  ctx.fillStyle=color||'#F5F2EC';ctx.fillRect(0,0,512,512);
  if(type==='brick'){
    ctx.strokeStyle='rgba(0,0,0,0.25)';ctx.lineWidth=2;
    var bh=40,bw=80;
    for(var row=0;row<512/bh;row++){
      var off=row%2===0?0:bw/2;
      for(var col=-(bw/2);col<512;col+=bw){
        ctx.strokeRect(col+off,row*bh,bw,bh);
      }
    }
  } else if(type==='tile'){
    ctx.strokeStyle='rgba(0,0,0,0.2)';ctx.lineWidth=2;
    for(var t=0;t<512;t+=64){ctx.beginPath();ctx.moveTo(t,0);ctx.lineTo(t,512);ctx.stroke();ctx.beginPath();ctx.moveTo(0,t);ctx.lineTo(512,t);ctx.stroke();}
  } else if(type==='wood'){
    ctx.fillStyle=color||'#C8A068';ctx.fillRect(0,0,512,512);
    ctx.strokeStyle='rgba(0,0,0,0.12)';ctx.lineWidth=1;
    for(var p=0;p<512;p+=40){ctx.beginPath();ctx.moveTo(p,0);ctx.lineTo(p,512);ctx.stroke();}
  } else if(type==='marble'){
    var g2=ctx.createLinearGradient(0,0,512,512);
    g2.addColorStop(0,'#F0EDE8');g2.addColorStop(.5,'#E8E5E0');g2.addColorStop(1,'#F5F2EE');
    ctx.fillStyle=g2;ctx.fillRect(0,0,512,512);
    ctx.strokeStyle='rgba(180,160,140,0.4)';ctx.lineWidth=1;
    for(var m=0;m<20;m++){ctx.beginPath();ctx.moveTo(Math.random()*512,0);ctx.bezierCurveTo(Math.random()*512,128,Math.random()*512,384,Math.random()*512,512);ctx.stroke();}
  } else {
    for(var n=0;n<4000;n++){ctx.fillStyle='rgba(0,0,0,'+(Math.random()*.04)+')';ctx.fillRect(Math.random()*512,Math.random()*512,1,1);}
  }
  var tex=new THREE.CanvasTexture(c);tex.wrapS=tex.wrapT=THREE.RepeatWrapping;tex.repeat.set(2,1);return tex;
}

function buildRoom(){
  // Dispose then remove all old room objects to free GPU memory
  roomGrp.children.slice().forEach(function(o){disposeObj(o);roomGrp.remove(o);});
  scene.children.slice().forEach(function(o){if(o.userData.roomLight)scene.remove(o);});
  wallMeshes=[];wallMats=[];

  // ── FLOOR ──
  var floorM=new THREE.MeshStandardMaterial({map:makeWoodTex(),roughness:.42,metalness:.04});
  var floor=new THREE.Mesh(new THREE.PlaneGeometry(RW,RD),floorM);
  floor.rotation.x=-Math.PI/2;floor.receiveShadow=true;floor.userData.isFloor=true;
  roomGrp.add(floor);

  // ── WALLS ──
  var wallDefs=[
    {w:RW,h:RH,x:0,y:RH/2,z:-RD/2,ry:0},
    {w:RW,h:RH,x:0,y:RH/2,z:RD/2,ry:Math.PI},
    {w:RD,h:RH,x:-RW/2,y:RH/2,z:0,ry:Math.PI/2},
    {w:RD,h:RH,x:RW/2,y:RH/2,z:0,ry:-Math.PI/2},
  ];
  wallDefs.forEach(function(wd){
    var mat=new THREE.MeshStandardMaterial({roughness:.9,metalness:0,side:THREE.DoubleSide});
    mat.map=makeWallTexCanvas('plain','#F4F0E8');mat.needsUpdate=true;
    var wm=new THREE.Mesh(new THREE.PlaneGeometry(wd.w,wd.h),mat);
    wm.position.set(wd.x,wd.y,wd.z);wm.rotation.y=wd.ry;
    wm.receiveShadow=true;wm.userData.isWall=true;
    roomGrp.add(wm);wallMeshes.push(wm);wallMats.push(mat);
  });


  // ── GOLD SKIRTING ──
  var skM=new THREE.MeshStandardMaterial({color:0xC9A84C,roughness:.22,metalness:.55});
  var skH=.09,skD=.025;
  [{g:new THREE.BoxGeometry(RW,skH,skD),x:0,y:skH/2,z:-RD/2+skD/2},
   {g:new THREE.BoxGeometry(RW,skH,skD),x:0,y:skH/2,z:RD/2-skD/2},
   {g:new THREE.BoxGeometry(skD,skH,RD),x:-RW/2+skD/2,y:skH/2,z:0},
   {g:new THREE.BoxGeometry(skD,skH,RD),x:RW/2-skD/2,y:skH/2,z:0}
  ].forEach(function(s){var m=new THREE.Mesh(s.g,skM);m.position.set(s.x,s.y,s.z);m.castShadow=true;roomGrp.add(m);});

  // ── CROWN MOLDING ──
  var cmM=new THREE.MeshStandardMaterial({color:0xEEE8DC,roughness:.55});var cmH=.075;
  [{g:new THREE.BoxGeometry(RW+.02,cmH,skD),x:0,y:RH-cmH/2,z:-RD/2},
   {g:new THREE.BoxGeometry(RW+.02,cmH,skD),x:0,y:RH-cmH/2,z:RD/2},
   {g:new THREE.BoxGeometry(skD,cmH,RD),x:-RW/2,y:RH-cmH/2,z:0},
   {g:new THREE.BoxGeometry(skD,cmH,RD),x:RW/2,y:RH-cmH/2,z:0}
  ].forEach(function(s){var m=new THREE.Mesh(s.g,cmM);m.position.set(s.x,s.y,s.z);roomGrp.add(m);});

  // ── RECESSED CEILING LIGHTS ──
  var nlx=Math.max(1,Math.round(RW/2.2)),nlz=Math.max(1,Math.round(RD/2.2));
  var glowEM=new THREE.MeshStandardMaterial({color:0xFFFCF5,emissive:0xFFEDD0,emissiveIntensity:4,roughness:.05});
  var ringM=new THREE.MeshStandardMaterial({color:0xD8D4CC,roughness:.25,metalness:.7});
  for(var lxi=0;lxi<nlx;lxi++){
    for(var lzi=0;lzi<nlz;lzi++){
      var lpx=-RW/2+(lxi+.5)*(RW/nlx);
      var lpz=-RD/2+(lzi+.5)*(RD/nlz);
      // Housing ring
      try{
        var ring=new THREE.Mesh(new THREE.TorusGeometry(.13,.025,8,24),ringM);
        ring.rotation.x=Math.PI/2;ring.position.set(lpx,RH-.015,lpz);roomGrp.add(ring);
      }catch(ex){}
      // Glow disc
      var gd=new THREE.Mesh(new THREE.CircleGeometry(.11,20),glowEM);
      gd.rotation.x=Math.PI/2;gd.position.set(lpx,RH-.02,lpz);roomGrp.add(gd);
      // Actual point light
      var lpt=new THREE.PointLight(0xFFF8E8,1.6,Math.max(RW,RD)*1.4);
      lpt.position.set(lpx,RH-.12,lpz);lpt.userData.roomLight=true;scene.add(lpt);
    }
  }

  // ── WINDOW (back wall) ──
  var winW=Math.min(RW*.38,1.5),winH=1.1,winY=RH*.6;
  var wfM=new THREE.MeshStandardMaterial({color:0xE0DCE0,roughness:.45,metalness:.15});
  // outer frame
  var wfr=new THREE.Mesh(new THREE.BoxGeometry(winW+.14,winH+.14,.06),wfM);
  wfr.position.set(0,winY,-RD/2+.03);roomGrp.add(wfr);
  // glass
  var wgM=new THREE.MeshStandardMaterial({color:0xB0D0F0,emissive:0x4080C0,emissiveIntensity:.35,roughness:.04,metalness:.1,transparent:true,opacity:.55,side:THREE.DoubleSide});
  var wg=new THREE.Mesh(new THREE.PlaneGeometry(winW,winH),wgM);
  wg.position.set(0,winY,-RD/2+.06);roomGrp.add(wg);
  // cross bars
  [new THREE.Mesh(new THREE.BoxGeometry(winW,.035,.04),wfM),new THREE.Mesh(new THREE.BoxGeometry(.035,winH,.04),wfM)].forEach(function(b){b.position.set(0,winY,-RD/2+.08);roomGrp.add(b);});
  // sill
  var sill=new THREE.Mesh(new THREE.BoxGeometry(winW+.2,.05,.18),wfM);sill.position.set(0,winY-winH/2-.025,-RD/2+.09);roomGrp.add(sill);
  // daylight from window
  var wl=new THREE.PointLight(0xC8DCFF,2.2,RW*1.8);wl.position.set(0,winY,.2);wl.userData.roomLight=true;scene.add(wl);

  // ── FLOOR GRID (subtle) ──
  var grid=new THREE.GridHelper(Math.max(RW,RD)*2,Math.max(RW,RD)*2,0xC9A84C,0x2A2520);
  grid.material.opacity=.05;grid.material.transparent=true;grid.position.y=.002;roomGrp.add(grid);
}

// ═══════════════════════════════════════════════════════════
// FURNITURE
// ═══════════════════════════════════════════════════════════
function makeMesh(def,ghost){
  var fn=MAKERS[def.mk]||MAKERS.storage;
  var g;try{g=fn(def);}catch(ex){console.warn(def.mk,ex);g=MAKERS.storage(def);}
  if(ghost){
    g.traverse(function(o){
      if(o.isMesh){var col=o.material.color?o.material.color.getHex():0x888888;o.material=new THREE.MeshStandardMaterial({color:col,roughness:.8,metalness:0,transparent:true,opacity:.4,depthWrite:false});}
    });
  } else {g.traverse(function(o){if(o.isMesh){o.castShadow=true;o.receiveShadow=true;}});}
  return g;
}

function placeItem(def,x,z,rot){
  var mesh=makeMesh(def,false);
  mesh.position.set(x,0,z);mesh.rotation.y=rot||0;
  furnGrp.add(mesh);
  var item={def:def,mesh:mesh,rot:rot||0};
  placed.push(item);
  enforceBounds(item);
  selectItem(item);cancelPlace();saveState();return item;
}
function cancelPlace(){
  placing=null;
  if(ghostMesh){furnGrp.remove(ghostMesh);ghostMesh=null;}
  document.querySelectorAll('.fcard').forEach(function(e){e.classList.remove('on');});
  setHint('');renderer.domElement.style.cursor='default';
}

function selectItem(item){
  clearSelect();sel=item;
  var box3=new THREE.Box3().setFromObject(item.mesh);
  var size=box3.getSize(new THREE.Vector3());var ctr=box3.getCenter(new THREE.Vector3());
  var geo=new THREE.BoxGeometry(size.x+.06,size.y+.04,size.z+.06);
  var edges=new THREE.EdgesGeometry(geo);
  selOutline=new THREE.LineSegments(edges,new THREE.LineBasicMaterial({color:0xC9A84C}));
  selOutline.position.copy(ctr);selOutline.rotation.y=item.mesh.rotation.y;
  scene.add(selOutline);
  document.getElementById('selbar').classList.add('show');document.getElementById('selnm').textContent=item.def.n;
}
function clearSelect(){
  sel=null;if(selOutline){scene.remove(selOutline);selOutline=null;}
  document.getElementById('selbar').classList.remove('show');
}

function rotSel(deg){if(!sel)return;sel.rot=(sel.rot+(deg||90)*Math.PI/180)%(Math.PI*2);sel.mesh.rotation.y=sel.rot;enforceBounds(sel);updateOutline();saveState();}
function dupSel(){if(!sel)return;placeItem(sel.def,sel.mesh.position.x+.3,sel.mesh.position.z+.3,sel.rot);}
function delSel(){if(!sel)return;furnGrp.remove(sel.mesh);disposeObj(sel.mesh);placed.splice(placed.indexOf(sel),1);clearSelect();saveState();}
function nudge(axis,amt){if(!sel)return;sel.mesh.position[axis]+=amt;enforceBounds(sel);updateOutline();saveState();}
function clearAll(){if(!placed.length)return;if(!confirm('Remove all furniture?'))return;placed.slice().forEach(function(i){furnGrp.remove(i.mesh);disposeObj(i.mesh);});placed.length=0;clearSelect();saveState();}
function updateOutline(){if(sel&&selOutline){var b=new THREE.Box3().setFromObject(sel.mesh);selOutline.position.copy(b.getCenter(new THREE.Vector3()));selOutline.rotation.y=sel.rot;}}
window.rotSel=rotSel;window.dupSel=dupSel;window.delSel=delSel;window.nudge=nudge;window.clearAll=clearAll;

// ═══════════════════════════════════════════════════════════
// MOUSE / TOUCH
// ═══════════════════════════════════════════════════════════
function getEP(e){if(e.touches&&e.touches.length)return{clientX:e.touches[0].clientX,clientY:e.touches[0].clientY};return e;}
function setMouse(e){var ep=getEP(e);var r=renderer.domElement.getBoundingClientRect();return new THREE.Vector2(((ep.clientX-r.left)/r.width)*2-1,-((ep.clientY-r.top)/r.height)*2+1);}
function getFloor(mouse){raycaster.setFromCamera(mouse,camera);var pt=new THREE.Vector3();return raycaster.ray.intersectPlane(floorPlane,pt)?pt:null;}
function snap(v){return Math.round(v*10)/10;}
function clamp(x,z,def,rot){
  var r=rot||0,swapped=Math.abs(Math.sin(r))>0.7;
  var hw=(def?(swapped?def.d:def.w)||0:0)/2;
  var hd=(def?(swapped?def.w:def.d)||0:0)/2;
  return{
    x:Math.max(-RW/2+hw+.02, Math.min(RW/2-hw-.02, x)),
    z:Math.max(-RD/2+hd+.02, Math.min(RD/2-hd-.02, z))
  };
}
function enforceBounds(item){
  if(!item||!item.mesh)return;
  var b=new THREE.Box3().setFromObject(item.mesh);
  var m=0.02;
  if(b.min.x<-RW/2+m) item.mesh.position.x+=(-RW/2+m-b.min.x);
  if(b.max.x> RW/2-m) item.mesh.position.x-=(b.max.x-(RW/2-m));
  if(b.min.z<-RD/2+m) item.mesh.position.z+=(-RD/2+m-b.min.z);
  if(b.max.z> RD/2-m) item.mesh.position.z-=(b.max.z-(RD/2-m));
}

function pickScene(mouse){
  raycaster.setFromCamera(mouse,camera);
  var ms=[];furnGrp.traverse(function(o){if(o.isMesh)ms.push(o);});
  wallMeshes.forEach(function(w){ms.push(w);});
  var hits=raycaster.intersectObjects(ms);
  if(!hits.length)return null;
  var o=hits[0].object;
  if(o.userData.isWall){return{type:'wall',wall:wallMeshes.indexOf(o)};}
  while(o.parent&&o.parent!==furnGrp)o=o.parent;
  var item=placed.find(function(i){return i.mesh===o;});
  return item?{type:'furn',item:item}:null;
}

function onDown(e){
  if(e.button!==undefined&&e.button!==0)return;
  var mouse=setMouse(e);
  if(placing){var fp=getFloor(mouse);if(fp){var cp=clamp(snap(fp.x),snap(fp.z),placing);placeItem(placing,cp.x,cp.z,0);}return;}
  var hit=pickScene(mouse);
  if(hit){
    if(hit.type==='furn'){
      if(sel!==hit.item)selectItem(hit.item);
      dragging=true;dragItem=hit.item;controls.enabled=false;
      var fp=getFloor(mouse);dragOX=fp?fp.x-hit.item.mesh.position.x:0;dragOZ=fp?fp.z-hit.item.mesh.position.z:0;
      renderer.domElement.style.cursor='grabbing';e.preventDefault();e.stopPropagation();
    } else if(hit.type==='wall'){
      selectedWall=hit.wall;
      var wp=document.getElementById('wallpanel');wp.classList.add('show');
    }
  } else {
    clearSelect();
    document.getElementById('wallpanel').classList.remove('show');
    selectedWall=null;
  }
}
function onMove(e){
  var mouse=setMouse(e);
  if(placing){var fp=getFloor(mouse);if(fp){if(!ghostMesh){ghostMesh=makeMesh(placing,true);furnGrp.add(ghostMesh);}var cp=clamp(snap(fp.x),snap(fp.z),placing);ghostMesh.position.set(cp.x,0,cp.z);}return;}
  if(dragging&&dragItem){var fp=getFloor(mouse);if(fp){dragItem.mesh.position.x=snap(fp.x-dragOX);dragItem.mesh.position.z=snap(fp.z-dragOZ);enforceBounds(dragItem);updateOutline();}e.preventDefault();}
}
function onUp(){if(dragging){dragging=false;dragItem=null;controls.enabled=true;renderer.domElement.style.cursor='default';saveState();}}
function onTDown(e){if(e.cancelable)e.preventDefault();onDown(e);}
function onTMove(e){if(e.cancelable)e.preventDefault();onMove(e);}

function saveState(){
  try{localStorage.setItem('lamsa_planner3d',JSON.stringify({RW:RW,RD:RD,RH:RH,rt:curRoom,items:placed.map(function(i){return{id:i.def.id,x:i.mesh.position.x,z:i.mesh.position.z,rot:i.rot};})}));}catch(ex){}
}
function loadState(){
  try{
    var q=new URLSearchParams(location.search);var rt=q.get('room')||'bedroom';
    var data=JSON.parse(localStorage.getItem('lamsa_planner3d')||'null');
    if(data){if(data.rt)rt=data.rt;if(data.RW){RW=data.RW;RD=data.RD;}if(data.RH)RH=data.RH;}
    curRoom=rt;buildItems(rt);
    if(data&&data.items){data.items.forEach(function(s){var def=ALLCAT[s.id];if(!def)return;var mesh=makeMesh(def,false);mesh.position.set(s.x,0,s.z);mesh.rotation.y=s.rot||0;furnGrp.add(mesh);placed.push({def:def,mesh:mesh,rot:s.rot||0});});}
  }catch(ex){buildItems('bedroom');}
}
function describe(){if(!placed.length)return'';return placed.map(function(i){var x=i.mesh.position.x,z=i.mesh.position.z;var p='center';if(z<-RD*.3)p='north';else if(z>RD*.3)p='south';else if(x<-RW*.3)p='west wall';else if(x>RW*.3)p='east wall';return i.def.n+' ('+p+')';}).join(', ');}
window.donePlan=function(){saveState();try{parent.postMessage({type:'lamsa_planner_done',description:describe()},'*');}catch(ex){}if(parent===window)history.back();};

function init3D(){

  renderer=new THREE.WebGLRenderer({canvas:canvas,antialias:true,alpha:false,powerPreference:'high-performance'});
  renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));

  renderer.outputEncoding=THREE.sRGBEncoding;

  scene=new THREE.Scene();scene.fog=new THREE.FogExp2(0x0D0D14,.025);
  camera=new THREE.PerspectiveCamera(48,1,.05,80);
  controls=new THREE.OrbitControls(camera,canvas);
  controls.enableDamping=true;controls.dampingFactor=.08;controls.minDistance=1;controls.maxDistance=28;controls.maxPolarAngle=Math.PI/2-.005;
  raycaster=new THREE.Raycaster();floorPlane=new THREE.Plane(new THREE.Vector3(0,1,0),0);
  // Base lights — room lights are added dynamically in buildRoom()
  scene.add(new THREE.HemisphereLight(0xFFF5E8,0x302818,0.6));
  var dir=new THREE.DirectionalLight(0xFFF8F0,1.4);dir.position.set(5,9,4);dir.castShadow=true;
  dir.shadow.mapSize.set(2048,2048);dir.shadow.camera.near=.5;dir.shadow.camera.far=50;
  dir.shadow.camera.left=-12;dir.shadow.camera.right=12;dir.shadow.camera.top=12;dir.shadow.camera.bottom=-12;dir.shadow.bias=-.0008;scene.add(dir);
  // Soft fill light (cool, from opposite side)
  var fill=new THREE.DirectionalLight(0xD0E8FF,0.45);fill.position.set(-4,4,-3);scene.add(fill);
  roomGrp=new THREE.Group();scene.add(roomGrp);
  furnGrp=new THREE.Group();scene.add(furnGrp);
  buildRoom();loadState();resizeRenderer();viewPersp();animate();
  // Handle WebGL context loss (GPU memory exhaustion) — prevent default so Three.js can recover
  canvas.addEventListener('webglcontextlost',function(e){
    e.preventDefault();
    cancelAnimationFrame(window._lamsaAF);
    console.warn('WebGL context lost — waiting for restore');
  },false);
  canvas.addEventListener('webglcontextrestored',function(){
    console.warn('WebGL context restored — restarting loop');
    // Three.js re-uploads all GPU resources automatically on next render.
    // Do NOT call disposeObj here — old context objects are already invalid.
    animate();
  },false);
  canvas.addEventListener('mousedown',onDown);
  canvas.addEventListener('mousemove',onMove);
  canvas.addEventListener('mouseup',onUp);
  canvas.addEventListener('mouseleave',onUp);
  canvas.addEventListener('touchstart',onTDown,{passive:false});
  canvas.addEventListener('touchmove',onTMove,{passive:false});
  canvas.addEventListener('touchend',onUp,{passive:true});
  window.addEventListener('resize',resizeRenderer);
  document.addEventListener('keydown',function(e){
    if(e.key==='Escape')cancelPlace();
    if((e.key==='Delete'||e.key==='Backspace')&&sel&&!placing){e.preventDefault();delSel();}
    if((e.key==='r'||e.key==='R')&&sel&&!placing)rotSel(90);
    if(e.key==='ArrowLeft'&&sel){e.preventDefault();nudge('x',-.1);}
    if(e.key==='ArrowRight'&&sel){e.preventDefault();nudge('x',.1);}
    if(e.key==='ArrowUp'&&sel){e.preventDefault();nudge('z',-.1);}
    if(e.key==='ArrowDown'&&sel){e.preventDefault();nudge('z',.1);}
  });
  setTimeout(function(){document.getElementById('overlay').classList.add('gone');document.getElementById('app').classList.add('show');},300);
}

window.onerror=function(msg,src,line,col,err){
  document.getElementById('overlay').innerHTML='<div class="ovtitle" style="color:#E06060">⚠ JS Error</div><div class="overr">'+msg+'<br><small>'+(src||'')+(line?':'+line:'')+'</small></div><button class="retry" onclick="location.reload()">↺ Retry</button>';
  document.getElementById('overlay').classList.remove('gone');
};

document.addEventListener('three_ready',function(){
  if(typeof THREE==='undefined'||typeof THREE.OrbitControls==='undefined'){
    document.getElementById('overlay').innerHTML='<div class="ovtitle" style="color:#E06060">⚠ Error</div><div class="overr">3D engine failed to initialize.<br>THREE='+(typeof THREE)+' OC='+(typeof THREE!=='undefined'?typeof THREE.OrbitControls:'n/a')+'</div><button class="retry" onclick="location.reload()">↺ Retry</button>';
    return;
  }
  try{
    init3D();
  }catch(e){
    document.getElementById('overlay').innerHTML='<div class="ovtitle" style="color:#E06060">⚠ Init Error</div><div class="overr">'+e.message+'</div><button class="retry" onclick="location.reload()">↺ Retry</button>';
  }
});

// Timeout: if still loading after 12s, show message
setTimeout(function(){
  var ov=document.getElementById('overlay');
  if(ov&&!ov.classList.contains('gone')){
    ov.innerHTML='<div class="ovtitle" style="color:#E5A000">⏳ Slow Load</div><div class="overr">Scripts are taking long to load. Try clicking Retry or check your internet connection.</div><button class="retry" onclick="location.reload()">↺ Retry</button>';
  }
},12000);
</script>
