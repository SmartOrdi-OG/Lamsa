<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Lamsa 3D Planner</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--gold:#c9a84c;--dark:#0d0d12;--card:#141418;--border:#252530;--txt:#f0f0f5;--sub:#666}
html,body{width:100%;height:100%;overflow:hidden;background:var(--dark);color:var(--txt);font-family:'Segoe UI',sans-serif}
#app{display:flex;flex-direction:column;height:100vh}
/* header */
#hdr{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;background:#0a0a0f;border-bottom:1px solid var(--border);flex-shrink:0;gap:6px}
.logo{color:var(--gold);font-weight:900;font-size:14px;letter-spacing:2px}
.hbtn{background:var(--card);border:1px solid var(--border);color:var(--txt);padding:6px 12px;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s}
.hbtn:hover{border-color:var(--gold)}
.hbtn.on{background:rgba(201,168,76,.15);border-color:var(--gold);color:var(--gold)}
.hbtn.gold{background:var(--gold);color:#000;border-color:var(--gold);font-weight:800}
/* layout */
#main{display:flex;flex:1;min-height:0}
/* sidebar */
#sb{width:195px;background:#0a0a0f;border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
#sbtabs{display:flex;border-bottom:1px solid var(--border)}
.stab{flex:1;padding:9px 2px;text-align:center;font-size:11px;color:var(--sub);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s}
.stab.on{color:var(--gold);border-color:var(--gold)}
#sbody{flex:1;overflow-y:auto;padding:8px}
#sbody::-webkit-scrollbar{width:3px}
#sbody::-webkit-scrollbar-thumb{background:var(--gold);border-radius:2px}
.slbl{font-size:9px;color:var(--sub);text-transform:uppercase;letter-spacing:1px;margin:8px 0 4px}
.ssel{width:100%;background:#1a1a22;border:1px solid var(--border);color:var(--txt);padding:7px;border-radius:7px;font-size:12px;margin-bottom:8px;outline:none}
.ssel:focus{border-color:var(--gold)}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-bottom:6px}
.fitem{background:#1a1a22;border:1px solid var(--border);border-radius:7px;padding:7px 3px;text-align:center;cursor:pointer;transition:all .15s;user-select:none}
.fitem:hover,.fitem.pick{border-color:var(--gold);background:rgba(201,168,76,.12)}
.fitem .ico{font-size:18px;display:block;margin-bottom:2px}
.fitem .nm{font-size:9px;color:var(--sub)}
.sinp{width:100%;background:#1a1a22;border:1px solid var(--border);color:var(--txt);padding:7px;border-radius:6px;font-size:12px;outline:none;margin-bottom:7px}
.sinp:focus{border-color:var(--gold)}
.sbtn{width:100%;background:var(--gold);color:#000;border:none;padding:8px;border-radius:7px;font-size:12px;font-weight:800;cursor:pointer}
/* canvas */
#cw{flex:1;position:relative;overflow:hidden}
canvas{display:block;width:100%;height:100%}
/* overlays */
#hint{position:absolute;top:12px;left:50%;transform:translateX(-50%);background:rgba(201,168,76,.95);color:#000;padding:7px 18px;border-radius:20px;font-size:12px;font-weight:700;pointer-events:none;display:none;white-space:nowrap;z-index:5}
#hint.show{display:block}
#selbox{display:none;position:absolute;top:12px;right:12px;background:#111118;border:1px solid var(--border);border-radius:11px;padding:13px;min-width:145px;z-index:5}
#selbox.show{display:block}
#selnm{color:var(--gold);font-weight:700;font-size:13px;margin-bottom:9px}
.spbtn{width:100%;background:#1a1a22;border:1px solid var(--border);color:var(--txt);padding:8px;border-radius:6px;font-size:11px;cursor:pointer;margin-bottom:4px;font-weight:600;text-align:left;transition:all .15s}
.spbtn:hover{border-color:var(--gold)}
.spbtn.del{color:#f55}
.spbtn.del:hover{border-color:#f55}
#badge{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);background:rgba(10,10,20,.85);border:1px solid var(--border);color:var(--sub);padding:5px 14px;border-radius:20px;font-size:10px;pointer-events:none;white-space:nowrap}
</style>
</head>
<body>
<div id="app">
<div id="hdr">
  <div class="logo">✦ LAMSA 3D</div>
  <div style="display:flex;gap:5px;align-items:center;flex-wrap:wrap">
    <button class="hbtn on" id="btn3d"  onclick="setView('3d')">🧊 3D</button>
    <button class="hbtn"    id="btnTop" onclick="setView('top')">📐 Top</button>
    <button class="hbtn"    onclick="resetCam()">⊙ Reset</button>
    <button class="hbtn"    onclick="clearAll()" style="color:#f55">🗑 Clear</button>
    <button class="hbtn gold" onclick="donePlan()">✓ Done</button>
  </div>
</div>
<div id="main">
  <div id="sb">
    <div id="sbtabs">
      <div class="stab on" id="t1" onclick="showTab('items')">🛋 Items</div>
      <div class="stab"    id="t2" onclick="showTab('room')">⚙ Room</div>
    </div>
    <div id="sbody"></div>
  </div>
  <div id="cw">
    <canvas id="c"></canvas>
    <div id="hint"></div>
    <div id="selbox">
      <div id="selnm">—</div>
      <button class="spbtn" onclick="rotSel()">↻ Rotate 90°</button>
      <button class="spbtn" onclick="dupSel()">⧉ Duplicate</button>
      <button class="spbtn del" onclick="delSel()">✕ Delete</button>
    </div>
    <div id="badge">Drag to orbit · Scroll to zoom · Click furniture to select & drag</div>
  </div>
</div>
</div>

// ─── SCENE ─────────────────────────────────────────────
var canvas = document.getElementById('c');
var wrap   = document.getElementById('cw');
var renderer = new THREE.WebGLRenderer({canvas:canvas, antialias:true});
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;

var scene = new THREE.Scene();
scene.background = new THREE.Color(0x13131A);

var camera = new THREE.PerspectiveCamera(50, 1, 0.1, 80);
var topCam = new THREE.OrthographicCamera(-8,8,8,-8,0.1,100);
topCam.position.set(0,20,0);
topCam.lookAt(0,0,0);

var controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.07;
controls.minDistance  = 0.5;
controls.maxDistance  = 22;
controls.maxPolarAngle = Math.PI/2 - 0.05;

// Lights
scene.add(new THREE.AmbientLight(0xffffff, 1.5));
var sun = new THREE.DirectionalLight(0xFFF8F0, 2.0);
sun.position.set(5,12,5);
sun.castShadow = true;
sun.shadow.mapSize.width  = 2048;
sun.shadow.mapSize.height = 2048;
sun.shadow.camera.left   = -12;
sun.shadow.camera.right  =  12;
sun.shadow.camera.top    =  12;
sun.shadow.camera.bottom = -12;
scene.add(sun);
var fill = new THREE.DirectionalLight(0xffffff, 0.8);
fill.position.set(-4,8,-4);
scene.add(fill);
var pt = new THREE.PointLight(0xFFF0D8, 0.9, 18);
pt.position.set(0,2.5,0);
scene.add(pt);

var roomGrp = new THREE.Group();
var furnGrp = new THREE.Group();
scene.add(roomGrp, furnGrp);

// ─── ROOM ──────────────────────────────────────────────
var RW=5, RD=4, RH=2.8;

var mFloor = new THREE.MeshStandardMaterial({color:0x5C4830, roughness:0.75, metalness:0.03});
var mWall  = new THREE.MeshStandardMaterial({color:0x787880, roughness:0.8,  metalness:0.0, side:THREE.DoubleSide});
var mGold  = new THREE.MeshStandardMaterial({color:0xC9A84C, roughness:0.28, metalness:0.82});

function buildRoom(){
  while(roomGrp.children.length) roomGrp.remove(roomGrp.children[0]);
  var g = roomGrp, T = 0.13;

  // Floor
  var fl = new THREE.Mesh(new THREE.BoxGeometry(RW, 0.1, RD), mFloor);
  fl.position.y = -0.05; fl.receiveShadow = true; fl.userData.isFloor = true;
  g.add(fl);

  // 4 walls (no ceiling)
  var walls = [
    [0, RH/2, -RD/2-T/2,  RW+T*2, RH, T],  // north
    [0, RH/2,  RD/2+T/2,  RW+T*2, RH, T],  // south
    [-RW/2-T/2, RH/2, 0,  T, RH, RD],       // west
    [ RW/2+T/2, RH/2, 0,  T, RH, RD],       // east
  ];
  walls.forEach(function(w){
    var m = new THREE.Mesh(new THREE.BoxGeometry(w[3],w[4],w[5]), mWall);
    m.position.set(w[0],w[1],w[2]); m.receiveShadow=true; m.castShadow=true;
    g.add(m);
  });

  // Gold skirting
  var sk = [
    [0,0.035,-RD/2, RW,0.07,0.05],
    [0,0.035, RD/2, RW,0.07,0.05],
    [-RW/2,0.035,0, 0.05,0.07,RD],
    [ RW/2,0.035,0, 0.05,0.07,RD],
  ];
  sk.forEach(function(s){
    var m = new THREE.Mesh(new THREE.BoxGeometry(s[3],s[4],s[5]), mGold);
    m.position.set(s[0],s[1],s[2]); g.add(m);
  });

  // Grid
  var old = scene.getObjectByName('grid');
  if(old) scene.remove(old);
  var gr = new THREE.GridHelper(Math.max(RW,RD)*2, Math.max(RW,RD)*4, 0x3A2E18, 0x241A08);
  gr.name = 'grid'; gr.position.y = 0.002; scene.add(gr);

  pt.position.set(0, RH*0.88, 0);
  resetCam();
}

function resetCam(){
  var d = Math.max(RW, RD);
  camera.position.set(d*0.72, d*1.3, d*0.88);
  camera.lookAt(0, 0.3, 0);
  controls.target.set(0, 0.3, 0);
  controls.update();
  var asp = wrap.clientWidth / (wrap.clientHeight||1);
  var vs  = d * 0.75;
  topCam.left=-vs*asp; topCam.right=vs*asp; topCam.top=vs; topCam.bottom=-vs;
  topCam.updateProjectionMatrix();
}

// ─── FURNITURE MESH ─────────────────────────────────────
function makeFurn(def, ghost){
  var op  = ghost ? 0.4 : 1.0;
  var tr  = ghost ? true : false;
  var bm  = new THREE.MeshStandardMaterial({color:def.c, roughness:0.62, metalness:0.06, transparent:tr, opacity:op});
  var tm  = new THREE.MeshStandardMaterial({color:def.t, roughness:0.3,  metalness:0.5,  transparent:tr, opacity:op});

  var bh  = def.h * 0.88;
  var th  = def.h * 0.07;

  var g   = new THREE.Group();

  var body = new THREE.Mesh(new THREE.BoxGeometry(def.w, bh, def.d), bm);
  body.position.y = bh/2;
  body.castShadow = !ghost; body.receiveShadow = !ghost;
  g.add(body);

  var top = new THREE.Mesh(new THREE.BoxGeometry(def.w*0.97, th, def.d*0.97), tm);
  top.position.y = bh + th/2;
  top.castShadow = !ghost;
  g.add(top);

  g.userData.def = def;
  return g;
}

// ─── PLACEMENT ──────────────────────────────────────────
var placed   = [];
var placing  = null;
var ghost    = null;
var sel      = null;
var dragging = false;
var dragOffX = 0, dragOffZ = 0;
var isTop    = false;

var floorPlane = new THREE.Plane(new THREE.Vector3(0,1,0), 0);
var raycaster  = new THREE.Raycaster();
var mouse      = new THREE.Vector2();

function startPlace(def){
  placing = def;
  if(ghost) scene.remove(ghost);
  ghost = makeFurn(def, true);
  scene.add(ghost);
  controls.enabled = false;
  showHint('Click on the floor to place — ESC to cancel');
  deselect();
}

function cancelPlace(){
  placing = null;
  if(ghost){ scene.remove(ghost); ghost=null; }
  controls.enabled = !isTop;
  hideHint();
  document.querySelectorAll('.fitem').forEach(function(e){e.classList.remove('pick');});
}

function doPlace(x,z){
  var m = makeFurn(placing, false);
  m.position.set(snap(x), 0, snap(z));
  furnGrp.add(m);
  placed.push({mesh:m, def:placing});
  save();
  cancelPlace();
}

function snap(v){ return Math.round(v/0.1)*0.1; }

function getNDC(e){
  var r  = canvas.getBoundingClientRect();
  var cx = e.touches ? e.touches[0].clientX : e.clientX;
  var cy = e.touches ? e.touches[0].clientY : e.clientY;
  mouse.x =  ((cx-r.left)/r.width)  * 2 - 1;
  mouse.y = -((cy-r.top) /r.height) * 2 + 1;
}

function getFloor(){
  var cam = isTop ? topCam : camera;
  raycaster.setFromCamera(mouse, cam);
  var pt = new THREE.Vector3();
  return raycaster.ray.intersectPlane(floorPlane, pt) ? pt : null;
}

function pickFurn(){
  var cam = isTop ? topCam : camera;
  raycaster.setFromCamera(mouse, cam);
  var ms = [];
  furnGrp.traverse(function(o){ if(o.isMesh) ms.push(o); });
  var hits = raycaster.intersectObjects(ms);
  if(!hits.length) return null;
  var o = hits[0].object;
  while(o.parent && o.parent !== furnGrp) o = o.parent;
  return placed.find(function(i){ return i.mesh===o; }) || null;
}

// selection highlight
function setHighlight(item, on){
  item.mesh.traverse(function(o){
    if(o.isMesh){
      if(on){ o.material = o.material.clone(); o.material.emissive = new THREE.Color(0x3A2800); }
      else   { o.material.emissive = new THREE.Color(0x000000); }
    }
  });
}

function select(item){
  deselect();
  sel = item;
  setHighlight(item, true);
  document.getElementById('selbox').classList.add('show');
  document.getElementById('selnm').textContent = item.def.n;
}

function deselect(){
  if(sel) setHighlight(sel, false);
  sel = null;
  document.getElementById('selbox').classList.remove('show');
}

// ─── MOUSE EVENTS ───────────────────────────────────────
canvas.addEventListener('mousemove', function(e){
  getNDC(e);
  if(placing && ghost){ var p=getFloor(); if(p) ghost.position.set(snap(p.x),0,snap(p.z)); return; }
  if(dragging && sel){ var p=getFloor(); if(p){ sel.mesh.position.x=snap(p.x-dragOffX); sel.mesh.position.z=snap(p.z-dragOffZ); } }
});

canvas.addEventListener('mousedown', function(e){
  if(e.button!==0) return;
  getNDC(e);
  if(placing){ var p=getFloor(); if(p) doPlace(p.x,p.z); return; }
  var item = pickFurn();
  if(item){
    if(sel === item){
      // already selected → start drag
      dragging = true;
      var p = getFloor();
      if(p){ dragOffX = p.x-item.mesh.position.x; dragOffZ = p.z-item.mesh.position.z; }
      controls.enabled = false;
      e.stopPropagation();
    } else {
      select(item);
    }
  } else {
    deselect();
  }
});

canvas.addEventListener('mouseup', function(){
  if(dragging){ dragging=false; controls.enabled=!isTop; save(); }
});

canvas.addEventListener('mouseleave', function(){
  if(dragging){ dragging=false; controls.enabled=!isTop; save(); }
});

// touch
canvas.addEventListener('touchstart', function(e){
  getNDC(e);
  if(placing){ var p=getFloor(); if(p) doPlace(p.x,p.z); }
}, {passive:true});

canvas.addEventListener('touchmove', function(e){
  e.preventDefault(); getNDC(e);
  if(placing && ghost){ var p=getFloor(); if(p) ghost.position.set(snap(p.x),0,snap(p.z)); }
  if(dragging && sel){ var p=getFloor(); if(p){ sel.mesh.position.x=snap(p.x-dragOffX); sel.mesh.position.z=snap(p.z-dragOffZ); } }
}, {passive:false});

canvas.addEventListener('touchend', function(){
  if(dragging){ dragging=false; save(); }
});

document.addEventListener('keydown', function(e){
  if(e.key==='Escape') cancelPlace();
  if((e.key==='Delete'||e.key==='Backspace') && sel && !placing) delSel();
  if((e.key==='r'||e.key==='R') && sel) rotSel();
});

// ─── ACTIONS ────────────────────────────────────────────
function rotSel(){ if(!sel) return; sel.mesh.rotation.y += Math.PI/2; save(); }
function dupSel(){
  if(!sel) return;
  var m = makeFurn(sel.def, false);
  m.position.copy(sel.mesh.position); m.position.x += 0.6;
  m.rotation.copy(sel.mesh.rotation);
  furnGrp.add(m); placed.push({mesh:m, def:sel.def}); save();
}
function delSel(){
  if(!sel) return;
  furnGrp.remove(sel.mesh);
  placed.splice(placed.indexOf(sel),1);
  deselect(); save();
}
function clearAll(){
  if(!placed.length) return;
  if(!confirm('Remove all furniture?')) return;
  while(furnGrp.children.length) furnGrp.remove(furnGrp.children[0]);
  placed.length=0; deselect(); save();
}
window.rotSel=rotSel; window.dupSel=dupSel; window.delSel=delSel; window.clearAll=clearAll;

function showHint(t){ var h=document.getElementById('hint'); h.textContent=t; h.classList.add('show'); }
function hideHint(){ document.getElementById('hint').classList.remove('show'); }

// ─── VIEW ───────────────────────────────────────────────
function setView(m){
  isTop = (m==='top');
  document.getElementById('btn3d').classList.toggle('on',!isTop);
  document.getElementById('btnTop').classList.toggle('on', isTop);
  document.getElementById('badge').textContent = isTop
    ? 'Top View — click to place · click to select · drag to move'
    : '3D View — drag to orbit · scroll to zoom · click to select & drag';
  controls.enabled = !isTop && !placing;
}
window.setView=setView;
window.resetCam=resetCam;

// ─── SIDEBAR ────────────────────────────────────────────
var curRoom = 'bedroom';

function buildItems(rt){
  curRoom = rt;
  var items = CAT[rt] || CAT.bedroom;
  var html = '<div class="slbl">Room Type</div>';
  html += '<select class="ssel" onchange="chRoom(this.value)">';
  Object.keys(CAT).forEach(function(k){
    html += '<option value="'+k+'"'+(k===rt?' selected':'')+'>'+( RLBL[k]||k)+'</option>';
  });
  html += '</select><div class="slbl">Furniture — click to place</div><div class="fgrid">';
  items.forEach(function(d){
    html += '<div class="fitem" id="fi_'+d.id+'" onclick="pickItem(\''+d.id+'\',this)">'
          + '<span class="ico">'+d.e+'</span><span class="nm">'+d.n+'</span></div>';
  });
  html += '</div><div style="font-size:9px;color:#2a2a2a;text-align:center;margin-top:6px">R = rotate · Del = delete</div>';
  document.getElementById('sbody').innerHTML = html;
}

function buildRoomTab(){
  document.getElementById('sbody').innerHTML =
    '<div class="slbl">Width (m)</div><input type="number" class="sinp" id="in-w" value="'+RW+'" min="2" max="15" step="0.5">'
   +'<div class="slbl">Length (m)</div><input type="number" class="sinp" id="in-d" value="'+RD+'" min="2" max="15" step="0.5">'
   +'<div class="slbl">Ceiling Height (m)</div><input type="number" class="sinp" id="in-h" value="'+RH+'" min="2" max="5" step="0.1">'
   +'<button class="sbtn" onclick="applyRoom()">✓ Apply</button>';
}

function showTab(t){
  document.getElementById('t1').classList.toggle('on',t==='items');
  document.getElementById('t2').classList.toggle('on',t==='room');
  if(t==='items') buildItems(curRoom); else buildRoomTab();
}
window.showTab=showTab;

function chRoom(v){
  buildItems(v);
  try{ parent.postMessage({type:'lamsa_room_change',roomType:v},'*'); }catch(ex){}
}
window.chRoom=chRoom;

function pickItem(id,el){
  var def = allDefs.find(function(d){ return d.id===id; });
  if(!def) return;
  document.querySelectorAll('.fitem').forEach(function(e){e.classList.remove('pick');});
  el.classList.add('pick');
  startPlace(def);
}
window.pickItem=pickItem;

function applyRoom(){
  RW = Math.max(2,Math.min(15,parseFloat(document.getElementById('in-w').value)||5));
  RD = Math.max(2,Math.min(15,parseFloat(document.getElementById('in-d').value)||4));
  RH = Math.max(2,Math.min(5, parseFloat(document.getElementById('in-h').value)||2.8));
  buildRoom();
}
window.applyRoom=applyRoom;

// ─── SAVE / LOAD ────────────────────────────────────────
function save(){
  try{
    localStorage.setItem('lamsa_planner', JSON.stringify({
      RW:RW, RD:RD, RH:RH, rt:curRoom,
      items: placed.map(function(i){
        return {id:i.def.id, x:i.mesh.position.x, z:i.mesh.position.z, ry:i.mesh.rotation.y};
      })
    }));
  }catch(ex){}
}

function load(){
  try{
    var data = JSON.parse(localStorage.getItem('lamsa_planner')||'null');
    if(!data) return;
    if(data.RW) RW=data.RW; if(data.RD) RD=data.RD; if(data.RH) RH=data.RH;
    buildRoom();
    if(data.rt) buildItems(data.rt);
    (data.items||[]).forEach(function(s){
      var def = allDefs.find(function(d){ return d.id===s.id; });
      if(!def) return;
      var m = makeFurn(def, false);
      m.position.set(s.x, 0, s.z);
      m.rotation.y = s.ry || 0;
      furnGrp.add(m);
      placed.push({mesh:m, def:def});
    });
  }catch(ex){}
}

function describe(){
  if(!placed.length) return '';
  return placed.map(function(i){
    var pos='center', x=i.mesh.position.x, z=i.mesh.position.z;
    if(z < -RD/2*0.6) pos='north wall';
    else if(z >  RD/2*0.6) pos='south wall';
    else if(x < -RW/2*0.6) pos='west wall';
    else if(x >  RW/2*0.6) pos='east wall';
    return i.def.n+' at '+pos;
  }).join(', ');
}

window.getFpDescription = describe;
window.donePlan = function(){
  save();
  try{ parent.postMessage({type:'lamsa_planner_done', description:describe()},'*'); }catch(ex){}
  if(parent===window) history.back();
};

// ─── RESIZE & RENDER ────────────────────────────────────
function resize(){
  var W = wrap.clientWidth, H = wrap.clientHeight||1;
  renderer.setSize(W, H, false);
  camera.aspect = W/H; camera.updateProjectionMatrix();
  var asp=W/H, vs=Math.max(RW,RD)*0.75;
  topCam.left=-vs*asp; topCam.right=vs*asp; topCam.top=vs; topCam.bottom=-vs;
  topCam.updateProjectionMatrix();
}
window.addEventListener('resize', resize);

function animate(){
  requestAnimationFrame(animate);
  if(!isTop) controls.update();
  renderer.render(scene, isTop?topCam:camera);
}

// ─── INIT ───────────────────────────────────────────────
var params = new URLSearchParams(location.search);
if(params.get('embedded')) document.getElementById('hdr').style.display='none';
var initRoom = params.get('room') || 'bedroom';

buildRoom();
buildItems(initRoom);
load();
resize();
animate();

window.addEventListener('message', function(e){
  if(e.data && e.data.type==='lamsa_set_room') buildItems(e.data.roomType);
});
</script>
