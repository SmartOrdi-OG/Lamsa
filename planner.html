<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Lamsa 3D Planner</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--gold:#c9a84c;--dark:#0a0a0a;--card:#111;--border:#222;--text:#fff;--sub:#888;}
body{background:var(--dark);color:var(--text);font-family:'Segoe UI',Tajawal,sans-serif;overflow:hidden;height:100vh;display:flex;flex-direction:column;}

/* Header */
#header{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:#0d0d0d;border-bottom:1px solid var(--border);flex-shrink:0;gap:8px;}
#header .logo{color:var(--gold);font-weight:800;font-size:16px;letter-spacing:1px;}
#header .actions{display:flex;gap:8px;}
.hbtn{background:var(--card);border:1px solid var(--border);color:var(--text);padding:7px 14px;border-radius:8px;font-size:12px;cursor:pointer;font-weight:600;white-space:nowrap;}
.hbtn.gold{background:var(--gold);color:#000;border-color:var(--gold);}
.hbtn:active{opacity:0.8;}

/* Main layout */
#main{display:flex;flex:1;min-height:0;}

/* Sidebar */
#sidebar{width:200px;background:#0d0d0d;border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden;}
#sidebar-tabs{display:flex;border-bottom:1px solid var(--border);}
.stab{flex:1;padding:10px 4px;text-align:center;font-size:11px;color:var(--sub);cursor:pointer;border-bottom:2px solid transparent;}
.stab.active{color:var(--gold);border-bottom-color:var(--gold);}
#sidebar-content{flex:1;overflow-y:auto;padding:8px;}

/* Room selector */
.room-selector{margin-bottom:12px;}
.room-label{font-size:10px;color:var(--sub);margin-bottom:6px;text-transform:uppercase;letter-spacing:1px;}
.room-select{width:100%;background:#1a1a1a;border:1px solid var(--border);color:var(--text);padding:8px;border-radius:8px;font-size:12px;}

/* Furniture catalog */
.catalog-section{margin-bottom:12px;}
.cat-title{font-size:10px;color:var(--sub);margin-bottom:6px;text-transform:uppercase;letter-spacing:1px;display:flex;align-items:center;gap:4px;}
.furn-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.furn-item{background:#1a1a1a;border:1px solid var(--border);border-radius:8px;padding:8px 6px;text-align:center;cursor:pointer;transition:all 0.2s;user-select:none;position:relative;}
.furn-item:active,.furn-item:hover{border-color:var(--gold);background:#1a1a0a;}
.furn-item .icon{font-size:22px;margin-bottom:4px;display:block;}
.furn-item .name{font-size:10px;color:var(--sub);line-height:1.2;}
.furn-item.has-variants{border-color:#2a2a2a;}
.var-arrow{font-size:10px;color:var(--gold);margin-top:2px;}
.variants-panel{background:#0d0d0d;border:1px solid #222;border-radius:8px;padding:8px;margin-bottom:6px;grid-column:1/-1;}
.variants-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(72px,1fr));gap:6px;}
.variant-item{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:6px;padding:8px 4px;text-align:center;cursor:pointer;transition:all 0.2s;}
.variant-item:hover{border-color:var(--gold);background:#1a1a0a;}
.variant-item .name{font-size:9px;color:var(--sub);margin-top:2px;}

/* Canvas */
#canvas-wrap{flex:1;position:relative;overflow:hidden;background:#0d0d0d;}
#c{display:block;width:100%;height:100%;}

/* Bottom toolbar */
#toolbar{background:#0d0d0d;border-top:1px solid var(--border);padding:10px 12px;flex-shrink:0;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.tbtn{background:var(--card);border:1px solid var(--border);color:var(--text);padding:7px 12px;border-radius:8px;font-size:12px;cursor:pointer;font-weight:600;display:flex;align-items:center;gap:4px;}
.tbtn:active{opacity:0.8;}
.tbtn.danger{color:#e55;}
.tbtn.gold{color:var(--gold);border-color:var(--gold);}
#info{font-size:11px;color:var(--sub);margin-left:auto;}

/* Selected info */
#sel-panel{display:none;position:absolute;bottom:70px;right:12px;background:#111;border:1px solid var(--border);border-radius:12px;padding:12px;min-width:160px;z-index:10;}
#sel-panel .sel-name{color:var(--gold);font-weight:700;font-size:13px;margin-bottom:8px;}
#sel-panel .sel-row{display:flex;gap:6px;margin-bottom:6px;}
#sel-panel button{flex:1;background:#1a1a1a;border:1px solid var(--border);color:var(--text);padding:6px;border-radius:6px;font-size:11px;cursor:pointer;}
#sel-panel button:active{opacity:0.8;}
#sel-panel .del-btn{color:#e55;border-color:#422;}

/* Grid toggle */
#grid-toggle{position:absolute;top:10px;right:10px;background:#111a;border:1px solid var(--border);color:var(--sub);padding:6px 10px;border-radius:6px;font-size:11px;cursor:pointer;}

/* Loading */
#loading{display:none;position:absolute;inset:0;background:#0a0a0acc;z-index:20;align-items:center;justify-content:center;flex-direction:column;gap:12px;}
#loading.show{display:flex;}
.spinner{width:40px;height:40px;border:3px solid #333;border-top-color:var(--gold);border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
#loading p{color:var(--sub);font-size:13px;}

/* Mobile sidebar toggle */
#sidebar-toggle{display:none;}
@media(max-width:600px){
  #sidebar{display:none;position:fixed;left:0;top:0;bottom:0;z-index:100;width:240px;}
  #sidebar.open{display:flex;}
  #sidebar-toggle{display:block;}
}
#sidebar-overlay{display:none;position:fixed;inset:0;z-index:98;background:rgba(0,0,0,0.5);}
#sidebar-overlay.show{display:block;}
</style>
</head>
<body>

<!-- Header -->
<div id="header">
  <div class="logo">✦ LAMSA 3D</div>
  <div class="actions">
    <button class="hbtn" id="sidebar-toggle" onclick="toggleSidebar()">☰ Items</button>
    <button class="hbtn" onclick="resetView()">⊙ Reset View</button>
    <button class="hbtn" onclick="clearAll()">🗑</button>
    <button class="hbtn gold" onclick="saveAndBack()" style="background:var(--gold);color:#000;font-weight:700;">✓ Done</button>
  </div>
</div>

<!-- Main -->
<div id="main">

  <!-- Sidebar -->
  <div id="sidebar">
    <div id="sidebar-tabs">
      <div class="stab active" onclick="switchTab('furniture')">🛋 Items</div>
      <div class="stab" onclick="switchTab('rooms')">🏠 Rooms</div>
      <div class="stab" onclick="document.getElementById('sidebar').classList.remove('open')" style="flex:0;padding:10px 12px;font-size:16px;">✕</div>
    </div>
    <div id="sidebar-content">

      <!-- Room type selector -->
      <div class="room-selector">
        <div class="room-label">Room Type</div>
        <select class="room-select" id="roomSel" onchange="handleRoomChange()">
          <option value="bedroom">🛏 Bedroom</option>
          <option value="living">🛋 Living Room</option>
          <option value="kitchen">🍳 Kitchen</option>
          <option value="bathroom">🛁 Bathroom</option>
          <option value="office">💻 Home Office</option>
          <option value="dining">🍽 Dining Room</option>
          <option value="kids">🧸 Kids Room</option>
          <option value="garden">🌿 Garden</option>
        </select>
      </div>

      <!-- Catalog -->
      <div id="catalog"></div>
    </div>
  </div>

  <!-- Canvas -->
  <div id="canvas-wrap">
    <div id="sidebar-overlay" onclick="document.getElementById('sidebar').classList.remove('open');this.classList.remove('show');"></div>
    <canvas id="c"></canvas>
    <button id="grid-toggle" onclick="toggleGrid()">⊞ Grid</button>
    <div id="sel-panel">
      <div class="sel-name" id="sel-name">Item</div>
      <div class="sel-row">
        <button onclick="rotateSelected(90)">↻ 90°</button>
        <button onclick="rotateSelected(45)">↻ 45°</button>
      </div>
      <div class="sel-row">
        <button onclick="duplicateSelected()">⊕ Copy</button>
        <button class="del-btn" onclick="deleteSelected()">✕ Delete</button>
      </div>
    </div>
    <div id="loading">
      <div class="spinner"></div>
      <p id="loading-text">Loading...</p>
    </div>
  </div>
</div>

<!-- Bottom Toolbar -->
<div id="toolbar">
  <button class="tbtn" onclick="rotateSelected(90)">↻ Rotate</button>
  <button class="tbtn" onclick="duplicateSelected()">⊕ Copy</button>
  <button class="tbtn danger" onclick="deleteSelected()">✕ Remove</button>
  <button class="tbtn gold" onclick="snapToWall()">⊞ Snap Wall</button>
  <span id="info">Select an item to edit</span>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<!-- Generate Modal -->
<div id="genModal" style="display:none;position:fixed;inset:0;z-index:9999;background:#0a0a0acc;align-items:center;justify-content:center;">
  <div style="background:#111;border:1px solid #333;border-radius:16px;padding:20px;max-width:340px;width:90%;text-align:center;">
    <div id="genStatus" style="color:#c9a84c;font-size:14px;margin-bottom:16px;">Taking screenshot...</div>
    <div id="genPreview" style="margin-bottom:16px;"></div>
    <div id="genResult" style="margin-bottom:16px;display:none;">
      <img id="genImg" style="width:100%;border-radius:8px;" />
    </div>
    <div style="display:flex;gap:8px;">
      <button type="button" onclick="closeGenModal()" style="flex:1;background:#1a1a1a;border:1px solid #333;color:#888;padding:10px;border-radius:8px;font-size:13px;cursor:pointer;">Close</button>
      <button type="button" id="saveImgBtn" onclick="saveGenImage()" style="display:none;flex:1;background:#c9a84c;border:none;color:#000;padding:10px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;">💾 Save</button>
    </div>
  </div>
</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';

// ─── Scene Setup ───────────────────────────────────────────
const canvas = document.getElementById('c');
const wrap = document.getElementById('canvas-wrap');

const renderer = new THREE.WebGLRenderer({canvas, antialias:true, alpha:false});
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a1a);
scene.fog = new THREE.Fog(0x1a1a1a, 20, 40);

const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 100);
camera.position.set(0, 9, 6);
camera.lookAt(0, 0, 0);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.minDistance = 2;
controls.maxDistance = 25;
controls.maxPolarAngle = Math.PI / 2.05;
controls.target.set(0, 0, 0);
controls.update();

// ─── Lighting ───────────────────────────────────────────────
const ambient = new THREE.AmbientLight(0xffffff, 0.6);
scene.add(ambient);

const sunLight = new THREE.DirectionalLight(0xfff8f0, 1.5);
sunLight.position.set(8, 12, 6);
sunLight.castShadow = true;
sunLight.shadow.mapSize.set(2048, 2048);
sunLight.shadow.camera.near = 0.1;
sunLight.shadow.camera.far = 40;
sunLight.shadow.camera.left = -10;
sunLight.shadow.camera.right = 10;
sunLight.shadow.camera.top = 10;
sunLight.shadow.camera.bottom = -10;
sunLight.shadow.bias = -0.001;
scene.add(sunLight);

const fillLight = new THREE.DirectionalLight(0xe8f0ff, 0.4);
fillLight.position.set(-6, 4, -4);
scene.add(fillLight);

const backLight = new THREE.PointLight(0xffd080, 0.3, 15);
backLight.position.set(0, 3, -4);
scene.add(backLight);

// ─── Room ────────────────────────────────────────────────────
let roomW = 5, roomL = 4, roomH = 2.8;
let roomGroup = new THREE.Group();
scene.add(roomGroup);

function buildRoom() {
  while(roomGroup.children.length) roomGroup.remove(roomGroup.children[0]);

  // Floor
  const floorGeo = new THREE.PlaneGeometry(roomW, roomL);
  const floorMat = new THREE.MeshStandardMaterial({
    color: 0xc8b89a, roughness: 0.9, metalness: 0.0
  });
  const floor = new THREE.Mesh(floorGeo, floorMat);
  floor.rotation.x = -Math.PI/2;
  floor.receiveShadow = true;
  floor.name = 'floor';
  roomGroup.add(floor);

  // Walls
  const wallMat = new THREE.MeshStandardMaterial({color:0xf0ece4, roughness:0.95, side:THREE.DoubleSide});
  const walls = [
    {w:roomW, h:roomH, x:0, y:roomH/2, z:-roomL/2, ry:0},        // back
    {w:roomW, h:roomH, x:0, y:roomH/2, z:roomL/2,  ry:Math.PI},  // front
    {w:roomL, h:roomH, x:-roomW/2, y:roomH/2, z:0, ry:Math.PI/2}, // left
    {w:roomL, h:roomH, x:roomW/2,  y:roomH/2, z:0, ry:-Math.PI/2},// right
  ];
  walls.forEach(w => {
    const mesh = new THREE.Mesh(new THREE.PlaneGeometry(w.w, w.h), wallMat);
    mesh.position.set(w.x, w.y, w.z);
    mesh.rotation.y = w.ry;
    mesh.receiveShadow = true;
    roomGroup.add(mesh);
  });

  // No ceiling - open top view

  // Grid on floor
  if(showGrid) {
    const grid = new THREE.GridHelper(Math.max(roomW,roomL)+2, Math.max(roomW,roomL)+2, 0x888888, 0x333333);
    grid.position.y = 0.001;
    grid.name = 'grid';
    roomGroup.add(grid);
  }

  sunLight.shadow.camera.left = -roomW;
  sunLight.shadow.camera.right = roomW;
  sunLight.shadow.camera.top = roomL;
  sunLight.shadow.camera.bottom = -roomL;
  sunLight.shadow.camera.updateProjectionMatrix();
}

let showGrid = true;
window.toggleGrid = () => { showGrid = !showGrid; buildRoom(); };

buildRoom();

// ─── GLTF Loader ─────────────────────────────────────────────
const loader = new GLTFLoader();
const draco = new DRACOLoader();
draco.setDecoderPath('https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/libs/draco/');
loader.setDRACOLoader(draco);

// ─── Procedural Furniture ────────────────────────────────────
function mat(color, rough=0.6, metal=0) {
  return new THREE.MeshStandardMaterial({color, roughness:rough, metalness:metal});
}

function box(w,h,d, material, rx=0,ry=0,rz=0) {
  const m = new THREE.Mesh(new THREE.BoxGeometry(w,h,d), material);
  m.rotation.set(rx,ry,rz);
  m.castShadow = true; m.receiveShadow = true;
  return m;
}

function cyl(rt,rb,h,material,seg=16) {
  const m = new THREE.Mesh(new THREE.CylinderGeometry(rt,rb,h,seg), material);
  m.castShadow = true; m.receiveShadow = true;
  return m;
}

// ─── Furniture Management ────────────────────────────────────
let items = [];
let selectedItem = null;
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

function addItem(catalogEntry) {
  const group = catalogEntry.make();
  group.position.set(
    (Math.random()-0.5)*roomW*0.5,
    0,
    (Math.random()-0.5)*roomL*0.5
  );
  group.userData = {
    id: Date.now(),
    name: catalogEntry.name,
    draggable: true
  };
  scene.add(group);
  items.push(group);
  selectItem(group);
  return group;
}

window.fp3dAddItemById = function(roomType, id) {
  const list = [...(CATALOG[roomType]||[]), ...ALWAYS];
  const entry = list.find(e=>e.id===id);
  if(entry) {
    addItem(entry);
    // Close sidebar on mobile after selection
    if(window.innerWidth <= 600) {
      document.getElementById('sidebar').classList.remove('open');
      document.getElementById('sidebar-overlay').classList.remove('show');
    }
  }
};

function selectItem(item) {
  // Deselect previous
  if(selectedItem) {
    selectedItem.traverse(c=>{
      if(c.isMesh && c.userData.origEmissive !== undefined) {
        c.material.emissive.setHex(c.userData.origEmissive);
        c.material.emissiveIntensity = 0;
      }
    });
  }
  selectedItem = item;
  if(item) {
    item.traverse(c=>{
      if(c.isMesh) {
        if(c.userData.origEmissive === undefined) c.userData.origEmissive = c.material.emissive.getHex();
        c.material.emissive.setHex(0xc9a84c);
        c.material.emissiveIntensity = 0.25;
      }
    });
    document.getElementById('sel-panel').style.display = 'block';
    document.getElementById('sel-name').textContent = item.userData.name;
    document.getElementById('info').textContent = `Selected: ${item.userData.name}`;
  } else {
    document.getElementById('sel-panel').style.display = 'none';
    document.getElementById('info').textContent = 'Select an item to edit';
  }
}

window.rotateSelected = function(deg) {
  if(!selectedItem) return;
  selectedItem.rotation.y += deg * Math.PI / 180;
};

window.deleteSelected = function() {
  if(!selectedItem) return;
  scene.remove(selectedItem);
  items = items.filter(i=>i!==selectedItem);
  selectItem(null);
};

window.duplicateSelected = function() {
  if(!selectedItem) return;
  const clone = selectedItem.clone();
  clone.position.x += 0.4;
  clone.userData = {...selectedItem.userData, id: Date.now()};
  scene.add(clone);
  items.push(clone);
  selectItem(clone);
};

window.snapToWall = function() {
  if(!selectedItem) return;
  const p = selectedItem.position;
  const hw = roomW/2 - 0.1;
  const hl = roomL/2 - 0.1;
  const dists = [
    {axis:'z', val:-hl, dist:Math.abs(p.z+hl), ry:0},
    {axis:'z', val:hl,  dist:Math.abs(p.z-hl),  ry:Math.PI},
    {axis:'x', val:-hw, dist:Math.abs(p.x+hw), ry:Math.PI/2},
    {axis:'x', val:hw,  dist:Math.abs(p.x-hw),  ry:-Math.PI/2},
  ];
  const nearest = dists.sort((a,b)=>a.dist-b.dist)[0];
  if(nearest.axis==='z') selectedItem.position.z = nearest.val;
  else selectedItem.position.x = nearest.val;
  selectedItem.rotation.y = nearest.ry;
};

window.clearAll = function() {
  items.forEach(i=>scene.remove(i));
  items = [];
  selectItem(null);
};

window.resetView = function() {
  camera.position.set(0, 9, 6);

};

// ─── Drag to Move ────────────────────────────────────────────
let isDragging = false;
let dragStart = new THREE.Vector3();
let dragPlane = new THREE.Plane();

function getWorldPos(event, y=0) {
  const rect = canvas.getBoundingClientRect();
  const cx = event.clientX ?? event.touches?.[0]?.clientX;
  const cy = event.clientY ?? event.touches?.[0]?.clientY;
  mouse.x = ((cx-rect.left)/rect.width)*2-1;
  mouse.y = -((cy-rect.top)/rect.height)*2+1;
  raycaster.setFromCamera(mouse, camera);
  const plane = new THREE.Plane(new THREE.Vector3(0,1,0), -y);
  const target = new THREE.Vector3();
  raycaster.ray.intersectPlane(plane, target);
  return target;
}

function getClickedItem(event) {
  const rect = canvas.getBoundingClientRect();
  const cx = event.clientX ?? event.touches?.[0]?.clientX;
  const cy = event.clientY ?? event.touches?.[0]?.clientY;
  mouse.x = ((cx-rect.left)/rect.width)*2-1;
  mouse.y = -((cy-rect.top)/rect.height)*2+1;
  raycaster.setFromCamera(mouse, camera);
  const meshes = [];
  items.forEach(g=>g.traverse(c=>{if(c.isMesh)meshes.push(c);}));
  const hits = raycaster.intersectObjects(meshes, false);
  if(hits.length) {
    const hit = hits[0].object;
    let g = hit;
    while(g.parent && !items.includes(g)) g=g.parent;
    if(items.includes(g)) return g;
  }
  return null;
}

let touchLong = null;
let pointerDown = false;
let pointerMoved = false;

renderer.domElement.addEventListener('pointerdown', e=>{
  pointerDown = true; pointerMoved = false;
  const hit = getClickedItem(e);
  if(hit) {
    controls.enabled = false;
    isDragging = true;
    selectItem(hit);
    dragStart = getWorldPos(e, hit.position.y);
  } else {
    controls.enabled = true;
  }
});

renderer.domElement.addEventListener('pointermove', e=>{
  pointerMoved = true;
  if(isDragging && selectedItem) {
    const pos = getWorldPos(e, selectedItem.position.y);
    if(pos) {
      selectedItem.position.x = Math.max(-roomW/2+0.15, Math.min(roomW/2-0.15, pos.x));
      selectedItem.position.z = Math.max(-roomL/2+0.15, Math.min(roomL/2-0.15, pos.z));
    }
  }
});

renderer.domElement.addEventListener('pointerup', e=>{
  if(!pointerMoved && pointerDown) {
    const hit = getClickedItem(e);
    if(hit) selectItem(hit);
    else if(selectedItem) selectItem(null);
  }
  isDragging = false;
  controls.enabled = true;
  pointerDown = false;
});

function buildCatalog() {
  const rt = document.getElementById('roomSel').value;
  const list = [...ALWAYS, ...(CATALOG[rt]||[])];
  const sections = [
    {title:'🪟 Structure', items: list.filter(i=>['window','door'].includes(i.id))},
    {title:'🛋 Furniture',  items: list.filter(i=>!['window','door'].includes(i.id))},
  ];
  let html = '';
  sections.forEach(sec=>{
    if(!sec.items.length) return;
    html += `<div class="catalog-section"><div class="cat-title">${sec.title}</div><div class="furn-grid">`;
    sec.items.forEach(item=>{
      if(item.variants) {
        // Show parent with expand arrow
        html += `<div class="furn-item has-variants" onclick="toggleVariants('${item.id}')">
          <span class="icon">${item.icon}</span>
          <div class="name">${item.name}</div>
          <div class="var-arrow">▾</div>
        </div>
        <div class="variants-panel" id="vars-${item.id}" style="display:none;grid-column:1/-1;">
          <div class="variants-grid">`;
        item.variants.forEach(v=>{
          html += `<div class="variant-item" onclick="addItemById('${rt}','${v.id}')">
            <span class="icon" style="font-size:18px;">${v.icon}</span>
            <div class="name">${v.name}</div>
          </div>`;
        });
        html += `</div></div>`;
      } else {
        html += `<div class="furn-item" onclick="addItemById('${rt}','${item.id}')">
          <span class="icon">${item.icon}</span>
          <div class="name">${item.name}</div>
        </div>`;
      }
    });
    html += '</div></div>';
  });
  document.getElementById('catalog').innerHTML = html;
}

window.toggleVariants = function(id) {
  const panel = document.getElementById('vars-'+id);
  if(!panel) return;
  const isOpen = panel.style.display !== 'none';
  // Close all first
  document.querySelectorAll('.variants-panel').forEach(p=>p.style.display='none');
  document.querySelectorAll('.has-variants .var-arrow').forEach(a=>a.textContent='▾');
  if(!isOpen) {
    panel.style.display = 'block';
    panel.previousElementSibling.querySelector('.var-arrow').textContent = '▴';
  }
};

window.addItemById = function(roomType, id) {
  const allLists = [...ALWAYS, ...(CATALOG[roomType]||[])];
  // Check direct items
  let entry = allLists.find(e=>e.id===id);
  // Check variants
  if(!entry) {
    for(const item of allLists) {
      if(item.variants) {
        const v = item.variants.find(v=>v.id===id);
        if(v) { entry = v; break; }
      }
    }
  }
  if(entry) {
    addItem(entry);
    if(window.innerWidth <= 600) {
      document.getElementById('sidebar').classList.remove('open');
      document.getElementById('sidebar-overlay').classList.remove('show');
    }
  }
};

    if(confirmed) {

// Resize image to maxSize px
function resizeImage(dataUrl, maxSize) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      const scale = Math.min(1, maxSize / Math.max(img.width, img.height));
      const w = Math.round(img.width * scale);
      const h = Math.round(img.height * scale);
      const c = document.createElement('canvas');
      c.width = w; c.height = h;
      c.getContext('2d').drawImage(img, 0, 0, w, h);
      resolve(c.toDataURL('image/jpeg', 0.82));
    };
    img.src = dataUrl;
  });
}

function savePlannerData() {
  const rt = document.getElementById('roomSel').value;
  // Take screenshot
  renderer.render(scene, camera);
  const screenshot = canvas.toDataURL('image/jpeg', 0.7);
  const data = {
    roomType: rt,
    roomW, roomL,
    screenshot: screenshot,
    items: items.map(item => ({
      name: item.userData.name,
      x: +item.position.x.toFixed(2),
      z: +item.position.z.toFixed(2),
      rotY: +item.rotation.y.toFixed(2),
      id: item.userData.id
    }))
  };
  try { localStorage.setItem('lamsa_planner', JSON.stringify(data)); } catch(e) {}
  return data;
}

// Auto-save every 3 seconds
setInterval(savePlannerData, 3000);

// Load saved data and preload chips
function loadPlannerData() {
  try {
    const raw = localStorage.getItem('lamsa_planner');
    if(!raw) return;
    const data = JSON.parse(raw);

    if(data.roomType) {
      document.getElementById('roomSel').value = data.roomType;
      buildCatalog();
    }

    // Preload chips from lamsa as 3D items
    if(data.preloadChips && data.preloadChips.length > 0 && (!data.items || data.items.length === 0)) {
      const rt = data.roomType || 'bedroom';
      const allItems = [...ALWAYS, ...(CATALOG[rt]||[])];

      data.preloadChips.forEach((chip, i) => {
        // Find by ID first, then by name match
        let entry = chip.id ? allItems.find(e => e.id === chip.id) : null;
        if(!entry) {
          // Fuzzy name match
          const chipLower = chip.name.toLowerCase();
          entry = allItems.find(e => e.name.toLowerCase().includes(chipLower) || chipLower.includes(e.name.toLowerCase()));
        }
        if(entry) {
          setTimeout(() => {
            const g = entry.make();
            // Spread items so they don't overlap
            const cols = 3;
            const spacing = 1.2;
            g.position.set(
              ((i % cols) - 1) * spacing,
              0,
              (Math.floor(i / cols) - 1) * spacing
            );
            g.userData = { id: Date.now() + i, name: entry.name, draggable: true };
            scene.add(g);
            items.push(g);
          }, i * 50);
        }
      });

      // Clear preloadChips so they don't reload next time
      data.preloadChips = [];
      localStorage.setItem('lamsa_planner', JSON.stringify(data));
    }
  } catch(e) { console.error('loadPlannerData:', e); }
}
loadPlannerData();

// Save and back
window.saveAndBack = function() {
  savePlannerData();
  window.history.back();
};

document.querySelector('.hbtn.gold') && document.querySelector('.hbtn.gold').addEventListener('click', e => {
  e.preventDefault();
  savePlannerData();

});

    renderer.render(scene, camera);
    const rawScreenshot = canvas.toDataURL('image/jpeg', 0.85);

    // Resize to max 1024px to avoid payload too large
    const screenshot = await resizeImage(rawScreenshot, 1024);

    // Show preview
    document.getElementById('genPreview').innerHTML =
      '<img src="'+screenshot+'" style="width:100%;border-radius:8px;margin-bottom:8px;" />' +
      '<div style="color:#888;font-size:11px;">3D Layout Preview</div>';

    // Step 2: Build prompt from planner data
    const rt = document.getElementById('roomSel').value;
    const itemNames = items.map(i => i.userData.name);
    const prompt = buildGeneratePrompt(rt, items);

    document.getElementById('genStatus').textContent = 'Generating design... (~30s)';

    // Step 3: Send to API
    const response = await fetch('/api/generate', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        prompt: prompt,
        image_url: screenshot,
        num_images: 1
      })
    });

    if(!response.ok) {
      const err = await response.json();
      throw new Error(err.error || 'Generation failed');
    }

    const data = await response.json();
    const imageUrl = data.images?.[0]?.url || data.image?.url || data.url;

    if(!imageUrl) throw new Error('No image in response');

    genImageUrl = imageUrl;
    document.getElementById('genImg').src = imageUrl;
    document.getElementById('genResult').style.display = 'block';
    document.getElementById('saveImgBtn').style.display = 'block';
    document.getElementById('genStatus').textContent = '✅ Design ready!';

    // Save result to localStorage
    try {
      const plannerData = JSON.parse(localStorage.getItem('lamsa_planner')||'{}');
      plannerData.lastResult = imageUrl;
      localStorage.setItem('lamsa_planner', JSON.stringify(plannerData));
    } catch(e){}

  } catch(err) {
    document.getElementById('genStatus').textContent = '❌ ' + err.message;
  }
};

function buildGeneratePrompt(roomType, allItems) {
  const roomLabels = {bedroom:'bedroom',living:'living room',kitchen:'kitchen',bathroom:'bathroom',office:'home office',dining:'dining room',kids:'kids bedroom',garden:'garden'};
  const room = roomLabels[roomType] || roomType;

  const windows = allItems.filter(i => i.userData.name === 'Window');
  const doors = allItems.filter(i => i.userData.name === 'Door');
  const furniture = allItems.filter(i => i.userData.name !== 'Window' && i.userData.name !== 'Door');

  function describePos(item) {
    const xDir = item.position.x < -0.6 ? 'left wall' : item.position.x > 0.6 ? 'right wall' : 'center';
    const zDir = item.position.z < -0.6 ? 'back wall' : item.position.z > 0.6 ? 'front wall' : 'middle';
    return xDir + ', ' + zDir;
  }

  let prompt = `Convert this 3D floor plan into a photorealistic ${room} interior photo. ` +
    `CRITICAL: Keep the EXACT same room layout and camera angle as shown. `;

  if(windows.length > 0) {
    prompt += `Place EXACTLY ${windows.length} window${windows.length>1?'s':''}: `;
    windows.forEach((w,i) => { prompt += `window ${i+1} on the ${describePos(w)}; `; });
  }
  if(doors.length > 0) {
    prompt += `Place EXACTLY ${doors.length} door${doors.length>1?'s':''}: `;
    doors.forEach((d,i) => { prompt += `door ${i+1} on the ${describePos(d)}; `; });
  }
  if(furniture.length > 0) {
    prompt += `Furniture: `;
    furniture.forEach(item => { prompt += `${item.userData.name} at ${describePos(item)}; `; });
  }

  return prompt + `Style: modern luxury. Photorealistic, Architectural Digest quality. Transform 3D blocks into realistic materials.`;
}

window.closeGenModal = function() {
  document.getElementById('genModal').style.display = 'none';
};

window.saveGenImage = function() {
  if(!genImageUrl) return;
  const a = document.createElement('a');
  a.href = genImageUrl;
  a.download = 'lamsa-design.jpg';
  a.target = '_blank';
  a.click();
};

window.switchTab = function(tab) {
  document.querySelectorAll('.stab').forEach(t=>t.classList.remove('active'));
  event.target.classList.add('active');
};
window.toggleSidebar = function() {
  const sb = document.getElementById('sidebar');
  const ov = document.getElementById('sidebar-overlay');
  sb.classList.toggle('open');
  ov.classList.toggle('show', sb.classList.contains('open'));
};
