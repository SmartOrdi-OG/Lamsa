<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rearrange My Room | Lamsa</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #0a0a0a;
    --dark: #111111;
    --card: #161616;
    --border: #2a2a2a;
    --gold: #c9a84c;
    --gold-light: #e8c97a;
    --gold-dim: rgba(201,168,76,0.15);
    --white: #ffffff;
    --gray: #888888;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Tajawal', sans-serif;
    background: var(--black);
    color: var(--white);
    min-height: 100vh;
  }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--dark); }
  ::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 2px; }

  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    padding: 12px 16px;
    display: flex; justify-content: space-between; align-items: center;
    background: rgba(10,10,10,0.9);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
  }
  .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; color: var(--white); }
  .logo-icon {
    width: 36px; height: 36px;
    border: 1.5px solid var(--gold);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
  }
  .logo-text { font-size: 16px; font-weight: 900; }
  .logo-text span {
    color: var(--gold);
    font-size: 12px;
    display: block;
    font-weight: 400;
    letter-spacing: 2px;
    margin-top: -2px;
  }
  .back-link {
    color: var(--gray);
    text-decoration: none;
    font-size: 13px;
    font-weight: 700;
    transition: color 0.2s;
  }
  .back-link:hover { color: var(--gold); }

  .wrap { max-width: 560px; margin: 0 auto; padding: 100px 20px 60px; }
  h1 { font-size: clamp(26px, 6vw, 36px); font-weight: 900; text-align: center; margin-bottom: 10px; }
  .sub { color: var(--gray); font-size: 14px; text-align: center; line-height: 1.6; margin-bottom: 36px; }

  .upload-zone {
    border: 2px dashed var(--border);
    border-radius: 14px;
    padding: 50px 24px;
    text-align: center;
    cursor: pointer;
    transition: all 0.3s;
    position: relative;
    overflow: hidden;
  }
  .upload-zone:hover, .upload-zone.dragover { border-color: var(--gold); background: var(--gold-dim); }
  .upload-zone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
  .upload-icon { font-size: 40px; margin-bottom: 14px; }
  .upload-title { font-size: 16px; font-weight: 700; margin-bottom: 6px; }
  .upload-sub { font-size: 12px; color: var(--gray); }

  .upload-preview { display: none; position: relative; }
  .upload-preview img { width: 100%; max-height: 320px; object-fit: cover; border-radius: 14px; display: block; }
  .upload-preview .remove-btn {
    position: absolute; top: 10px; right: 10px;
    background: rgba(0,0,0,0.7);
    border: 1px solid var(--border);
    color: white; border-radius: 6px;
    padding: 6px 12px; font-size: 12px;
    cursor: pointer;
  }

  .generate-btn {
    width: 100%;
    background: linear-gradient(135deg, var(--gold), #a07830, var(--gold));
    background-size: 200% 200%;
    color: var(--black);
    border: none;
    padding: 20px;
    border-radius: 12px;
    font-family: 'Tajawal', sans-serif;
    font-size: 18px; font-weight: 900;
    cursor: pointer;
    transition: all 0.3s;
    margin-top: 24px;
    animation: shimmer 3s infinite;
  }
  @keyframes shimmer { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
  .generate-btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 16px 50px rgba(201,168,76,0.4); }
  .generate-btn:disabled { opacity: 0.4; cursor: not-allowed; animation: none; }

  .result-area { display: none; margin-top: 32px; }
  .result-area.show { display: block; animation: fadeUp 0.5s ease both; }
  @keyframes fadeUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
  .result-img-wrap {
    background: var(--dark);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    aspect-ratio: 16/9;
    display: flex; align-items: center; justify-content: center;
    position: relative;
  }
  .result-placeholder { text-align: center; color: var(--gray); padding: 20px; }
  .result-placeholder .rp-icon { font-size: 48px; margin-bottom: 12px; }
  .result-placeholder p { font-size: 14px; }
  .result-placeholder small { font-size: 11px; color: #444; }
  .loading-dots { display: none; justify-content: center; gap: 8px; margin-top: 16px; }
  .loading-dots.show { display: flex; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--gold); animation: bounce 1.4s infinite ease-in-out both; }
  .dot:nth-child(1) { animation-delay: -0.32s; }
  .dot:nth-child(2) { animation-delay: -0.16s; }
  @keyframes bounce { 0%, 80%, 100% { transform: scale(0); opacity: 0.3; } 40% { transform: scale(1); opacity: 1; } }
</style>
</head>
<body>

<nav>
  <a class="logo" href="lamsa-bilingual.html">
    <div class="logo-icon">✦</div>
    <div class="logo-text">Lamsa<span>لمستي</span></div>
  </a>
  <a class="back-link" href="lamsa-bilingual.html">← Full Designer</a>
</nav>

<div class="wrap">
  <h1>✨ Rearrange My Room</h1>
  <p class="sub">Upload a photo of your room. We'll keep every piece of furniture exactly as it is and just find a better layout for it.</p>

  <div class="upload-zone" id="uploadZone">
    <input type="file" accept="image/*" id="fileInput" onchange="handleUpload(this)">
    <div id="uploadContent">
      <div class="upload-icon">📷</div>
      <div class="upload-title">Drag your room photo here or click to upload</div>
      <div class="upload-sub">PNG, JPG, HEIC · Max 10MB</div>
    </div>
    <div class="upload-preview" id="uploadPreview">
      <img id="previewImg" alt="Room photo">
      <button class="remove-btn" onclick="removeImage(event)">✕ Remove</button>
    </div>
  </div>

  <button class="generate-btn" id="generateBtn" onclick="rearrangeRoom()" disabled>
    ✨ Rearrange My Room
  </button>

  <div class="result-area" id="resultArea">
    <div class="result-img-wrap" id="resultImg">
      <div class="result-placeholder" id="resultPlaceholder">
        <div class="rp-icon">🎨</div>
        <p>Generating your new layout...</p>
        <small>Takes 15-30 seconds</small>
      </div>
    </div>
    <div class="loading-dots" id="loadingDots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  </div>
</div>

<script>
  var REARRANGE_PROMPT =
    'You are an expert interior designer tasked with DRAMATICALLY rearranging this room.\n\n' +
    'MANDATORY CHANGES - every single piece must move:\n' +
    '- The sofa/largest seating: move to completely opposite wall or perpendicular position\n' +
    '- The bed: move headboard to a different wall entirely\n' +
    '- Coffee table: reposition to center of new seating arrangement\n' +
    '- All chairs: rotate and reposition to face new focal point\n' +
    '- Wardrobe/tall pieces: slide to different wall\n' +
    '- TV unit: only move if space allows\n\n' +
    'DESIGN PRINCIPLES to apply:\n' +
    '- Identify the room focal point (TV, window, fireplace)\n' +
    '- All seating must face the focal point\n' +
    '- Create 60-90cm clear walkways\n' +
    '- No furniture blocking doors or windows\n' +
    '- Balance visual weight left and right\n' +
    '- Create intimate conversation groupings\n\n' +
    'The before and after must look COMPLETELY DIFFERENT in furniture layout.\n' +
    'Furniture appearance stays 100% identical - same color, material, size.\n' +
    'Output: photorealistic, professional interior design result.';

  var uploadedFile = null;

  function handleUpload(input) {
    var file = input.files[0];
    if (!file) return;
    uploadedFile = file;
    document.getElementById('previewImg').src = URL.createObjectURL(file);
    document.getElementById('uploadContent').style.display = 'none';
    document.getElementById('uploadPreview').style.display = 'block';
    document.getElementById('generateBtn').disabled = false;
  }

  function removeImage(e) {
    e.preventDefault();
    e.stopPropagation();
    uploadedFile = null;
    document.getElementById('fileInput').value = '';
    document.getElementById('uploadContent').style.display = 'block';
    document.getElementById('uploadPreview').style.display = 'none';
    document.getElementById('generateBtn').disabled = true;
  }

  window.addEventListener('DOMContentLoaded', function() {
    var zone = document.getElementById('uploadZone');
    zone.addEventListener('dragover', function(e) { e.preventDefault(); e.stopPropagation(); zone.classList.add('dragover'); });
    zone.addEventListener('dragleave', function(e) { e.preventDefault(); e.stopPropagation(); zone.classList.remove('dragover'); });
    zone.addEventListener('drop', function(e) {
      e.preventDefault(); e.stopPropagation();
      zone.classList.remove('dragover');
      var file = e.dataTransfer.files[0];
      if (!file || !file.type.startsWith('image/')) return;
      uploadedFile = file;
      document.getElementById('previewImg').src = URL.createObjectURL(file);
      document.getElementById('uploadContent').style.display = 'none';
      document.getElementById('uploadPreview').style.display = 'block';
      document.getElementById('generateBtn').disabled = false;
    });
  });

  function compressImage(file, maxSize, quality, callback) {
    var img = new Image();
    var objUrl = URL.createObjectURL(file);
    img.onload = function() {
      URL.revokeObjectURL(objUrl);
      var w = img.width, h = img.height;
      if (w > maxSize || h > maxSize) {
        if (w > h) { h = Math.round(h * maxSize / w); w = maxSize; }
        else { w = Math.round(w * maxSize / h); h = maxSize; }
      }
      var canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      callback(canvas.toDataURL('image/jpeg', quality));
    };
    img.onerror = function() {
      URL.revokeObjectURL(objUrl);
      var fr = new FileReader();
      fr.onload = function(e) { callback(e.target.result); };
      fr.readAsDataURL(file);
    };
    img.src = objUrl;
  }

  function showError(msg) {
    document.getElementById('loadingDots').classList.remove('show');
    var ph = document.getElementById('resultPlaceholder');
    ph.style.display = 'block';
    ph.innerHTML = '<div class="rp-icon">❌</div><p>' + msg + '</p>';
    document.getElementById('generateBtn').disabled = false;
  }

  function createDownloadBtn(url, filename) {
    var wrap = document.createElement('div');
    wrap.style.cssText = 'display:flex;gap:10px;margin:10px 0;';

    var saveBtn = document.createElement('button');
    saveBtn.style.cssText = 'flex:1;background:var(--gold);color:var(--black);border:none;' +
      'padding:14px;border-radius:10px;font-weight:900;font-size:14px;cursor:pointer;' +
      'font-family:Tajawal,sans-serif;transition:all 0.2s;';
    saveBtn.textContent = '⬇ Save Image';
    saveBtn.onclick = function() {
      fetch(url).then(function(r) { return r.blob(); }).then(function(blob) {
        var file = new File([blob], filename, { type: 'image/jpeg' });
        if (navigator.canShare && navigator.canShare({ files: [file] })) {
          return navigator.share({ files: [file], title: 'Lamsa Rearranged Room' })
            .catch(function(err) { if (!err || err.name !== 'AbortError') triggerDownload(blob); });
        }
        triggerDownload(blob);
      }).catch(function() { window.open(url, '_blank'); });

      function triggerDownload(blob) {
        var blobUrl = URL.createObjectURL(blob);
        var a = document.createElement('a');
        a.href = blobUrl; a.download = filename;
        document.body.appendChild(a); a.click(); document.body.removeChild(a);
        URL.revokeObjectURL(blobUrl);
      }
    };

    var shareBtn = document.createElement('button');
    shareBtn.style.cssText = 'background:transparent;color:var(--gold);border:1.5px solid var(--gold);' +
      'padding:14px 18px;border-radius:10px;font-weight:900;font-size:14px;cursor:pointer;' +
      'font-family:Tajawal,sans-serif;transition:all 0.2s;white-space:nowrap;';
    shareBtn.textContent = '↗ Share';
    shareBtn.onclick = function() {
      if (navigator.share) navigator.share({ title: 'Lamsa Rearranged Room', url: url }).catch(function() { window.open(url, '_blank'); });
      else window.open(url, '_blank');
    };

    wrap.appendChild(saveBtn);
    wrap.appendChild(shareBtn);
    return wrap;
  }

  function callGenerate(imageUrl) {
    fetch('/api/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        prompt: REARRANGE_PROMPT,
        image_url: imageUrl,
        num_images: 1,
        guidance_scale: 3.5,
        aspect_ratio: '16:9'
      })
    })
    .then(function(res) { return res.json(); })
    .then(function(data) {
      document.getElementById('loadingDots').classList.remove('show');
      document.getElementById('generateBtn').disabled = false;

      if (data.images && data.images.length > 0) {
        document.getElementById('resultPlaceholder').style.display = 'none';
        var imgWrap = document.getElementById('resultImg');
        imgWrap.innerHTML = '';
        var imgEl = document.createElement('img');
        imgEl.src = data.images[0].url;
        imgEl.style.cssText = 'width:100%;border-radius:10px;';
        imgWrap.style.cssText = 'display:block;aspect-ratio:auto;';
        imgWrap.appendChild(imgEl);
        imgWrap.appendChild(createDownloadBtn(data.images[0].url, 'lamsa-rearranged.jpg'));
      } else {
        showError('Error generating image. Please try again.');
      }
    })
    .catch(function(err) {
      showError('Connection error. Please try again.');
      console.error('fal.ai error:', err);
    });
  }

  function rearrangeRoom() {
    if (!uploadedFile) return;

    document.getElementById('generateBtn').disabled = true;
    var resultArea = document.getElementById('resultArea');
    resultArea.classList.add('show');
    resultArea.scrollIntoView({ behavior: 'smooth', block: 'center' });

    var ph = document.getElementById('resultPlaceholder');
    ph.style.display = 'block';
    ph.innerHTML = '<div class="rp-icon">🎨</div><p>Generating your new layout...</p><small>Takes 15-30 seconds</small>';
    document.getElementById('loadingDots').classList.add('show');

    compressImage(uploadedFile, 1536, 0.9, function(imageDataUrl) {
      fetch('/api/upload', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ image_data: imageDataUrl, mime_type: uploadedFile.type || 'image/jpeg' })
      })
      .then(function(r) { return r.json(); })
      .then(function(uploadResult) {
        callGenerate(uploadResult.url || imageDataUrl);
      })
      .catch(function(err) {
        showError('Image upload failed. Please try again.');
        console.error('upload error:', err);
      });
    });
  }
</script>
</body>
</html>
