<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rearrange My Room | Lamsa</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #0a0a0a;
    --dark: #111111;
    --card: #161616;
    --border: #2a2a2a;
    --gold: #c9a84c;
    --gold-light: #e8c97a;
    --gold-dim: rgba(201,168,76,0.15);
    --white: #ffffff;
    --gray: #888888;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Tajawal', sans-serif;
    background: var(--black);
    color: var(--white);
    min-height: 100vh;
  }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--dark); }
  ::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 2px; }

  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    padding: 12px 16px;
    display: flex; justify-content: space-between; align-items: center;
    background: rgba(10,10,10,0.9);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
  }
  .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; color: var(--white); }
  .logo-icon {
    width: 36px; height: 36px;
    border: 1.5px solid var(--gold);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
  }
  .logo-text { font-size: 16px; font-weight: 900; }
  .logo-text span {
    color: var(--gold);
    font-size: 12px;
    display: block;
    font-weight: 400;
    letter-spacing: 2px;
    margin-top: -2px;
  }
  .back-link {
    color: var(--gray);
    text-decoration: none;
    font-size: 13px;
    font-weight: 700;
    transition: color 0.2s;
  }
  .back-link:hover { color: var(--gold); }

  .wrap { max-width: 560px; margin: 0 auto; padding: 100px 20px 60px; }
  .hero { max-width: 560px; margin: 0 auto; }
  h1 { font-size: clamp(26px, 6vw, 36px); font-weight: 900; text-align: center; margin-bottom: 10px; }
  .sub { color: var(--gray); font-size: 14px; text-align: center; line-height: 1.6; margin-bottom: 36px; }

  .module-card {
    background: var(--dark);
    border: 2px solid var(--gold);
    border-radius: 18px;
    padding: 26px 20px;
    box-shadow: 0 20px 50px rgba(201,168,76,0.15);
  }

  .module-header { text-align: center; margin-bottom: 20px; }
  .module-icon { font-size: 32px; margin-bottom: 8px; }
  .module-title { font-size: 19px; font-weight: 900; margin-bottom: 8px; }
  .module-desc { color: var(--gray); font-size: 12.5px; line-height: 1.5; }

  .sub-toggle { display: flex; gap: 8px; margin-bottom: 18px; }
  .sub-toggle-btn {
    flex: 1;
    background: var(--card);
    border: 1.5px solid var(--border);
    color: var(--gray);
    padding: 10px 6px;
    border-radius: 10px;
    font-family: 'Tajawal', sans-serif;
    font-size: 12px; font-weight: 900;
    cursor: pointer;
    transition: all 0.2s;
  }
  .sub-toggle-btn:hover { border-color: var(--gold); }
  .sub-toggle-btn.active { border-color: var(--gold); background: var(--gold-dim); color: var(--white); }

  .upload-zone {
    border: 2px dashed var(--border);
    border-radius: 14px;
    padding: 34px 16px;
    text-align: center;
    cursor: pointer;
    transition: all 0.3s;
    position: relative;
    overflow: hidden;
  }
  .upload-zone:hover, .upload-zone.dragover { border-color: var(--gold); background: var(--gold-dim); }
  .upload-zone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
  .upload-icon { font-size: 34px; margin-bottom: 10px; }
  .upload-title { font-size: 13.5px; font-weight: 700; margin-bottom: 6px; }
  .upload-sub { font-size: 11px; color: var(--gray); }

  .upload-preview { display: none; position: relative; }
  .upload-preview img { width: 100%; max-height: 260px; object-fit: cover; border-radius: 14px; display: block; }
  .upload-preview .remove-btn {
    position: absolute; top: 10px; right: 10px;
    background: rgba(0,0,0,0.7);
    border: 1px solid var(--border);
    color: white; border-radius: 6px;
    padding: 6px 12px; font-size: 12px;
    cursor: pointer;
  }

  .generate-btn {
    width: 100%;
    background: linear-gradient(135deg, var(--gold), #a07830, var(--gold));
    background-size: 200% 200%;
    color: var(--black);
    border: none;
    padding: 18px;
    border-radius: 12px;
    font-family: 'Tajawal', sans-serif;
    font-size: 15px; font-weight: 900;
    cursor: pointer;
    transition: all 0.3s;
    margin-top: 16px;
    animation: shimmer 3s infinite;
  }
  @keyframes shimmer { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
  .generate-btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 16px 50px rgba(201,168,76,0.4); }
  .generate-btn:disabled { opacity: 0.4; cursor: not-allowed; animation: none; }

  .result-area { display: none; max-width: 560px; margin: 32px auto 0; }
  .result-area.show { display: block; animation: fadeUp 0.5s ease both; }
  @keyframes fadeUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
  .result-img-wrap {
    background: var(--dark);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    aspect-ratio: 16/9;
    display: flex; align-items: center; justify-content: center;
    position: relative;
  }
  .result-placeholder { text-align: center; color: var(--gray); padding: 20px; }
  .result-placeholder .rp-icon { font-size: 48px; margin-bottom: 12px; }
  .result-placeholder p { font-size: 14px; }
  .result-placeholder small { font-size: 11px; color: #444; }
  .loading-dots { display: none; justify-content: center; gap: 8px; margin-top: 16px; }
  .loading-dots.show { display: flex; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--gold); animation: bounce 1.4s infinite ease-in-out both; }
  .dot:nth-child(1) { animation-delay: -0.32s; }
  .dot:nth-child(2) { animation-delay: -0.16s; }
  @keyframes bounce { 0%, 80%, 100% { transform: scale(0); opacity: 0.3; } 40% { transform: scale(1); opacity: 1; } }

  /* NEARBY STORES */
  .nearby-stores { margin-top: 24px; padding-top: 20px; border-top: 1px solid var(--border); }
  .nearby-stores-title { font-size: 15px; font-weight: 900; margin-bottom: 4px; }
  .nearby-stores-sub { font-size: 12px; color: var(--gray); margin-bottom: 14px; }
  .nearby-stores-list { display: flex; flex-direction: column; gap: 10px; }
  .nearby-store-item {
    display: flex; align-items: center; justify-content: space-between; gap: 10px;
    background: var(--card); border: 1px solid var(--border); border-radius: 12px;
    padding: 12px 14px;
  }
  .nearby-store-name { font-size: 13.5px; font-weight: 700; }
  .nearby-store-btn {
    flex-shrink: 0;
    background: transparent; border: 1.5px solid var(--gold); color: var(--gold);
    font-family: 'Tajawal', sans-serif; font-size: 11.5px; font-weight: 700;
    padding: 7px 12px; border-radius: 20px; text-decoration: none;
    white-space: nowrap; transition: all 0.2s;
  }
  .nearby-store-btn:hover { background: var(--gold-dim); }
</style>
</head>
<body>

<nav>
  <a class="logo" href="lamsa-bilingual.html">
    <div class="logo-icon">✦</div>
    <div class="logo-text">Lamsa<span>لمستي</span></div>
  </a>
  <a class="back-link" href="lamsa-bilingual.html">← Full Designer</a>
</nav>

<div class="wrap">
  <div class="hero">
    <h1>✨ Rearrange My Room</h1>
    <p class="sub">Upload a photo of your room and let AI find the best new layout.</p>
  </div>

  <div class="module-card">
    <div class="module-header">
      <div class="module-icon">🤖</div>
      <div class="module-title">AI Decides</div>
      <p class="module-desc">AI automatically finds the best layout for your room</p>
    </div>

    <div class="sub-toggle" id="subToggle">
      <button class="sub-toggle-btn active" data-submode="rearrange" onclick="selectSubMode('rearrange')" type="button">Rearrange Only</button>
      <button class="sub-toggle-btn" data-submode="redesign" onclick="selectSubMode('redesign')" type="button">Full Redesign</button>
    </div>

    <div class="upload-zone" id="uploadZone">
      <input type="file" accept="image/*" id="fileInput" onchange="handleUpload(this)">
      <div id="uploadContent">
        <div class="upload-icon">📷</div>
        <div class="upload-title">Upload your room photo</div>
        <div class="upload-sub">PNG, JPG, HEIC · Max 10MB</div>
      </div>
      <div class="upload-preview" id="uploadPreview">
        <img id="previewImg" alt="Room photo">
        <button class="remove-btn" onclick="removeImage(event)">✕ Remove</button>
      </div>
    </div>

    <button class="generate-btn" id="generateBtn" onclick="generate()" disabled>
      ✨ Generate
    </button>
  </div>

  <div class="result-area" id="resultArea">
    <div class="result-img-wrap" id="resultImg">
      <div class="result-placeholder" id="resultPlaceholder">
        <div class="rp-icon">🎨</div>
        <p>Generating your new layout...</p>
        <small>Takes 15-30 seconds</small>
      </div>
    </div>
    <div class="loading-dots" id="loadingDots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
    <div id="nearbyStoresContainer"></div>
  </div>
</div>

<script src="js/nearby-stores.js"></script>
<script>
  var REARRANGE_PROMPT =
    'CRITICAL: Do NOT add any new furniture. Do NOT change any existing furniture.\n' +
    'Use ONLY what is visible in the original photo.\n' +
    'The same sofa, same bed, same chairs, same items — just moved to new positions.\n\n' +
    'You are an expert interior designer tasked with DRAMATICALLY rearranging this room.\n\n' +
    'MANDATORY CHANGES - every single piece must move:\n' +
    '- The sofa/largest seating: move to completely opposite wall or perpendicular position\n' +
    '- The bed: move headboard to a different wall entirely\n' +
    '- Coffee table: reposition to center of new seating arrangement\n' +
    '- All chairs: rotate and reposition to face new focal point\n' +
    '- Wardrobe/tall pieces: slide to different wall\n' +
    '- TV unit: only move if space allows\n\n' +
    'DESIGN PRINCIPLES to apply:\n' +
    '- Identify the room focal point (TV, window, fireplace)\n' +
    '- All seating must face the focal point\n' +
    '- Create 60-90cm clear walkways\n' +
    '- No furniture blocking doors or windows\n' +
    '- Balance visual weight left and right\n' +
    '- Create intimate conversation groupings\n\n' +
    'The before and after must look COMPLETELY DIFFERENT in furniture layout.\n' +
    'Furniture appearance stays 100% identical - same color, material, size.\n' +
    'Output: photorealistic, professional interior design result.';

  var FULL_REDESIGN_PROMPT =
    'CRITICAL: This must be a DRAMATIC, COMPLETE visual transformation of the room — not a minor touch-up. ' +
    'If someone compares the before and after side by side, almost nothing about the decor should look the same.\n\n' +
    'You are an expert interior designer tasked with a full redesign of this room.\n\n' +
    'MANDATORY CHANGES - every one of these must be clearly, visibly different from the original photo:\n' +
    '- Wall color/finish: change to a new palette, different from the original\n' +
    '- Flooring: change the material, color, or finish\n' +
    '- Every furniture piece (sofas, chairs, tables, storage, bed): REPLACE with different pieces — different shape, material, and color than what is in the photo\n' +
    '- Lighting fixtures: replace with new fixtures\n' +
    '- Decor and accessories (art, rugs, plants, curtains, cushions): replace entirely with new items\n' +
    '- Furniture layout: rearrange into a new configuration, not the same positions as the original\n\n' +
    'DESIGN PRINCIPLES to apply:\n' +
    '- Identify the room focal point (TV, window, fireplace) and design around it\n' +
    '- All seating must face the focal point\n' +
    '- Create 60-90cm clear walkways\n' +
    '- No furniture blocking doors or windows\n' +
    '- Balance visual weight left and right\n' +
    '- Create intimate conversation groupings\n\n' +
    'STRICTLY PRESERVE ONLY: room shape, wall count, ceiling height, number and position of windows and doors, room proportions, and camera angle — everything else (colors, materials, furniture, decor, lighting) must change.\n' +
    'DO NOT add, move, or remove architectural elements (windows, doors, walls, structural beams).\n\n' +
    'The before and after must look like a completely different room in style, color, and furniture — only the architecture stays recognizable.\n' +
    'Output: photorealistic, professional interior design magazine quality result.';

  var state = { uploadedFile: null, uploadedImageUrl: null, subMode: 'rearrange' };

  function selectSubMode(subMode) {
    state.subMode = subMode;
    console.log('[auto] sub-mode switched to:', subMode);

    var buttons = document.querySelectorAll('#subToggle .sub-toggle-btn');
    for (var i = 0; i < buttons.length; i++) {
      buttons[i].classList.toggle('active', buttons[i].getAttribute('data-submode') === subMode);
    }
  }

  function handleUpload(input) {
    var file = input.files[0];
    if (!file) return;
    setUploadedFile(file);
  }

  function setUploadedFile(file) {
    state.uploadedFile = file;
    state.uploadedImageUrl = null;
    console.log('[upload] new photo selected:', file.name, file.size + ' bytes');

    document.getElementById('previewImg').src = URL.createObjectURL(file);
    document.getElementById('uploadContent').style.display = 'none';
    document.getElementById('uploadPreview').style.display = 'block';
    document.getElementById('generateBtn').disabled = false;
  }

  function removeImage(e) {
    e.preventDefault();
    e.stopPropagation();
    state.uploadedFile = null;
    state.uploadedImageUrl = null;

    document.getElementById('fileInput').value = '';
    document.getElementById('uploadContent').style.display = 'block';
    document.getElementById('uploadPreview').style.display = 'none';
    document.getElementById('generateBtn').disabled = true;
  }

  window.addEventListener('DOMContentLoaded', function() {
    setupDropZone();
  });

  function setupDropZone() {
    var zone = document.getElementById('uploadZone');
    zone.addEventListener('dragover', function(e) { e.preventDefault(); e.stopPropagation(); zone.classList.add('dragover'); });
    zone.addEventListener('dragleave', function(e) { e.preventDefault(); e.stopPropagation(); zone.classList.remove('dragover'); });
    zone.addEventListener('drop', function(e) {
      e.preventDefault(); e.stopPropagation();
      zone.classList.remove('dragover');
      var file = e.dataTransfer.files[0];
      if (!file || !file.type.startsWith('image/')) return;
      setUploadedFile(file);
    });
  }

  function compressImage(file, maxSize, quality, callback) {
    var img = new Image();
    var objUrl = URL.createObjectURL(file);
    img.onload = function() {
      URL.revokeObjectURL(objUrl);
      var w = img.width, h = img.height;
      if (w > maxSize || h > maxSize) {
        if (w > h) { h = Math.round(h * maxSize / w); w = maxSize; }
        else { w = Math.round(w * maxSize / h); h = maxSize; }
      }
      var canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      callback(canvas.toDataURL('image/jpeg', quality));
    };
    img.onerror = function() {
      URL.revokeObjectURL(objUrl);
      var fr = new FileReader();
      fr.onload = function(e) { callback(e.target.result); };
      fr.readAsDataURL(file);
    };
    img.src = objUrl;
  }

  function showError(msg) {
    document.getElementById('loadingDots').classList.remove('show');
    var ph = document.getElementById('resultPlaceholder');
    ph.style.display = 'block';
    ph.innerHTML = '<div class="rp-icon">❌</div><p>' + msg + '</p>';
    document.getElementById('generateBtn').disabled = !state.uploadedFile;
  }

  function createDownloadBtn(url, filename) {
    var wrap = document.createElement('div');
    wrap.style.cssText = 'display:flex;gap:10px;margin:10px 0;';

    var saveBtn = document.createElement('button');
    saveBtn.style.cssText = 'flex:1;background:var(--gold);color:var(--black);border:none;' +
      'padding:14px;border-radius:10px;font-weight:900;font-size:14px;cursor:pointer;' +
      'font-family:Tajawal,sans-serif;transition:all 0.2s;';
    saveBtn.textContent = '⬇ Save Image';
    saveBtn.onclick = function() {
      var link = document.createElement('a');
      link.href = url; // the direct fal.ai image URL
      link.download = filename;
      link.target = '_blank';
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    };

    var shareBtn = document.createElement('button');
    shareBtn.style.cssText = 'background:transparent;color:var(--gold);border:1.5px solid var(--gold);' +
      'padding:14px 18px;border-radius:10px;font-weight:900;font-size:14px;cursor:pointer;' +
      'font-family:Tajawal,sans-serif;transition:all 0.2s;white-space:nowrap;';
    shareBtn.textContent = '↗ Share';
    shareBtn.onclick = function() {
      if (navigator.share) navigator.share({ title: 'Lamsa Rearranged Room', url: url }).catch(function() { window.open(url, '_blank'); });
      else window.open(url, '_blank');
    };

    wrap.appendChild(saveBtn);
    wrap.appendChild(shareBtn);
    return wrap;
  }

  var POLL_INTERVAL_MS = 3000; // poll every 3 seconds
  var POLL_TIMEOUT_MS = 2 * 60 * 1000; // 2 minutes

  // fal.ai's queue result payload shape varies by endpoint/version — sometimes the
  // images are top-level, sometimes nested under output/response/data. Check every
  // known shape instead of assuming just `data.images`.
  function extractResultImages(data) {
    if (!data) return null;
    if (Array.isArray(data.images) && data.images.length) return data.images;
    if (data.image && data.image.url) return [data.image];
    if (data.output && Array.isArray(data.output.images) && data.output.images.length) return data.output.images;
    if (data.response && Array.isArray(data.response.images) && data.response.images.length) return data.response.images;
    if (data.data && Array.isArray(data.data.images) && data.data.images.length) return data.data.images;
    return null;
  }

  function renderGenerateResult(data) {
    console.log('[generate] rendering result:', data);
    document.getElementById('loadingDots').classList.remove('show');
    document.getElementById('generateBtn').disabled = !state.uploadedFile;

    var images = extractResultImages(data);

    if (images && images.length > 0) {
      console.log('[generate] displaying image:', images[0].url);
      document.getElementById('resultPlaceholder').style.display = 'none';
      var imgWrap = document.getElementById('resultImg');
      imgWrap.innerHTML = '';
      var imgEl = document.createElement('img');
      imgEl.src = images[0].url;
      imgEl.style.cssText = 'width:100%;border-radius:10px;';
      imgWrap.style.cssText = 'display:block;aspect-ratio:auto;';
      imgWrap.appendChild(imgEl);
      imgWrap.appendChild(createDownloadBtn(images[0].url, 'lamsa-rearranged.jpg'));

      if (window.NearbyStores) {
        NearbyStores.render('nearbyStoresContainer', {
          countryCode: NearbyStores.countryFromLocale(),
          lang: 'en'
        });
      }
    } else {
      console.error('[generate] no images in result data:', data);
      showError('Error generating image. Please try again.');
    }
  }

  function fetchJson(url) {
    return fetch(url).then(function(res) {
      return res.json().then(function(data) {
        return { ok: res.ok, status: res.status, data: data };
      });
    });
  }

  function pollForResult(requestId, startTime) {
    var elapsed = Date.now() - startTime;
    if (elapsed >= POLL_TIMEOUT_MS) {
      console.error('[generate] polling timed out after ' + Math.round(elapsed / 1000) + 's for request_id:', requestId);
      showError('Generation took too long. Please try again.');
      return;
    }

    console.log('[generate] polling status for request_id:', requestId, '(elapsed ' + Math.round(elapsed / 1000) + 's)');

    fetchJson('/api/status?request_id=' + encodeURIComponent(requestId))
      .then(function(result) {
        console.log('[generate] status response (http ' + result.status + '):', result.data);

        if (!result.ok) {
          console.error('[generate] status check returned an error:', result.data);
          showError('Error generating image. Please try again.');
          return;
        }

        // fal.ai returns status in varying casing depending on the endpoint version,
        // so normalize before comparing.
        var status = (result.data.status || '').toString().toUpperCase();

        if (status === 'COMPLETED') {
          console.log('[generate] status COMPLETED — fetching final result for request_id:', requestId);
          fetchJson('/api/status?request_id=' + encodeURIComponent(requestId) + '&mode=result')
            .then(function(resultResp) {
              console.log('[generate] result response (http ' + resultResp.status + '):', resultResp.data);
              if (!resultResp.ok) {
                console.error('[generate] result fetch returned an error:', resultResp.data);
                showError('Error generating image. Please try again.');
                return;
              }
              renderGenerateResult(resultResp.data);
            })
            .catch(function(err) {
              console.error('[generate] result fetch threw:', err);
              showError('Connection error. Please try again.');
            });
        } else if (status === 'FAILED' || status === 'ERROR') {
          console.error('[generate] generation failed:', result.data);
          showError('Error generating image. Please try again.');
        } else {
          console.log('[generate] status = ' + status + ' — polling again in ' + (POLL_INTERVAL_MS / 1000) + 's');
          setTimeout(function() { pollForResult(requestId, startTime); }, POLL_INTERVAL_MS);
        }
      })
      .catch(function(err) {
        console.error('[generate] status check threw:', err);
        showError('Connection error. Please try again.');
      });
  }

  function callGenerate(imageUrl, prompt, guidanceScale) {
    var requestBody = {
      prompt: prompt,
      image_url: imageUrl,
      num_images: 1,
      guidance_scale: guidanceScale || 3.5,
      aspect_ratio: '16:9'
    };
    console.log('[generate] POST /api/generate:', requestBody);

    fetch('/api/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(requestBody)
    })
    .then(function(res) {
      return res.json().then(function(data) { return { ok: res.ok, status: res.status, data: data }; });
    })
    .then(function(result) {
      console.log('[generate] /api/generate response (http ' + result.status + '):', result.data);

      if (!result.ok || !result.data || !result.data.request_id) {
        console.error('[generate] no request_id in response:', result.data);
        showError('Error generating image. Please try again.');
        return;
      }

      console.log('[generate] request_id received:', result.data.request_id, '— starting poll loop');
      pollForResult(result.data.request_id, Date.now());
    })
    .catch(function(err) {
      console.error('[generate] /api/generate call threw:', err);
      showError('Connection error. Please try again.');
    });
  }

  // Compresses + uploads the photo once, then caches and reuses the hosted URL
  // for the generate call so we never re-upload the same photo twice.
  function ensurePhotoUploaded(callback) {
    if (state.uploadedImageUrl) {
      console.log('[upload] reusing already-uploaded photo url:', state.uploadedImageUrl);
      callback(state.uploadedImageUrl);
      return;
    }

    console.log('[upload] compressing image:', state.uploadedFile.name, state.uploadedFile.size + ' bytes');
    compressImage(state.uploadedFile, 1536, 0.9, function(imageDataUrl) {
      console.log('[upload] image compressed, uploading to /api/upload');
      fetch('/api/upload', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ image_data: imageDataUrl, mime_type: state.uploadedFile.type || 'image/jpeg' })
      })
      .then(function(res) {
        return res.json().then(function(data) { return { ok: res.ok, status: res.status, data: data }; });
      })
      .then(function(result) {
        console.log('[upload] /api/upload response (http ' + result.status + '):', result.data);
        if (!result.ok || !result.data || !result.data.url) {
          console.error('[upload] upload did not return a usable url, falling back to inline data url');
        }
        state.uploadedImageUrl = (result.ok && result.data && result.data.url) ? result.data.url : imageDataUrl;
        callback(state.uploadedImageUrl);
      })
      .catch(function(err) {
        console.error('[upload] upload call threw:', err);
        showError('Image upload failed. Please try again.');
      });
    });
  }

  // A prior successful renderGenerateResult() replaces #resultImg's contents
  // with the result image, which removes #resultPlaceholder from the DOM.
  // Recreate it before every run so a second/third generate doesn't crash.
  function ensureResultPlaceholder() {
    if (document.getElementById('resultPlaceholder')) return;
    document.getElementById('resultImg').innerHTML =
      '<div class="result-placeholder" id="resultPlaceholder">' +
        '<div class="rp-icon">🎨</div>' +
        '<p>Generating your new layout...</p>' +
        '<small>Takes 15-30 seconds</small>' +
      '</div>';
  }

  function showResultLoading() {
    var resultArea = document.getElementById('resultArea');
    resultArea.classList.add('show');
    resultArea.scrollIntoView({ behavior: 'smooth', block: 'center' });

    ensureResultPlaceholder();

    var ph = document.getElementById('resultPlaceholder');
    ph.style.display = 'block';
    ph.innerHTML = '<div class="rp-icon">🎨</div><p>Generating your new layout...</p><small>Takes 15-30 seconds</small>';
    document.getElementById('loadingDots').classList.add('show');
  }

  function generate() {
    if (!state.uploadedFile) return;

    console.log('[auto] Generate clicked, sub-mode =', state.subMode);

    document.getElementById('generateBtn').disabled = true;
    showResultLoading();

    var isRedesign = state.subMode === 'redesign';
    var promptToUse = isRedesign ? FULL_REDESIGN_PROMPT : REARRANGE_PROMPT;
    // Full Redesign needs the model to diverge much more from the source photo
    // than a plain rearrange, so give the prompt more weight.
    var guidanceScale = isRedesign ? 7.5 : 3.5;

    ensurePhotoUploaded(function(url) {
      callGenerate(url, promptToUse, guidanceScale);
    });
  }
</script>
</body>
